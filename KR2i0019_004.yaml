  text: 吳越備史卷第四
  hash: sha256:1a58a029fedeac3c4084b2ae3dc228fdda98c1a0126b72f5ed1fe351a00ba40a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0019_SBCK_004-1a}
body:
  text: 武勝軍莭度使掌書記范坰武勝軍莭度廵官林禹撰今大元帥吳越國王王名俶字文徳文穆王苐九子也母吳越國恭懿夫人吳氏王以天成四年歲巳丑八月二十五日生于功臣堂天福四年十二月承制授内衙諸軍指揮使檢校司空忠獻王累授王特進檢校太尉開運四年春三月庚寅出鎮丹丘即台州也下車數月有僧徳韶語王曰此地非君爲治之所當歸國城不然将不利矣王從其言即求歸秋九月甲戌自丹丘歸覲也是日大風東南有雲若樓閣之状識者異之冬十二月内衙統軍使胡進思指揮使諸温鈄滔等幽廢王于義知後院乃召諸大校及諸率中外軍庶奉迎王于南邸晡時王見府寮将校于帥府之外簾謙譲者三諸将校以王素有徳望俯伏称賀即日王以鎮海鎮東等軍莭度檢校太尉兼侍中蒞事于元帥府之南序也戊申乹祐元年春正月辛亥朔漢帝南郊大赦改元是月乙卯王即位于天寵堂赦境内租稅班賚有差天寵堂即忠獻王重建逮于廢王不克遷徙至是而王臨位焉自前年正冬浹于正旦隂晦彌月是日雲物澄霽中外人情胥恱壬戌遣将兵奉廢王于衣錦軍丙子漢主崩少主承祐即位二月辛卯王親祀五廟乙未誅内衙指揮使何承訓懲其反覆中外大恱𥘉廢王将黜胡進思而承訓預其事議未决承訓反告于進思及王即位復請誅進思王懲其反覆立命斬之三月勅遣中書舍人張誼來歸忠獻王賵未㡬内衙統軍使何進思請誅廢王王不許于是進思憂懼而卒先是王遣都頭薛温領親兵保衛廢王且戒之曰尓等小心衛護吾兄若有異事當死拒之至是進思請誅不遂乃詐以王命令薛温害之温曰僕受命之日不聞此言决不敢妄彂也進思仍乃夜遣二賊踰垣而入欲刺廢王廢王闔户大呼薛温聞之率衆而入二鼓斃二賊于中庭至是進思聞二賊死憂懼不二日發疽而死是月大閱馬步夏六月朔日有蝕之冬十一月下令以每歲租賦逋滯者悉蠲之仍歲為著令百姓歌舞焉己酉二年春二月匡武都連名輒舉求軄王命斬状首二人坐黜者二十餘人餘宥之三月勅授王東南兵馬都元帥鎮海鎮東等軍莭度使浙江東西䓁道管内觀察䖏置兼両浙塩鐵制置發運等使開府儀同三司檢校太師兼中書令杭州越州大都督上柱國吳越國王食邑一萬户實封一千户仍賜匡聖廣運同徳保㝎功臣夏四月太白晝見是月乙亥城西上清宫灾五月内衙指揮使鈄滔以罪黜于䖏州六月甲申日有蝕之秋七月朝廷命擒河中府李守貞𥘉守貞之叛求援金陵偽齊王景達舉兵應之未㡬守貞就擒淮人􅐦境而還是月王命弟弘億爲明州刺史冬十月勅遣散騎常侍張煦等持莭備禮冊王爲吳越國王仍賜玉冊金印法物等冊曰維乹祐二年歲次乙酉十月庚午朔十九日戊子皇帝若曰我先帝承有晉崩離之後醜虜充斥毒螫中夏用順天致罰大拯黎元太阿一揮胡馬宵遁享萬靈于無主觧兆庶之倒懸較定丗勲以吳越居右伊朕眇末䖍奉先訓嗣位之始即酬懋功前命為元帥按地圗授武莭東南之境淂行征伐命冊為真王駕大輅執桓圭牛斗之郷盡荒土宇詢于有位僉曰克諧咨尓匡聖廣運同徳保㝎功臣東南面兵馬都元帥鎮海鎮東等軍莭度使浙江東西道管内觀察䖏置兼両浙塩鐵制置發運營田等使開府儀同三司檢校太師兼中書令杭州越州大都督上柱國吳越國王食邑一萬户實封一千户錢象緯炳靈公王襲慶横江負海者三千里開國承家者六十年而䏻望辰極以駿奔奉天朝之師律充庭納貢則外府告盈下瀨宣威則前茅獻捷忠信著于羣后禮譲行于一方故玄冕九章為王之服昭其名也朱輪駟馬為王之馭昭其器也而又三吳百越列土分疆有民人焉有社稷焉恢祖禰之令圗實典禮之鉅著勸夫忠孝以御家邦今遣正議大夫守右散騎常侍上柱國賜𬗋金魚袋張煦上𥙷闕崔頌持莭備禮冊尓為吳越國王於戯品秩甚尊名數尢重肅廣庭而備物練吉日以覃㤙尓其正厥位事大以敬教民以順馭衆以㤙神其福之禮曰惟王建國諸侯所以守舊邦書曰惟帝念功王者于是出好爵匡我堯緒永為漢籓浙江如帯稽山如礪福祿無窮貽厥百丗汝往欽㦲對揚我休命是月内衙指揮使諸温以罪黜于温州是歲下令以境内田畆荒廢者縦民耕之公不加賦時王募民墾荒田勿取其租稅由是境内並無棄田或有請糾遺丁以増賦王命杖之國門民皆大恱庚戍三年春二月金陵以偽永安軍莭度使查文徽取福州遣劍州刺史陳誨泉州刺史彭城從効率兵犯我無諸王命指揮使潘審燔率師禦之遂生擒查文徽及行軍判官楊文憲䓁三十餘人斬馘萬計陳誨彭城從効等赱之𥘉福人告查文徽曰吳越兵已棄城去請公為帥文徽信之乃遣陳誨率水軍下閩江文徽自以歩騎繼至城下閩州刺史吳城詐遣兵數百出迎文徽而誨諫曰閩人多詐未可圗也宜立寨徐徐圗之文徽曰疑則生變不若乗機據其城乃引兵徑進誨整衆鳴鼓還于江湄吳城與潘審燔等勒兵大擊賊大敗之遂執文徽等士卒戦溺死者一萬餘人陳誨等率親部而遁是月甲午吳越國丞相中書令鄖國公杜建徽卒謚曰威烈建徽字延光新城縣人也祖仲明不仕累贈水部員外郎父稜賛忠去偽功臣両浙行軍司馬鎮海軍莭度副使常潤二州刺史𥘉八都建􅏢率郷黨以武安爲號時武肅王輔董庶人起石鏡鎮旋平彭城漢宏功業寖盛稜謂諸子曰吾每責人不過十罰則爲之傷心而觀錢公毎有斬决皆談笑是若成大事者是人也汝當事之必貴吾族稜遂歸于我光唘三年命征薛朗平之遂爲常州尋遷潤州乹寧中安仁義適東陽命􅏢率師討平之及武肅王以宣州䧏卒隷中軍號武勇都前後上右皆無賴􅏢常患之乃宻䟽曰狼子野心觀武勇将士終非大王所蓄碩以士人代之武肅王不聽及徐綰叛命使祭之旌其先見建徽即稜子也少強勇不與諸弟類嘗于山荘構小苑齋輒私署軍州押衙記于棟郷里見焉囙驚問于稜稜亦加責徽對曰大丈夫何止一軍事押衙邪始從軍無事人之志及稜歸武肅王乃從父命而盡心于我稜在常州爲淮人所逼徽馳赴父難不及境而城已㧞徽率所部還新登及稜自淮南歸軍中嚴整無改􅏢尢稱之徽累征伐皆单騎入陣賊衆無不披靡所至輒立大功軍中謂之虎子乹寜𥘉從征董庶人𬒳射中肩徽亦䏻戦開平中與武肅王弟鐸率師救姑蘇與敵遇囙逼河河梁上㫁乃鞭馬徑渡及岸馬斃遂瘞之號曰馬塜至今存焉徐綰之叛徽馳自新登以本部赴難因命守禦時賊将聚木焚北門徽使持火鈎取其木先焚之遂不淂聚賊計遂罷時有勸王東保㑹稽徽按劍曰事苟不濟當同死于此必東渡亦售命與賊耳武肅王納之睦州陳詢之貳于我也王以徽為詢􅊚婭頗疑之乃使馬綽伺其意徽曰陳氏負㤙背義自貽覆族之禍徽既􅊚婭義當見疑然累書以諭之皇天后土苟㦯見照則拔城獲書方明徽心耳俄有睦州㕔吏來䧏持徽所遺詢書至武肅王嘉歎之賜徽錢一百萬徽兄建思嘗譛徽于武肅言其第中蓄兵仗将爲異圗王使人閱之徽方食使者強抵徽卧内徽但食不頋使者還言于武肅王王感悟益加殊待及構第于城南王親與規畫徽性儉檏出入導從不過數人凡財物多散郷里親属武肅王每㑹人必指之曰此杜丞相今日塵忝多其力也忠獻王時其孫昭達爲内衙都監使盛治第宅強徽觀之曰乳臭兒不諳事乃尓後昭達果以罪誅徽及春秋髙尚䏻騎射嘗從擊毬于廣場興酣有宿中箭鏃自臂中飛出人皆壮之徽爲詩自叙曰中箭斫耳缺𬒳箭射牌過爲将湏有膽有膽即無價𥘉􅏢将亾散家財與諸子惟徽但受一笏稜曰此吾厯任所秉者惟汝䏻傳之徽㦄官自武安都将國子祭酒至涇源昭化等軍莭度使累官吳越國丞相兼中書令封鄖國公皆自國𥘉至忠獻王己來奏授也凡子弟孫姪多連􅊚公室朱𬗋車馬充溢門庭有國已來莫比其盛卒年八十八歲三月勅授王守尚書令増食邑二千户實封五百户夏四月王以查文徽等獻于五庿國人爲之聳觀先是征伐己來擒獲雖衆而獻俘之禮至是始備是月丙午王親享五廟六月勅授王兄東府安撫使弘儇知福州威勝軍事秋七月命弟弘億為東府安撫使冬十月王歸查文徽于金陵十一月朔日有蝕之是月漢少主遇弑是歲潭帥馬希廣為兄朗帥希萼導金陵以将邊鎬守之馬氏悉遷馬氏之族于金陵殺椘王而自立是月漢太后臨朝辛亥廣順元年春正月周太祖即位大赦改元廣順漢太后遷居西宫三月制授王諸道兵馬都元帥加食邑一千户實封三百户仍䧏尚書令冊禮夏四月王奉廢王居東府即越地王築宫室治園圃花卉山石池塘亭苑奉廢王日娛恱之歲時供饋甚加厚焉夏六月丙午武勝清海等軍莭度使王丗父元懿薨追謚曰宣恵以其子仁倣嗣元懿字秉徽武肅王苐五子母李氏懿有燕頷之相起家鎮海軍右直都知兵馬使尋授安國衣錦軍防遏指揮使累授檢校兵部尚書懿性至孝而純直其母常侍武肅王指令不稱旨𬒳捶自是成疾每疾發侍婢多厭倦惟懿不離上右雖糞溷亦親侍之嘗在衣錦城出逰諸野遇菖蒲花尋収之新㝎一日閭里間輒數䖏火起民頗憂恐有巫揚韞因之遂興妖言曰某日某䖏復當火灾皆如其言民由是競禱之懿謂上右曰火如巫言巫為火也宜殺之以息其姧于是命斬韞于市火遂絶貞明中自新定判東陽東陽之南有白砂神郡人畏而奉之每歲三月有大風雨自白砂起過郡城㦯言神本海龍每歲一復東海為怪壊民廬舍及懿臨郡夢朱衣言曰白砂王奉唘相國今以他適将由郡城且慮驚駭已由南山而去翌日風雨果如之人皆異焉頗喜逰宴彫􅎖之事文穆王襲國禮敬尢篤懿每飲酒及其半而傾于地文穆王囙宴乃致鈔鑼于懿前意成其事懿自是遂改累奏授賔睦二州刺史清海武勝等軍莭度使太傅同中書門下平章事金華郡王終年六十六在郡三十年𥘉懿為新定有卜士方氏時人號亀精嘗數卜以遺懿曰太乙接天河金華寳貝多郡侯六十六別䖏不經過至是果如其言是月命復王兄仁俊官爵壬子二年春二月制授王天下兵馬元帥増食邑二千户實封五百户改賜推誠保徳安邦致理忠正功臣夏四月朔日有蝕之勅衢州刺史王叔元璝知福州威勝軍事王弟弘偓為衢州刺史六月乙未王妣吳越國順徳太夫人吳氏薨追謚曰恭懿夫人錢唐人諱漢月中直指揮使吳珂女也㓜而婉㳤奉文穆王時恭穆夫人尢寵愛之夫人善胡琴性慈恵而莭儉頗尚黄老學居常𬒳道士服餘皆布絹而已每聞王决斷政事有及重刑者夫人常顰蹙以仁恕為言諸吳将有遷授皆峻阻之及其入對多加訓勵有過失者必面責之故諸吳終夫人之丗不甚䮦恣勅封吳越國順徳夫人薨年五十九秋八月勅葬恭懿夫人于錢唐慈雲嶺之西原九月甲寅朔丞相裴堅卒謚曰文憲堅字庭實吳興人父光庭累官至中書令有術士張景蔵䏻言休咎以紙大書台字以遺光庭不旬日果貶台州刺史大有政聱堅㓜明敏善属文及長有知人之鑒事吳越國有善政條教有方累官禮部尚書中書令拜吳越國丞相終年五十六冬十月朗州指揮使彭城言舉兵逐邉鎬克復湖南獻㨗于朝廷朝廷以為武平莭度制置武安等軍事囙遷湖南莭制府于朗州癸丑三年春二月湖州所隷建州䧏卒鄭懐嵩䓁十一人以刺史散香于資福寺遂率其黨二百餘人作亂即日盡誅之三月勅授王起復鎮東大将軍上金吾衛上将軍員外置同正員王以兄弘儇為温州刺史夏四月建報㤙元教寺于城北薦王妣也王親閱内外諸軍非驍勇皆停放之冬十月大閲馬步軍艛艣于碧波亭十一月命弟弘仰為台州刺史十二月湖南王達舉兵執朗州彭城言囚之朝廷尋授王達湖南莭度是歲東陽有大象自南方來陷陂湖而獲之境内大旱民有鬻男女者命出粟帛贖之歸其父母仍命所在開倉賑䘏甲寅顯徳元年春正月丙子朔周主祀圓丘改元是月周太祖崩晉王即位是為丗宗夏五月王命鑄王妣恭懿太夫人銅容二致于奉國金地二尼寺秋七月勅遣使加授王天下兵馬都元帥仍賜金印冬十一月勅遣進奏使章思忠歸諭機事航艦不利思忠溺焉是月漢主殂子鈞嗣乙卯二年春二月朔日有蝕之三月制加王食邑一千户實封四百户夏四月庚子王親祀五庿秋七月庚午有虹入天長樓樓在内城之東王避寝于思忠堂九月王復于天寵堂閏月丁酉丗子惟濬生冬十月勅遣司空李糓率師伐金陵十二月王遣使入貢勅王出兵㑹擊金陵是月王師渡淮丙辰三年春正月車駕東征詔王以國兵分路進討是月南擊場門樓火金陵李璟僣稱唐皇帝致書于京師仍令偽皇太弟璲致書于統帥李糓又遣偽宰相孫晟等入貢二月王師入淮南静海軍制置使姚彦洪率家属軍士户口䓁一萬餘人奔于王是月王命丞相吳程前衢州刺史鮑修譲等攻毘陵命都指揮使路彦銖䓁伐宣城命都指揮使羅晟等督水師次江隂以應我師也既而勅遣殿直薛有光來宣諭仍賜沿身衣冠法物三月我師克常州生擒趙史趙澤偏将諸承向重覇等一百餘人遂班師時營田副使陳滿言于丞相吳程曰周師南征舉國驚優常州無備易取也吳程如其言請于王從之丞相元徳昭上曰唐大國未可輕舉也若我入唐而周師不至䏻無慮乎吳程固争王遂遣程取常州也是月金陵遣偽燕王弘兾服㩀淮南王命從弟蘇州刺史文奉爲應援都統使屯于本州備徴彂夏五月建州刺史陳誨以小船沿溪而下福州指揮使馬進姚章䓁執于賊未㡬陳誨亦宵遁是月車駕還京六月王命兄仁俊復知福州彰武軍事秋九月癸卯王親閱于龍山教場冬十月駕親征夀春是歲始括境内民丁益師旅也丁已四年春正月始議鑄錢三月我師大敗淮人于夀春夏四月宣諭使薛有光從航海歸于京師是月周主還大梁秋七月王命弟弘信為衢州刺史八月勅遣諫議大夫尹日就至賜王生辰御服紅𫀆二副冬十一月駕復東征是月泉州刺史彭城從効修貢于京師附我以聞詔從之戊午五年春正月丁未前衢州刺史王弟弘偓卒偓字賛堯文穆王苐十二子也母陳氏偓性仁慈事母以恭勤聞及為信郡時屬歲旱部民将逐食于他郡不忍別偓俱詣郡㕔告白而玄偓為之流涕其為政寛恕厚重王加友愛尢䔍及卒中外無不歎惜終年二十五歲二月王師復維揚勅遣殿直趙誨来宣諭仍出艛艣于瓜步迎鑾長風沙䓁䖏王師欲濟江乃命上直都指揮使邵可遷路彦銖䓁率艦四百艘水師二萬以㑹之江北諸郡悉平三月王不康是月勅命翰林學士都承旨陶糓司天監趙修已賜王羊馬槖駞每歲班賜自此始也是月金陵李陵復称江南國主遣偽臨汝郡公徐遼宰相馮延已奉表称臣于行在𥘉金陵之将内附也王亦飛書以諭之既而璟䓁亦附我也王亦以誠𣢾聞詔從之王師乃罷夏四月辛酉城南火延扵内城王出居都城驛詰旦烟焰未息将焚鎮國倉王親率上右至瑞石山命酒以祝之曰不糓不徳天降之灾宫室己矣而倉廪儲積盖師旅之備實所痛惜若盡焚之民命安仰天其鑒之乃命從官伐林木以絶其勢火遂滅即日王見丞相已下罪已之不暇且曰吾旬月所苦尢至而灾釁之餘遂覺康𥙿中外聞之頓安是月王命弟弘儀復為東府安撫使是月勅遣天下都軍頭周廣来宣諭仍賜邵可遷䓁及将士衣服有差五月朔日有蝕之唐主去帝賜奉周正朔六月戊寅前台州刺史王弟弘仰卒詔追謚曰成顕仰文穆王苐十三子也母周氏仰性嚴急善騎射通儒術䏻書寫及為郡吏民畏服性雖嚴急而政事寛蕳有異政無私曲而民畏愛終年二十四秋八月勅遣閤門使曹彬賜王兵甲旗幟等是月乙己王遷于思政堂是月南漢主殂子鋹嗣已未六年春二月王遣丞相元徳昭寜國軍莭度使吳延福入貢京師夏四月駕親征幽并是月勅陞湖州為宣徳軍授王兄弘偡特進檢校太尉充本軍莭度使五月熒惑守心六月周丗宗崩少主即位秋八月制加王食邑一千户實封四百户仍改賜崇仁昭徳宣忠保慶扶天翊亮㓛臣又勅王妃孫氏為吳越國賢徳夫人王丗子惟濬為鎮海鎮東䓁軍莭度副使檢校太保冬十月王重建功臣堂庚申建隆元年春正月癸巳今大宋皇帝受禪大赦改元封周少主為梁王勅遣使來宣諭二月王但用今名避廟諱也三月建大慶堂成王舊邸也堂廣寛髙大凡一百間奐然新之王命新勒碑文以紀其事夏四月勅授王天下兵馬大元師加食邑千户實封五百户五月昭義軍莭度使李筠叛是月駕親征六月勅加吳越國賢徳夫人吴氏為賢徳順穆夫人又授両軍莭度副使王丗子惟濬金𬗋光祿大夫檢校太保充莭度使又勅陞明州為奉國軍授王弟弘億金紫光祿大夫檢校太保充本軍莭度使秋七月潞州平勅遣通事舍人武懐莭來宣諭九月楊州莭度使李重進叛車駕東征王以寜國軍莭度王舅吳延福䓁有罪並除名配外郡延福䓁兄弟五人俱有異圗上右将校勸王誅之王曰吾以先太夫人同氣之故安忍置之于法言訖遂嗚咽垂涕衆皆称賀于是黜延福䓁于外郡以全吳氏之族是月王遣上直都指揮使孫承佑率師至潤以迎應之冬十一月揚州平勅遣通事舍人王繼筠丁徳𥙿來宣諭仍賜國信是月又勅遣西上閤門副使武懐莭來宣諭王命衢州刺史從弟弘信入貢自太祖革命王有貢奉即加常數太祖禮之亦異于常十二月駕還京是月王遷于功臣堂辛酉二年春二月江南國主李景遷國于豫章三月勅遣使丁徳𥙿送王弟弘信回仍賜王戦馬二百疋羊五百口駞二十頭夏六月豫章李景殂子煜嗣位于金陵秋七月昭憲皇后遣使來宣告境内自五月至是月不雨王命取龍湫于天台山以祈雨九月始榷酤冬十二月王命弟弘信復為衢州刺史壬戌三年春二月勅遣右殿直王蓍來宣諭仍賜國信夏五月東陽信要新㝎三郡民灾王遣使賑䘏秋七月大風㧞木八月泉州彭城從効為大将張漢思所弑漢思自称權知清源軍事九月庚戍夜本境地震饗如雷冬十月勅遣上殿直景徳倫授両鎮莭度王世子惟濬為邕州建武軍莭度使是月勅遣西上閤門副使武懐莭至朝廷以泉州張漢思不稟朝命俾王責之翌日王遣使往責之漢思遂從命焉癸亥四年春三月朔日有蝕之是月王師盡取荆湘之地𥘉番禺衡州刺史張文表侵湖南朝廷援之遂執文表及班師遂取二地荆師髙繼冲潭帥周保權並入于京師夏四月泉州張漢思為西門指揮使陳洪進所幽洪進歸命于王王請命于朝遂授洪進平海軍莭度使檢校太傅秋九月重建天寵堂是月王閱艛艣于西湖賜内外将校服帯有差冬十月獲巨魚于江壖長九丈六尺十一月太祖有事南郊大赦改元乹徳勅遣引進使丁徳𥙿來宣諭仍加王食邑一千户實封四百户改賜承家保國宣徳守道忠貞恭順功臣又加建武軍莭度使王子惟濬檢校太尉十二月孝明皇后崩勅遣使來宣告是月王命姪昱入貢是月王命姪郁為秀州刺史甲子乹徳二年春正月大雨震電二月朔日有食之三月制王起復天下兵馬都元帥加食邑一千户實封四百户夏四月重建城南寳塔寺成鑄武肅王文穆王忠獻王銅容供于寺秋八月王命迎釋迦佛像歸于塔所是月王駕復天寵堂謂丞相已下曰頃以寡徳遂貽灾釁曽未十年中外如斯實宗庿之休尓䓁之力然作之者勞吾不敢忘更賴尓䓁以副不逮丞相已下咸稱大慶冬十一月王師伐蜀王命親從都指揮使行軍司馬孫承祐䓁率師㑹焉乙丑三年春正月西川平蜀主孟昶入于京師二月朔日有蝕之王命姪台州刾史昱入賀秋七月有虎出于龍山凡傷數十人捕之數旬而獲八月重建寳塔寺于城北是月勅遣通事舍人張延通來宣諭仍賜生辰禮物甲寅吳越國丞相吳程卒追謚曰忠烈程字正臣山隂人也祖可信㝎州虞唐縣令父蜕大順中登進士觧褐㮄宫鎮東軍莭度掌書記右拾遺累官禮部尚書程起家校書郎武肅王承制累授檢校户部員外郎借緋長興𥘉王女将選婚于士族乃以孟粲于葆暨程等三人見于王庭武肅王熟視程乃選之起家校書郎遷檢校金部郎中借金𬗋武肅王以程有吏術因命提舉諸司公事文穆王襲國奏授程為軄方郎中觀察莭使莭度判官天福中文穆王子儇遥典睦州命程知睦州事忠獻王以程判西府院事尋拜丞相福州李孺贇伏誅授程威武軍莭度使乹祐三年淮人侵福州程授諸軍莭度獲其将查文徽𥘉淮人方薄閩城授甲于将卒而将卒充溢庭廡紛然不可遏程因登檻瞋目叱之衆皆股慄自是軍政嚴肅程始在東越以父䕃不事苦學有謂程曰觀子骨法不与羣儒類但恨他日登将相不長談論耳程遂勤學文穆王時有西府院官滕擕嘗夢程化為赤龍望南方而去擕囙語其夢于人曰吳氏子孫非我所測也及為福州始騐其兆尋以國用繁廣乃命程兼掌屯田㩁酤事乹徳𥘉程夢一羽人布䇿于前曰計字之算而所遺者三果三載而卒年七十三歲冬十一月王命從叔前知福州彰武軍事元璝為睦州刺史姪昱復為台州刺史丙寅四年春二月宣徳軍莭度使同平章事王兄弘偡卒追謚曰恭偡字恵達文穆王苐八子也母陳氏起家内衙諸軍都知兵馬使檢校司空年十八出為湖州刺史有妖巫登衙門大樹恣為鬼神語州人皆驚畏偡曰妖由人興乃命注弩而射之巫果請命因鞭之州人咸服偡明吏術䏻為詩頗有竒句王嗣位恭敬尢甚顯徳中王城灾悉以器用服玩上之累奏授特進檢校太尉宣徳軍莭度使建隆𥘉勅授同中書門下平章事終年三十八先是大星隕于西北月餘而偡終焉丁卯五年春三月五星聚奎如連珠在降婁之次太平之兆也是月建武軍莭度使检校太尉王子惟濬入貢而還齎賜吳越國賢徳順穆夫人珠翠冠帔等冬十月王又遣元帥府掌書記黄夷蕳入貢是月勅遣使至賜王生辰禮物戊辰六年春正月皇帝郊禋禮畢大赦改元開寳秋七月北漢主殂養子繼㤙嗣九月漢将侯覇榮弑其主而以繼元嗣是月勅遣使至賜王生辰禮物己己開寳二年春正月制加王食邑三千户實封六百户是月遼主明扆嗣位秋八月勅遣使至賜王生辰禮物并御衣紅袍一副金鏁甲一副及駞馬一百頭庚午三年春三月王親享五庿秋九月王遣子惟濬入貢是月詔王出師伐富州王将起師尋以路逺詔止之辛未四年秋九月勅遣使賜王生辰禮物衣冠劍佩䓁冬十一月皇帝南郊制加王食邑二千户實封六百户仍改賜開吳鎮海崇文耀武宣徳守道㓛臣壬中五年春三月建武軍莭度使檢校太尉王丗子惟濬貢奉歸又齎賜吳越國賢徳順穆夫人珠翠冠帔各一副秋九月王遣元帥府掌書記黄夷簡入貢太祖謂夷蕳曰汝歸語元帥當訓練兵甲江南倔強不來朝我将討之元帥當助我無信人言唇亾齒寒王宻表謝且請師期冬十月王親享五廟復謁寳塔寺拜先王銅容十二月彰武軍莭度使睦州刾史王叔元璝卒璝少強直好詩學武及長從征有功屢授是任凡在王麾下畏服嚴明無有敢犯者䖏兄弟雖各守郡軍中未嘗有相逆詐侍文穆王及王亦盡臣禮如此上下和睦卒年六十七歲癸酉六年秋八月勅遣使賜王玉帯一條御衣一襲及生辰禮物冬十一月二日大雪雪氣如煙甲戌七年夏五月勅遣進奏使錢文贄賜王襲衣玉帯玉鞍勒馬各一事金器二百兩銀器三千兩錦繡一千叚秋七月勅詔王取常州詔曰勅錢朕統御萬邦撫臨兆庶推至誠而待物期率土以歸心布恵行仁是予本志興師動衆非我碩為彼江南言修臣禮乆𬒳撫綏之化頗傾依附之心貢封章則惟見恭勤脩外貌則多從减降既云事大每欲􅊶荒甘言嘗信其赤心内稔豈疑其奸計而又叠傾誠𣢾碩䧏冊封既禮分之未虧故我心之無間使人頻至詞旨愈􅌹是以特降近臣俾其略來赴闕頒宣優厚㤙禮殊隆何期終日包蔵一旦彰露不惟多方託故懇避來朝而乃修葺城池選練軍旅教習戦陣抽點郷兵為捍拒之計謀作攻守之凖備朝廷養冦垂二十年心狠貌恭突然自敗向展為臣之禮適兹觀釁之方每云傾輸盡彰狡詐既行問罪湏至興師今者禁衛出兵雲䑓選将尅期攻取直抵昇州卿任重統戎心專盪冦况早者曽披章奏具𫐠事宜今騐奸兇果符陳請開兹討伐必罄忠厪今候丁徳𥙿到彼住三五日可部領軍士起彂且往攻取常州毘倚之懐寤寐無已故兹詔示想宜知悉是月王宻遣行軍司馬孫承祐入奏機事九月孫承祐自朝京齎宻詔回師期定矣王即日命境内訓練士卒揀閱兵甲是􅜪勅遣内客使丁徳𥙿賜王生辰禮物冬十月勅授王東南面招討制置使仍賜御劍一口御甲一副金鞍御馬一匹仍命丁徳𥙿為行營兵馬都監又以雲騎雄㨗䓁指揮歩兵凡千人輔王進攻常州是月庚申王親率鎮國鎮東親從上直等都指揮使王諤等五萬餘人發自國城丁徳𥙿爲先鋒使是日天氣晴和風色便順癸亥次嘉禾有氣黒色形如覆舟當行府之上占者曰王氣也丙寅王率諸軍入毗陵前鋒所至賊望風而遁有獲巨亀于旌門之下占者曰玄武之應也戊辰王次毘陵遂克關城常人以牙城自守王命營于九仙墩命親從指揮使凌超等分營回門命鎮國都指揮使王諤攻江陰鎮武都指揮使金彦滔攻宜陽並率水艦由吳興出太湖而進十一月詔遣弓箭使王文寳來宣諭仍賜湯薬以金盒盛封至是王遷行府于賊城南門金彦滔克宜興獲其令尉等官士卒凡二百五十人馬八十匹王即命金彦滔獻于京師十二月癸亥王親率軍将攻抜利城寨殺賊軍二千餘人生擒六百餘人辛未又敗賊萬餘人于城北金陵大将盧綘宵遁先是城中既危金陵遣大将盧絳率萬人来救至是敗之盧綘僅以身免翌日王命鈐轄使沈承禮等並告于京師乙亥八年春二月詔遣内直使陳理来宣諭仍以戎服五萬副賜王軍卒又賜王将帥服帯器帛有差是月王親率大軍攻其壘不克夏四月我師復大攻城壘時偽知常州軍州事禹萬誠遣觀察使推官鄭蕳䧏𣢾于軍門且請命焉王從其請萬誠等詣行府待罪王賜衣冠器幣等悉送于京師以請命又命羊酒置其家以安慰之一日江陰寜遠䓁軍沿江石槗䓁寨軍兵来降王悉宥之是月勅遣使来宣諭授王守太師加食邑六千户實封九百户仍賜湯薬及沿身法物等五月詔客省使丁徳𥙿權知常州仍又遣勅上侍禁李輝賜王襲衣玉帯玉鞍勒馬各一事金器二千両銀器一萬両錦綵一萬叚詔王歸國是月王遣両浙諸軍都鈐轄使沈承禮等攻金陵仍表上之詔書褒奨焉先是毘陵来降士卒凡三千餘人至是悉分還本部冬十一月我師克金陵偽主李煜出䧏是日冬至軍中皆㑹飲承禮謂諸将士曰城中以我莭序必有讌享備我怠矣我當直出其不意以圗之乃召勇敢士卒以火攻焚其城及城陷其東門士卒賈勇攀壘以上我師覩之遂復攻其南而李煜危廹遂出降焉是月王乃表賀之王復遣大将孫承祐上表請入覲十二月王克金陵有㓛勅遣東頭供奉官徐靖齎賜王綵錦八對御衣一副金盔一頂金甲一副御酒一百瓶駞馬三百匹仍賜御劄一通褒焉又賜王麾下孫承祐為平江軍莭度使沈承禮為寜海軍莭度使又賜為防禦使者三人為刺史者六人賞克金陵之功也是月詔許王入覲焉勅錢省所差鎮東軍支使王通今月二十八日赱馬到闕奏今月十五日偽命知常州禹萬誠䓁歸附已安撫城中事具悉卿位髙王覇天付将材門専衛社之勲丗著勤王之莭一昨親提銳旅取彼堅城勢孤而既絶援兵力盡而遂輸降𣢾遽厯寒暄之候遂成克復之功永増史冊之光輝實恊君親之任委其為嘉賞不捨寐興故兹奨諭想宜知悉丙子九年春正月庚申王彂自國城先是太祖皇帝囙王入覲勅遣供奉宫張福貴淮南轉運使彭城徳言開古河一道自瓜州口至潤州紅口達龍舟堰以待王舟楫其堰遂名曰大通堰又于京城之南勅建大苐連亘數坊棟宇宏䴡儲峙什物供帳之類皆供御賜名曰禮賢宅以俟王駐莭焉二月辛丑王次寳應勅遣引進使翟守素至賜王湯薬以金盒盛之又賜金鞍轡馬二疋仍押御厨儀鸞翰林皆至焉甲辰王次洄州勅遣内臣至賜馬三百匹駞一百頭以載行李􅉝亥又遣内司賔洎内臣至賜王夫人孫氏湯薬二金盒法酒五十瓶茶果五十合是日次近畿皇帝詔山南東道莭度使興元尹皇子秦王徳昭迎勞仍賜法酒一百瓶果子一百盒翌日王至京師詔興元尹賜宴于迎春苑尋詔王居禮賢宅並以賜焉王未至之先太祖親幸其宅閱視㤙禮如此戊午王朝見于崇徳殿進賀平江南及允朝覲表貢奉犀玉帯及寳玉金器五千餘事上酒一千瓶遂賜宴于長春殿席就幄次賜金照匣金沙鑼及瓶盤等物皆御物也己未王進謝詔宴于後苑丙寅駕幸禮賢宅賜金二千両銀三萬両絹二萬疋又賜王丗子建武軍莭度使惟濬及陪臣通儒學士崔仁兾等絹帛有差是日王遣丗子又進通犀帯二條金玉寳器五千事三月制賜王劍履上殿詔書不名進封王夫人孫氏為吳越國王妃封王女為彭城郡君仍詔内臣賜王妃湯薬法酒茶果䓁五百餘事翌日宰臣上言異姓諸侯王無封妻為妃之典上曰行自我朝盖旌忠賢何必古也時又詔王宴于苑中獨太宗秦王侍坐酒酣上命与太宗秦王叙昆仲之禮王叩頭陳譲再四翌日太祖将幸洛陽詔王歸國王懇請随駕詔不許惟留王子惟濬從行是月王奉辭詔遣賜金器二千兩銀器一萬兩銀三萬両對衣玉束帯玉鞍轡御馬一疋細馬五疋綾羅叚錦共八萬疋戎装器八百事散馬一百疋衙隊腰帯絡縫衫䓁二千事又賜王麾下将師䓁官錢帛有差太祖謂王曰南北風土炎暑不同宜加調護卿可早歸又親賜宻封黄綾包袱一封謂曰卿至途中宜宻視之王涕泣進言碩三歲一朝上曰川途紆逺當俟我詔旨即来次日王妃入辭中宫賜金器三百両衣着二千疋銀二千両是月甲戍王離京師詔秦王賜宴于宜春院勅遣引進使翟守素押翰林御厨儀鸞送至睢陽次日又遣入内小底承馹至賜王湯薬二金盒王妃湯薬一金盒戊子王在舟中再拜宻開所賜黄袱視之俱是羣臣乞留王章䟽也王既入朝文武郡臣屢上䟽諫乞留王在朝免歸國恐王有異圖太祖知王忠厚謹慎小心畏敬固不允及王起行時宻以賜焉太祖寛宏大度㤙禮愈深如此夏四月丙辰王至自國城丙寅王命子惟治詣闕謝恩即日王視事移座于東偏謂上右曰西北者神京在焉天威不違顔咫尺豈敢寜居乎五月太祖郊畢制加王食邑三千户實封一千户秋八月勅遣進奏使任知杲至賜國信及生辰禮物冬十月太祖宴駕太宗即位大赦改元太平興國勅詔以封命勅王以廷羙爲開封尹封齊王徳昭爲武功郡王徳芳爲興元尹又勅遣侍御史雷徳驤来告哀王率府寮将校等發哀王二日不食十一日不視事十一月王遣元帥府衙内都指揮使王子惟渲齎通天犀帯一條金器五百事玳瑁器五百事塗金銀香龍䓁巨萬詣闕以為賀禮是月勅遣摳宻都承旨武珍制加王食邑五千户實封一千户仍賜亀魚寳帯襲衣䓁是月日吳越國王妃孫氏薨丁丑太平興國二年春二月勅遣給事中程羽来歸王妃之賵謚王妃曰夏五月王下令以文軌大同封疆無患凡百禦敵之制悉命除之境内諸州城有白露屋及防城物亦令徹去之秋八月詔遣翰林學士都承旨李昉賜王生辰禮物是月王遣両軍莭度使丗子惟濬入朝修覲禮也戊寅三年春二月六日王發國城三月二日次揚州勅遣閤門使梁㢠内班閻承翰来賜王湯薬茶酒及押諸司官迎接七日次洪澤驛勅遣供奉官李思彦至賜王湯薬一金盒王鞍轡馬一疋散馬三十疋玳瑁戎毛暖衣䓁物及賜從行将校有差十五日王次宿州又遣入内小底副行首蔡守㤙齎詔至仍賜王龍茶三斤以金盒盛之御酒二十瓶荔枝鵞梨石榴共六百顆以銀装籠子盛封十七日王次永城時太宗勅遣王丗子両軍莭度使惟濬迎候以内班李神祐領翰林儀鸞御厨諸司随丗子至賜御筵一席是日王遣平江莭度使孫承祐先齎表詣闕陳謝是月二十三日王次陳留孫承祐復自京至傳宣撫問二更閤門使梁㢠又至復傳宣撫問二十四日王至京師勅詔皇太弟開封尹廷羙賜宴子迎春苑仍遣賜王對衣八事玉排方腰帯金器一千両銀器一萬両細衣三千疋玉鞍轡馬一匹是日王安居于禮賢宅二十六日朝見于崇徳殿謝㤙及謝差親王迎接賜宴于長春殿王進上法酒五百瓶金器銀器三千両綾錦一萬龍鳳香䓁二萬翌日遣使賜王生料羊二百口法酒三百瓶粳米二百石雜買錢一萬緡草料柴炭称是又賜從行将校䓁官錢三萬緍二十九日遣内司賔来賜果子三十盒法酒一百瓶蒸羊食物等十匱三十日詔王宴于後苑王復進寳玉金銀酒器䓁三千両通犀帯一條龍鳳亀魚帯六事時太宗命射每中的者即進金銀器三百両太宗中的者六夏四月八日詔王宴于崇徳殿二十三日宴王于後苑二十六日詔宴王于南郊御荘王又上酒器金銀器皿䓁共三千餘両王酒酣至暮而歸次日遣内司賔賜王御衣紅𫀆一副綵衣六事寳帯一條金銀酒器三千両細馬四疋御馬一疋儀鸞一副是日王拜表謝㤙仍請以吴越封疆歸于有司曰伏有􅈤誠貯于肺腑幸因入覲輒敢上言盖虞神道之害盈必冀天時之從欲臣近蒙賜以劍履上殿詔書不名仍以本道領募卒徒嘗營戈甲特建國王之號俾増師律之嚴皆所以假其寵名詫于隣敵方今幅員無外名數洞分豈可冒居自罹公議合從省罷以正䓁威除本道軍士甲器巳曽奏納外所有封吳越國王及天下兵馬大元帥軄名並乞觧罷凡頒詔命悉碩呼名庶聖朝無虚授之㤙微臣免疾顛之禍優詔不允五月三日遣内使賜王湯薬四金盒金器二百両銀三千両次日王再上言曰臣慶遇承平之運遠修肆覲之儀宸眷弥隆寵章皆極斗筲之量實覺滿盈丹赤之誠輒兹披露臣㐲念祖丗以来親提義旅尊戴中京畧有両浙之土田討平四方之僣逆此際盖隔朝天之路莫諧請吏之心然而禀號令于闕廷保封疆于邊徼家丗承襲已及百年今者幸遇皇帝陛下嗣守丕基削平諸夏凡在幅員之内悉歸輿地之圗獨臣一邦僻在江表軄貢雖陳于外府版籍未歸于有司尚令吳越之民猶隔陶唐之化太陽委照不及蔀家春雷彂聲尚為聾俗則臣實使然也罪莫大焉不勝大碩願以所部十三州獻于下執事其間地里名數別具條析以聞伏望陛下念奕丗之忠勤察乃心之傾向特䧏明詔允兹至誠是月六日乃下䛇詔曰卿丗濟忠貞志遵憲度承百年之堂搆有千里之江山自朕纂臨来脩覲禮覩文物之全盛嘉書軌之混同碩親日月之光遽忘江海之志甲兵艛艣既悉上于有司山川土田又盡獻于天府舉宗效順前代所無書之蕳編永彰忠烈所請宜依于是所部州十三縣八十六户五十五萬七百兵一十一萬五千暨民籍倉庫盡獻于朝帝御崇元殿受之是日王麾下将佐軍校聞之皆慟哭曰吾王不歸矣勅陞揚州為淮海國制王依前守太師尚書令兼中書令改封王為淮海國王食邑一萬户實封一千户充天下兵馬大元帥仍改賜寜淮鎮海崇文耀武宣徳守道功臣以王弟弘儀為觀察使弘信為觀察使又以両鎮莭度撿校太尉兼侍中王子惟濬為淮南莭度使惟治為莭度使十三日賜王淮海國王金印一面仍賜禮賢宅為永業十五日又授王子惟演惟灝及未官者子弟并麾下将校孫承祐沈承禮䓁為莭度使䓁官有差又賜賔幕宰相而下拜官者又二千四人人二十三日詔王宴于長春殿至暮歸第六月四日詔王宴于後苑命丗子惟濬侍坐泛舟于宫池十五日遣入内小底賜王湯薬四盒對衣四事八寳玉帯二條泫酒一百瓶二十四日詔王宴于御荘秋七月命京城張燈于王宅第前後賜設燈山陳聲楽以寵之十八日詔王宴于崇徳殿命王丗子惟濬侍坐焉二十六日遣使至王第慰問仍賜茶薬一金盒八月六日詔王緦麻以上親並赴闕授以官爵九月命以杭州伶人馬迎㤙䓁四十五人賜王俾旦夕宴楽有差十四日詔王宴于後苑泛逰宫池二十四日遣内使賜王生辰禮物九月九日詔王大宴于長春殿歡楽終日二十日玊忽染風疾太宗傳宣旦夕遣使撫問二十五日又遣内司賔賜王茶果湯藥等冬十月七日王進朝謝賜宴于後苑十一月朔太宗南郊禮畢詔加王食邑二千户實封一百户十二月八日遣使賜王蒸羊食物茶果等共十二匱法酒一百瓶二十五日詔王宴于長春殿至暮歸第時輟御前二大燭送焉己夘四年春二月朔日王進朝賀大宴于苑中太宗頋王甚厚飲必命釂王大醉及罷拜不䏻興太宗仍以金装擔子送王歸第仍以賜之是月車駕征太原王請從行翌日詔中使別押諸司供帳御厨從王太宗每旦夕傳宣撫諭錫賚殆無虚日王小心謹慎每晨趨行闕必先至宫門假寝以待旦一日夜漏四鼓清蹕啓行時風雨大作諸節鎮無一人至者太宗見王與惟濬丗子稱嘆乆之謂王曰卿以中年宜避風冷自今入見不湏太早仍輟御前四大燭賜焉又召王旦夕宴飲一日中頓賜王從官酒食及賜衛士羊肩巵酒觀其飲啖太宗見其雄壮因頋王王進曰正所謂如虎如貔如㷱上大恱翌日㑹彭城繼元降上御連城臺誅軍中先亾命于太原者時大臣皆侍坐太宗頋謂王曰卿䏻保全一方以歸於我兵不血刃深可嘉也王稽顙陳謝仍賜紅袍一副玉鞍轡馬一疋細馬二疋又賜王丗子惟濬細馬一疋綵衣一副秋七月車駕凱旋大行封賞中書進擬加王食邑一萬户實封一千户以麻卷入御筆改増加王二萬户實封二千户是月二十六日王進朝賀進金銀器三千兩錦綺二百疋即宴王于苑中乂命王丗子惟濬侍坐八月二十四日遣中使賜王生辰禮物冬十月六日遣内使賜王法酒二百瓶御食八匱十一月十二日宴王于長春樓十二月十九日詔王宴于崇徳殿酒酣至暮歸第庚辰五年春正月太宗御朝元殿受朝賀時王以劍履升殿觀者榮之三月清明節太宗召王御大明殿乗馬擊毬凡五籌仍以毬仗引毬以授王俾王擊之是日宴于殿廡飲必唱籌頋謂王曰卿中年宜以此娱况今清明令節宜加衛䕶王稽顙陳謝夏四月一日王以風疾告假遣御醫中使一日三至第仍賜湯薬茶果間日一至其㤙禮如此六月三日車駕親幸禮賢宅撫慰再四仍賜金器一千兩錢一萬索銀一萬兩綾絹一萬疋王遣子惟治進謝秋八月十一日車駕又臨撫慰親賜湯薬二金盒二十三日遣中使賜王生辰禮物九月十一日王進朝謝于崇徳殿復上金装定器二千事水晶瑪碯寳装器皿二十事珊瑚樹一株冬十月二十一日詔王宴于朝元殿至暮又以金装肩輿送王歸第仍以賜焉又以御前二大燭前導十一月戊午駕幸大明府王請從駕詔許賜王肩舁從行七日太宗獵于城之東時風寒頗嚴令中使傳宣俾王先囘是月二十日車駕還京辛己六年春正月王風恙復作遣尚醫中使絡繹而至自是賜王免朝二月太宗南郊禮畢制加王食邑一萬戸實封一千户夏五月王尚在風疾遣中使以𬗋白水晶碁子盛以金合雜寳文楸碁抨賜王且諭云朕萬機之暇頗曽留意卿疾未痊宜用此自怡一日内臣趙海嘗𬒳酒詣王府第将吏以為傳詔者亟禀于王即進寝室見之海因問王疾恙何如王曰足疾己久沉痼今又加之風眩海探懐中出薬百粒以奉王時王方命茶盡餌之諸子孫及上右惶懼憂駭計無所出海既去家人泣盖有所疑也王笑曰主上待我甚厚中貴必良薬也翌日太宗聞之大驚即遣中使撫慰乃杖海脊二十桎梏坐海於王第門者三日然後流於海島王遣丗子惟濬陳謝太宗撫問久之又賜湯薬一金盒六月十一日王復貢黄金三千両白金二萬両秋八月二十四日遣内使賜王生辰禮物翌日駕幸禮賢宅王疾尚未痊出迎拜不䏻興太宗親曳之撫問再四王侍坐進茶太宗仍賜細茶果二十盒袪風泫酒二十瓶又賜王子以下絹帛有差冬十月一日王朝謝于文徳殿太宗大恱擕手撫問良久遂賜宴于長春殿謂王曰卿恙稍可天氣嚴寒宜避風冷自後免入朝王稽顙陳謝十二月三日遣中使賜獸炭一千担柴米稱是壬午七年春三月太宗貶秦王廷羙爲西京留守夏四月王風疾復彂太宗遣中使慰問賜王湯薬一金盒乂遣入内小底以龍鳳蕭笛娱王終日秋八月二十四日遣中使賜王生辰禮物翌日王遣子惟灝進謝貢金銀器皿五千両冬十二月朔日有蝕之癸未八年春正月十三日遣中使賜王珍珠寳燈一座仍命坊市張燈于王第前後俾王怡恱三月三日詔加王食邑二千户實封五百户夏五月遣内使賜王珍珠黄羅傘一龍香凉茶二十斤秋八月二十三日遣使賜王生辰禮物翌日王遣丗子惟濬貢上白龍腦香一百斤金銀陶器五百事銀二萬両黄金一千両冬十一月王以天下無事兵革偃息乃譲大元帥及國封表上但許罷兵柄其國封如故仍加王食邑三千户實封五百户十二月六日遣中使賜御筵一席以儀鵉迎送王第近代無比甲申雍熈元年春二月二日上幸太乙宫路由禮賢宅王力疾出見於道旁上駐輦撫諭至於再三及駕還命取他路還遣中使諭王恐煩迎接經由他路歸矣太宗寵愛愈隆夏四月十三日遣中使賜湯薬二金盒秋八月二十三日遣中使賜王生辰禮物冬十月華山陳摶號希夷先生謁王王問先生得飬生元黙之道摶曰山野之人何知神仙黄白之術也十二月十一日太宗郊禋禮畢進封王為漢南國王加食邑二千户實封四百户仍改賜寕海鎮國崇文耀武宣徳守道功臣乙酉二年春正月太宗以王善於草隷遣中使取王草書筆迹王以風恙手不䏻握筆命将往時所書絹圗草字遣丗子惟濬同中使以進下詔奨諭仍賜金匣玉硯一副龍鳯墨一百鋌紅緑筆一千管盈文𥿄二百軸細白絹三百疋幕府宰相洎朝中大臣文士撰恩賜漢南王金匣玉硯詩文進上觀覧命黄絹圗本遣使賜王夏四月召王宴于後苑帝曰春氣暄和萬物暢茂四海安寕朕當以天下之楽為楽宜令賞花賦詩也五月駕幸禮賢宅撫慰久之又命王取平日所書隷書觀看太宗大恱收取數幅翌日遣中使賜王御筆一百枝龍墨二十鋌紅袍一副秋八月二十三日遣中使賜王生辰禮物九月九日召王扶疾宴于崇徳殿是日椘王元佐廢為庶人元佐太宗長也聰敏鍾愛之因力救秦王廷美貶不觧遂彂狂㑹重九宴諸王元佐疾未差不預召遂恚曰是棄我也乃夜縦火燒其宫太宗怒詔廢之冬十月遣内使賜王夫人龍鳳珠冠一頂金三百銀二千両十一月十五日遣中使賜王幕府将校幣帛又加授王子惟治等九人官爵有差丙戍四年春二月太宗以王疾未痊詔免入朝改封南陽國王仍賜領南陽節鉞加食邑二千户實封一千户麻降王復抗表陳譲國事表四上夏四月王将赴南陽詔免入辭賜御衣一副襲衣玉束帯一條金器一千両玉石器皿一百事銀器一萬両仍詔山南東道節度使惟濬送王至尉氏縣詔雍州團練使王子惟渲韶州刺史王子惟灝並從王行是月二十六日王彂京師詔遣中使賜御酒二百瓶龍茶二百斤攖挑二金盒仍遣中使押翰林儀鵉御厨送王五月王遣子惟灝詣闕謝㤙貢上鰲山寳樹一座𬗋金絲帯一條金銀器皿共一萬両太宗撫問再四六月太宗命韶州刺史王子惟灝歸加王食邑五千户實封三百戸仍賜國信湯薬二金盒各重六十両茶餅二十匱寳帯一條金噐一千両銀装器皿稱是又賜王子惟灝銀二百両秋八月王不康勅遣東頭供奉官髙品尚醫李宻并王孫相繼而至又遣中使王首宿至賜王生辰禮物仍令撫問冬十月王拜表謝賀丁亥四年春二月勅遣給事中崔灝改封王爲許王加食邑一萬户實封二千戸仍改賜安時鎮國崇文耀武宣徳守道功臣戊子端拱元年春正月太宗籍田大赦改元二月勅遣中使進王為鄧王加食邑一萬戸實封三千户三月王遣子惟治表賀貢上金飾玳瑁器皿五百事玉器二十事水晶盤四事金二千両銀二萬両錦綺二萬疋羊二百口法酒二百瓶以為賀夏四月太宗命王子惟治歸賜王御羅袍一副玉帯一條碼碯嵌珍珠酒器八對又輟御前金燭䑓一對以賜焉秋七月王復不康太宗聞之勅遣中使王守文翰林醫官王佑洎王諸孫駱驛而至仍又勅遣供奉官詔加王食邑三萬戸實封五千户仍賜撫問及齎御薬盛一金盒八月王疾稍痊遣子團練使惟渲詣闕謝㤙貢上黄犀帯一條大玉帯四條金飾酒器一千事黄絹草書八幅隷書四幅太宗撫問再四是月勅遣皇城使李恵河州團練使王繼㤙同王子惟渲賜王生辰禮物國信至王扶疾拜命與來使燕接極歡二十三日晡時王於寝齊之西軒命左右讀唐書數篇又命諸子孫誦詞章詩什數篇未訖忽風恙復作四鼓而薨是夕大流星隊于正寝之上光燭滿庭王以天成四年八月二十四日四鼓而生復以端拱元年八月二十四日四鼓而薨以生訖薨實治周一甲子即日王繼㤙先還京報訃太宗聞之哀悼不已詔廢朝七日復勅王繼㤙押入内班賈繼勲䕶䘮歸于京師十月二十四日王䘮彂南陽十一月二十二日至京師太宗復彂哀詔權窆于城東别墅即日命有司致祭翌日遣中使齎御筵一席致獻于王䘮次前二十五日太宗御文徳殿命工部侍郎郭贊追冊為秦國王太常定謚曰忠懿二十八日復遣工部侍郎郭贊致祭于䘮次十二月十八日遣中使獻茶湯于䘮次二年春正月丁酉日遣使押翰林儀鵉鹵簿鼓吹葬王于河南府洛陽縣賢相里陶公原命大臣以下俱素服送三十里仍命有司撰碑文王任太師尚書令兼中書令在位凡四十年窮極富貴福履之盛近代無比王性儉素自奉尤薄常服大帛之衣帷帳裀褥皆用𬗋絁食不多味禀性謙和未嘗忤物在藩日每有朝廷使至接奉勤厚進貢之物製作精妙将遣使必列陳于庭北向焚香再拜而遣之其廢王之廢也國人既立王時大将胡進思因請殺廢王以絶患王泣曰若殺兄而代有其位吾不忍也汝若欲行其志吾當避賢路進思惶懼而退王慮進思終欲害廢王乃宻遣親将薛温守衛不旬餘進思果遣二卒持刃踰垣而入廢王闔户拒之叫呼逹于外温率卒入而斃賊于庭進思聞之憂懼彂疽而死屢有獻此謀者王皆拒之㝷奉廢王于越之西寝供給飲食皆與王同廢王嘗於山亭擊鼓聲聞于外守衛者遽以聞王王曰吾兄以閑適為懐非鼓不楽乃命装金魚水鼓四面奉之國人聞之感王孝友如此有出涕者由是廢王無幽廢之恨終以疾卒太平興國中趙普再入相盧多遜罷為兵部尚書一日普召王世子惟濬至謂曰朝廷知盧多遜求取元帥財物極多今未鞫劾者恐累元帥耳請具所遺之物列状上之惟濬歸而白王王曰主上英明大臣有過即自行何用状上惟濬懼普因請賔僚将吏再三堅請曰若不疾言事恐不測王曰汝姑休矣我當取案籍考視之於時盡取當時文帳命火焚之即召惟濬等至謂曰我入朝之𥘉荷蒙主上殊常之遇故上右大臣咸有饋物非獨盧相也豈可見人将溺而加石焉汝等少年慎勿為此禍福我自當之惟濬等惕懼而退普聞之召惟濬至深自嘆稱曰王寛宏大度事遂寝王崇奉釋氏在國中飯僧億萬建造寺院凡三百所博覧經史在風疾中手不釋卷平生好吟咏在國中編三百餘篇目曰正本集國相元徳昭翰林學士陶穀皆撰集序後文僖公搜㝷遺墜摠集為十卷撰後序行於丗時天禧四年文僖公忝機衡之命特詔尊王為尚父王自國𥘉供奉之數無復文案今不得而書惟太祖太宗両朝入貢記之頗備謂之貢奉録今取其大者如赭黄犀帯龍鳳龜魚仙人鰲山寳樹等通犀帯凡七十餘條皆希丗之寳也玉帯二十四𬗋金獅子帯一黄金九萬五千餘両銀一百一十萬二千餘両綾羅錦綺二十八萬餘疋色絹七十九萬七千餘疋金飾玳瑁器一千五百餘事水晶碼碯玉器凡四十餘事珊瑚樹一髙三尺五寸金銀飾陶器一十四萬餘事金銀餙龍鳳船舫二百艘銀装器械七十萬事白龍腦二百餘斤王自入朝至歸國復入朝太祖太宗所賜金噐并金物六萬四千七百餘両銀器四十萬八千八百餘両玉石器皿一萬七千事寳玊帯四十二條錦綺羅紈一十六萬六千三百餘疋御衣并袍襲衣等金盔六頂甲六副金玊鞍轡御馬一十六疋細馬四十八疋駞三百餘疋散馬二千七百二十疋金印四顆玉冊二御劍三口法酒三千餘瓶衙墜腰帯三千事鳳冠四頂羊果稱是今本吳越備史武肅十九丗孫徳洪所刊序称忠懿事止于戊辰囙命門人馬藎臣續苐六卷爲𥙷遺予暇日以家蔵舊本閱之知其刻之非也是書爲范坰林禹所撰稱忠懿爲今元帥吳越國王自乹祐戊申至端拱戊子紀王事終始厯然新刻則于乹徳四年後序次紊亂脫誤宏多翻以開寶二年後事爲𥙷遺他如王囙衣錦城𬒳㓂命同玄先生閭丘方遠建下元金籙醮于東府龍瑞宫其夕大雪惟醮壇上星斗燦然一黒乕蹲宫門外罷醮而去羅隐師事方逺執弟子禮甚恭及迎釋迦建浮圗以供之其制度皆出王之心匠諸事皆失載其字句紕繆䖏又不知㡬何也盖徳洪當日所見乃零㫁殘本實非完書以家王故事急付剞劂未遑細心参考耳也是翁錢曽遵王右書凡四卷係𫐠古堂錢氏抄本最為精善今蔵維揚江氏予備得録之原本無上䟦從讀書敏求記中錄附卷尾以資考核書中劉姓悉易為彭城避武肅嫌諱也又諱佐凡官名左者悉改為上書中所云上右乃左右也丙申嘉平五日雪窓呵凍書按此書載通考者有二吴越備史九卷注吳越掌書記范坰林禹撰又吳越備史遺事五卷注全州觀察使錢儼撰并引陳直齊言謂備史亦儼所為託名林范者儼元之子也又明𥘉刊本武肅王二卷文穆王忠獻王吳越國王各一卷凡五卷又𥙷遺一卷或云錢徳洪或云馬藎臣撰卷帙不同未知孰是識之以質博雅者十一日雨牕枚菴澷士吳翌鳳又書卷中凡低一格者原本俱雙行分注兹從馮本三國志裴松之注例欲便觀覧應不嫌其改易行第也明年正月二十日枚菴又書
