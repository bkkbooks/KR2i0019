body:
  text: 宋錢􅓻撰文穆王文穆王諱元瓘字明寳武肅王第七子也母晉國昭懿太夫人陳氏唐光啟三年丁未冬十一月十有二日生於杭州之東院先是有胡僧持一玊羊大數寸光彩異常獻武肅王且曰得此當生貴子王果以丁未生焉乾寧元年二月授鹽鐵發運廵官奏授金部郎中賜金紫天復元年八月改授禮部尚書遥領邵州刺史九月壬子王祖妣秦國太夫人水丘氏薨二年徐綰許再思搆宣城觀察使田頵同劘我壘頵敗率綰再思回宣州慮我師逐之乃懇求質武肅王厯選諸子不應命時王尚幼請行莊穆夫人聞之泣曰置我兒於虎口也王曰亡身以紓家國之難亦足以報劬勞耳雖死無恨乃再拜而出武肅王竒而送之王自北門躡繩梯而下以赴頵營比及宣城而頵叛於淮帥淮師會我師以攻之頵每戰不勝歸必求王將肆其毒頵母老且賢常加保護天祐元年十月我師與淮人攻之甚急頵將出戰乃曰今日不勝必殺錢郎其母目而送之且曰鼠軰死不旋踵矣是日果陷於宛水橋為亂兵所殺賊衆尚憂我師提頵首示之賊衆遁散頵母遂奉王至我師衛而歸焉二年春正月制授王檢校右僕射八月處州刺史盧約弟佶冦永嘉開平元年正月武肅王命王伐永嘉四月斬盧佶而還時盧佶列巨舟四十艘於清澳海門以邀我師王謂諸將曰賊之銳卒盡在此矣宜勿與戰當由他道徑襲賊壘出其不意必成擒也於是由安固江登陸而襲之佶由是就執師還承制改王内衙都指揮使檢校尚書右僕射冬十月授王金紫光禄大夫檢校司空五年秋七月賜王號賛正安國功臣進授司徒守湖州刺史乾化三年夏四月淮將前吉州刺史李濤率兵二萬自千秋嶺冦我衣錦軍命王率師討之王以山谷迂僻乃盡伐樹木絶其歸路為三覆以待之時江南國主徐知誥在賊中與王騎相逼㡬獲之俄而知誥易服乗白騾而竄壬辰獲李濤及偏將咸知進等八千餘人兵甲生口稱是是行也王營中有氣如龍虎之狀賊中望之曰此霸者之氣也五月命王復率騎兵攻宣州廣徳縣城未㧞有登城詬辱我師王怒奮擊之六月己卯城陷王手刃二百餘人藉藁而行獲淮將花䖍渦信及吏卒七十餘人而還先是有日者視王曰公手刃百人當大貴時又有僧名自新常衣紙住廣徳山院王至衆皆遁而自新巋然晏坐軍中有詰其不去者新曰前後左右皆兵耳去將安適時王在衆中新忽見之乃斂衣奉迎與語久之及王還遂載而歸後王問自新當時何以見識新曰㣲僧無他術但觀王在萬衆中骨法獨異與咸通皇帝御容頗相𩔖故幸得一識耳冬十月𠡠授王檢校太保依前湖州刺史大彭縣開國男食邑三百户四年夏六月制授王特進光禄大夫開國侯食邑一千户秋九月命王率師攻常州無錫縣丁未克之獲其將朱超等五百餘人而還貞明元年春正月𠡠授王鎮海軍節度使土客諸軍都指揮使湖州刺史如故三年夏六月制加王檢校太傅増食邑五百户五年春三月命王率水師大小戰艦五百餘艘皆刻龍形自東洲發艦遥趨淮甸夏四月乙巳大戰淮人於狼山江將戰之夕王召指揮使張從寳計之曰彼若徑下當避其初以誘之制勝之道也乃命軍中宿理㠶樯每舟必載石灰黒豆江沙以随焉翌日昩爽淮人果乗風自西北而下危檣巨艦勢若雲合我師皆避之賊舟既髙且巨不能復上我師反乗風以逐之復用小舟圍其左右賊廻舟而鬬因揚石灰賊不能視及軸轤相接乃撒豆於賊舟我舟則沙焉戰血既漬踐豆者靡不顛踣命進火油焚之火油得之海南大食國以鐵筒發之水沃其焰彌盛武肅王以銀飾其筒口脫為賊中所得必剥銀而棄其筒則火油不為賊所有也斬其將百勝軍使彭彦章獲士卒七千餘人賊船四百餘艘餘皆焚之其斬馘之甚自江及㟁數十里皆殷焉淮師自是遂求通聘是行也舟次狼山江之石碑灣有石幢大署其文曰向後有木龍五百至此秋七月王復戰於毗陵之無錫縣偏將曹筠奔於賊我師不利王騎逼髙岸賊將追及乃舉策私誓曰天必助我馬當躍上不然則墜我於此馬果一躍而登㟁既而復整行伍破賊而還冬十一月丁亥王妣吴越國莊穆夫人薨六年冬十月𠡠遣衛尉卿兼通事舎人陳琮授王檢校太尉同中書門下平章事充清海軍節度使餘如故龍徳二年春正月𠡠王特進檢校太尉兼侍中加食邑三百户仍賜匡扶定亂立正至道功臣同光二年冬十月制授王開府儀同三司檢校太師兼中書令依前清海軍節度使兼充兩浙節度使觀察留後遣進奉使婁輯將命焉天成元年四月武肅王至自衣錦軍而中外無所専命武肅王嘉歎久之九月制加王食邑一千户實封一百户一夕王夢神人賫骨一副易王之頂門及醒尚㣲疼焉三年春二月遣閣門通事舎人李韞授王鎮海鎮東等軍節度使杭州越州大都督長史加食邑一千户實封二百户秋七月己巳忠獻王生初武肅王將屬王以冡嗣乃命諸子有功者數人謂曰爾無隠情各言爾功以定厥後王兄中吴軍節度使元璙王弟清海軍節度使元璹寧國軍節度使傳璟洎諸公子等皆上言功徳髙茂是宜委副故以兩鎮屬焉及武肅寢疾一日命出玉帶五賜王兄弟命王先擇之王乃取其狹小者武肅王大恱謂王曰吾有汝瞑目無恨矣四年秋八月己酉今大元帥吴越國王𢎞俶生五年夏五月制加王食邑一千户實封一百户壬辰長興三年春三月己酉大雪二十八日庚戌武肅王薨王哀慟終日四日不食左右勸以粥夏四月己未王即位悉用藩服之儀從治命也赦境内一應荒絶田産尚𨽻租籍者悉免之中外班賚有差自今年孟春洎是月隂晦彌時至是澄霽中外咸恱是月庚午奉武肅王靈輴殯於衣錦軍之正寢秋八月楚帥馬希聲殂弟希範嗣癸巳四年春正月福州王延鈞僭稱帝更名璘三月𠡠遣將作監李鍇光禄少卿張裒来歸我先王之賻又遣引進使楊彦珣授王起復雲麾將軍上金吾衛大將軍員外置同正員王兄中吴軍節度使元璙檢校太師兼中書令王弟清海軍節度使元璹檢校太傅同中書門下平章事餘如故夏四月淮南偽客省使許確百濟國太僕卿李仁旭各来祭我先王秋七月𠡠遣郎中張絢授王中書令進封為吴王是月番禺偽左僕射何瑱亦来祭我先王九月𠡠遣侍郎張文寳来宣諭文寳泛海而来被風壊船飄至天長吴王厚禮之及賞從者錢帛等數萬文寳獨受飲食餘皆辭之吴王嘉之竟抵杭冬十一月明宗崩宋王從厚即位是為閔帝十二月庚戌寧國軍節度使同平章事檢校太傅王兄元璣卒璣王之庶兄也母慶安夫人胡氏公性氣寛厚沈静寡言多尚儒釋不喜奢侈厯官數年黎庶安樂早失夫人終不繼娶嗣之是嵗順化軍節度使判明州王弟元珦召歸錢塘懲虐政也甲午應順元年春正月閔帝改元大赦𠡠遣鞍轡庫使王延縞来宣告仍賜國信尋又遣散騎常侍孔昭序駕部員外郎張䌧册王為吴越王是月大雪平地五尺壬午奉葬先王於茅山閏月蜀帥孟知祥僭稱大蜀皇帝年號明徳夏四月潞王從珂率兵入洛逐閔帝而自立改元清泰六月𠡠遣給事中張延雍兵部員外郎馬義册王為吴越王秋七月偽蜀孟知祥殂子昶嗣乙未清泰二年春三月制授静海軍節度檢校太保中書令王弟元球守太師秋七月甲辰西方慶雲見重建開元宫追福於先王也丙申三年春正月𠡠遣禮部尚書李懌户部郎中姚遐賫奉吴越王金印至歸舊物也秋七月𠡠建先王廟於東府是月制授王部將保順軍節度使鮑君福檢校太尉同平章事冬十月偽閩王昶殺其父延鈞而自立年號通文閏十一月契丹立石敬塘為晉皇帝於洛大赦改元天福潞王自殺十二月𠡠授王天下兵馬副元帥丁酉天福二年春正月朔日有蝕之勑遣供奉官周彦瓌賜國信二月淮南以徐知誥為齊王建國於金陵是月己酉夜暴雨自西北起連日至壬子有海魚二各長五十餘尺一死於桐廬一死於餘姚江三月静海軍節度使王弟元球順化軍節度使王弟元珦並有罪命死王許以公禮葬其麾下卒伍悉宥之元球元珦數有軍功先王賜有兵杖及王立元球等恃恩驕横増置兵杖諸將吏告元球遣親信禱神求王吴越又為蠟丸與元珦議謀王不信諸將復告王乃召元球元珦宴後宫既至左右告元球等有刃於懐袖即皆格殺之王欲按諸將有交通者姪仁俊諫曰昔光武破王郎曹公破袁紹皆焚其書䟽以安反側宜效之王乃止夏四月𠡠遣禮部尚書程遜兵部員外郎韋稅封王為吴越國王仍賜天下兵馬副元帥金印甲午王即位建國之儀一如同光故事仍赦境内今年租稅之半是月晉主遷都於汴秋七月制削元球元珦在身官爵任便䖏置八月辛巳王大閲於北郊是月偽吴楊氏遜位於徐知誥戊申王新建五廟於城南九月乙卯王親視五廟冬十月乙丑金陵徐知誥僭稱大齊皇帝年號昇元戊戌三年春正月朔日有蝕之二月乙亥丞相沈崧卒崧字吉甫閩人也祖輅大理評事賜緋父超福州長溪縣令崧初生時有大蛇墜床前引首視之久而方去既七日將浴忽風雨震壊浴盆乾寧二年刑部尚書崔凝主禮闈凡二十五人登進士第渝濫尤衆昭宗御武徳殿命翰林學士陸扆秘書監馮渥親覆試凡落十人是日崧再以章奏㨗尋歸寧途由淮甸淮帥辟之不就遂歸武肅厯鎮海軍掌書記授浙西營田副使奏授秘書監檢校兵部尚書右僕射凡書􅊾奏表多崧所出莊宗即位改元同光武肅王問其祚修短崧曰觀此號為國不成止一口耳文穆王襲位置擇能院以選士俾崧主之國建拜崧丞相終年七十六諡文獻冬十一月𠡠遣尚書左丞王延司門郎中張守素賫捧吴越王玉册及沿身法物等至册曰唯天福三年嵗次戊戌十一月甲辰朔五日戊申皇帝若曰王者握圖立極崇徳報功或開國以建邦或苴茅而錫壤乃樹藩屏式奬忠勲古先哲王率由斯道惟朕薄徳敢忽彛章況夫奠南服之奥區鎮東甌之重地懋績雖髙於列土殊榮未繼於肯堂得不申加等之恩降非常之命用紀代天之業特頒鏤玉之文乃擇吉辰爰敷盛典咨爾興邦保運崇徳忠道功臣天下兵馬副元帥鎮海鎮東等軍節度浙江東西等使開府儀同三司檢校太師守中書令杭州越州大都督府長史上柱國吴越國王食邑一萬五千户實封一千五百户錢元瓘嶽靈禀粹天象儲精藴文武之兼材受乾坤之間氣既寵承吴越功邁桓文運妙略以平兇用竒兵而制變祗嗣搆基表率英雄淮夷之屏氣銷聲海嶠之波澄浪息而況興我昌運竭乃忠規懋勲庸而首列韓壇奉玉帛而誠先禹貢語尊奬則獨標大節頋封崇則未稱鴻名宜舉徽章俾奉先正矧其天文當南斗之分地志控勾踐之都眷兹舊封允屬全徳是用異車服於羣后盛簡册於列藩正二國之土疆錫九天之寳瑞表於嘉命纉乃舊邦大振家聲奕輔王室今遣使大中大夫尚書右丞上柱國賜紫金魚袋張守素持節備禮册爾為吴越國王於戯服衮衣而佩𤣥玉位壓於諸侯駕戎輅而握兵符名尊於九伐馭貴之重象賢之榮爾其祗荷天光勉清國歩往綏厥位永孚於休戒之慎之勿沗前烈十二月大閱馬歩軍洎艛艫於碧波亭己亥四年春二月𠡠授世子𢎞僔為果州團練使是月偽齊徐知誥改姓李更名昪僭稱大唐昪本潘氏湖州安吉縣人父為安吉砦將甞因淮將李神福侵我吴興據潘氏而去昪遂為神福家奴徐温甞造神福家見而異之求為養子至是乃隠本族而冒徐姓焉後甞致書於我以毘陵求易吴興仍引祊田為説則本潘氏明矣秋七月朔日有蝕之閩王延羲更名曦弑其主昶而自立年號永隆八月戊申建世子府於城北是日白龍見處州長松縣遂更為龍泉縣九月詔陞婺州為武勝軍授王兄元懿為節度使是月保大軍節度使同恭相府事陸仁章卒冬十月壬子吴越國莊睦夫人馬氏薨夫人臨安人父綽淮浙行軍司馬雄武軍節度使同平章事夫人性聰慧勤於職初武肅王禁中外毋得蓄聲妓夫人以王𦙍嗣未立乃請於武肅王王嘉之曰我家宗祀幸汝得主之矣因許王納妾遂生忠獻王諸子既長夫人皆均養之常置銀鹿於帳前坐諸公子於上夫人閲其聚戯喜動顔色初封越國至吴越國夫人薨年五十𠡠諡曰恭穆是月𠡠遣刑部尚書李懌禮部郎中崔鈞授王天下兵馬元帥增食邑五千户實封五百户仍賜御服紅羅真珠戰袍金鎻甲各一副十二月辛酉葬恭穆夫人於衣錦軍慶僊郷庚子五年春二月甲辰温州刺史王子𢎞僎卒己酉閩王曦遣兵擊其弟王延政於建州遂僭稱大殷皇帝王命内衙統軍使仰詮都監使薛萬鍾帥師伐建州三月𠡠陞婺州為武勝軍又陞嘉興縣為秀州以嘉興崇徳華亭三縣𨽻焉壬申𠡠遣右諫議大夫髙延賞兵部郎中李元龜授王天下兵馬都元帥夏四月癸卯鎮海軍行軍司馬兼侍中同平章事太尉鮑君福卒君福字慶臣餘姚縣人祖興父璨俱不仕少羈貧性淳厚有膽勇餘姚有井靣廣丈餘君福每恣卧其上而無畏色鄉黨異之及從軍以驍果稱初仕彭城漢宏及武肅王東討乃與其黨歸降號曰向盟都累從征伐有功能馬上雙劔入陣望之若飛電沉黙少語軍中謂之鮑閙尋為衢州應援指揮使屬刺史陳璋叛淮人入其境乃以淮帥命辟為郡職君福不納武肅聞之慮其被害乃宻賜絹書使茍從之因與賊徒李元嗣飲伺其醉乃奔歸尋授衢州刺史淮將信州刺史周本屢侵其境君福每率數騎往逐之本遁去及將罷郡武肅王勞曰比在任戰敵而已未足為副使優賀之道因復任之凡三考文穆王領清海軍節制辟為副使後遷湖州復二考累職鎮海軍節度副使浙西行營司馬奏授登州刺史保大保順等軍節度使檢校太尉同平章事兼侍中年七十七諡曰忠壯是月甲子世子𢎞僔薨𢎞僔王第五子也母魯國夫人鄜氏時王年將四十冢嗣未建及生特所鍾愛累奏授兩浙副大使果州團練使國建立為世子初王治世子府謡言曰何處有鹿脯將薨乃題所居屏障曰四月二十九日大㑹羣仙凡題數䖏及期果薨年方十六嵗追諡曰孝獻五月四星聚斗秋七月我師敗於建陽積雨乏糧故也八月以世子府為瑶臺院冬十二月以忠獻王為内衙諸軍都指揮使是嵗姑蘇吴興嘉禾三郡大水辛丑六年春三月丙寅𠡠遣太子賓客聶延祚吏部郎中盧撰册授王守尚書令夏五月番禺婁龔遣偽攝太尉工部侍郎盧膺尚儀謝宜清尚衣髙素清来逆我故王弟𫝊璛之室馬氏以為繼室不克遣馬氏即潭帥楚王殷之女也先是番禺亦聘馬氏既卒遂求其弟是行也潭帥希範亦遣中軍使歐陽練與廣使俱至馬氏誓不許故不克遣六月寧國軍節度使同恭相府事仰詮卒秋七月甲戌麗春院火延於内城王遷居瑶臺院是月閩王曦稱大閩皇帝八月辛亥王薨於瑶臺院之綵雲堂年五十五在位十年贈諡曰文穆勑宰相和凝撰神道碑七年壬寅二月癸卯葬於國城龍山之南原王志量恢廓識度宏逺雖少嬰軍旅尤尚儒學事武肅孝敬小心未甞有懈武肅性既嚴急每一召即時須至或巾帶於歩驟間乃置濶袴大襪以便之晚年政事一委恭决簿書填委皆躬親批署手爲胼胝復置粉盤於卧榻之首夜有所記必書其上詰旦以備頋問時屬重盜賊及詐偽誹謗法犯者輙死王皆力救之所獲宥者甚衆甞北征師次平望蚊蚋尤甚左右請施帷帳王曰三軍皆在此我獨何避竟不許及纉嗣之後示以明恕人情翕然内衙指揮使陸仁章婁仁杞等早備武肅王爪牙以性剛愎為衆所惡而亦常以事侵王一日同列者皆率諸軍於國門請王戮之王命姪仁俊諭之曰仁章等事先王有年矣今求舊念功方當旌賞汝等遂以私憾使我戮之我安可謂不報怨也茍不聼命我當歸臨安以避賢路衆皆退懼遂授仁章福州刺史仁杞湖州刺史中外有以封章相搆者皆居中不下積而毁之王舅陳氏厯職不過一戍遏毎加厚賜而未甞遷授恭穆夫人之弟馬充甞以使役求免王廷責之遂下獄尋黜於剡溪其餘遵守治命保慎名器烈祖之風為不冺矣一日武肅王寢疾召將吏曰吾疾必不起諸兒皆愚劣誰可為帥者諸將泣曰兩鎮令公仁孝有功孰不愛戴武肅乃出印鑰授王曰將吏推爾宜善守之又曰子孫善事中國勿以易姓廢事大之禮王與兄弟同幄行䘮内衙指揮使陸仁章曰令公嗣先王霸業將吏旦暮趨謁當與諸公子異䖏乃命主者更設一幄扶王居之禁諸公子從者無得妄入武肅未薨時仁章常以事犯王至是王勞之仁章曰先王在位仁章不知事令公今日盡節令公猶事先王也王嘉之王以遺命去殊儀用藩鎮法除民田荒絶者租稅王於兄弟甚厚兄元璙自蘇州入見王以家人禮事之奉觴為夀曰此兄之位也而小弟居之是兄賜之也元璙曰先王擇賢而立之君臣位定當恭守霸業自為珍重王因相與泣論曰王以英毅之姿兼仁厚之徳入田頵豺狼之穴示亡身之慮破知誥蛇豕之羣揚對敵之威奮劔屢成大勲壓紐遂當慶嗣念功忘過崇徳布政然後聿修先烈光紹世官天子賴於元勲諸侯奉為盟主以稱克家之令嗣以號列國之賢君則彤弓緇衣不足侔其美也
