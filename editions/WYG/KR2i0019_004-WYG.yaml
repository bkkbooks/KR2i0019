body:
  text: 吴越備史卷四宋錢􅌂撰大元帥吴越國王王名俶字文徳文穆王第九子也母吴越國恭懿太夫人吴氏王以天成四年嵗己丑八月二十五日生於功臣堂天福四年十二月承制授内衙諸軍指揮使檢校司空忠獻王累授王特進檢校太尉開運四年春三月庚寅出鎮丹丘即台州也下車數月有僧徳韶語王曰此地非君為治之所當歸國城不然將不利矣王從其言即求歸秋九月甲戌發自丹丘歸覲也是日大風東南有雲如樓閣之状識者異之冬十二月内衙統軍使胡進思指揮使諸温鈄淊等幽廢王於義和後院乃召諸大校及率中外軍庶奉迎王於南邸晡時王見府僚將校於帥府之外簾謙讓者三諸將校以王素有徳望俯伏稱賀即日王以鎮海鎮東等軍節度檢校太尉兼侍中蒞事於元帥府之南序戊申乾祐元年春正月辛亥朔漢主南郊大赦改元是月乙卯王即位於天寵堂赦境内租稅班賚有差天寵堂即忠獻王重建逮於廢王不克遷徙至是而王臨位焉自前年季冬浹於正旦隂晦彌月是日雲初澄霽中外人情胥悦壬戌遣將兵奉廢王於衣錦軍丙子漢主崩少主承祐即位二月辛卯王親祀五廟乙未誅内衙指揮使何承訓懲其反覆中外大恱初廢王將黜胡進思而承訓預其事議未决承訓反告於進思及王即位復請誅進思王懲其反覆立命斬之三月勑遣中書舎人張誼來歸忠獻王賵丙寅内衙統軍使胡進思請誅廢王王不許於是進思憂懼而卒先是王遣都頭薛温領親兵保衛廢王且戒之曰爾等小心衛䕶吾兄若有異事當死拒之至是進思請誅不遂乃詐以王命令薛温害之温曰僕受命之日不聞此言决不敢妄發也進思乃夜遣二賊踰垣而入欲刺廢王廢王闔戶大呼薛温聞之率衆而入夜二鼔斃二賊於庭中至是進思聞二賊死憂懼不二日發疽而死夏四月大閲馬歩六月朔日有蝕之冬十一月下令以每嵗租賦逋滯者悉蠲之仍嵗為著令百姓歌舞焉己酉二年春二月匡武都連名輒舉求職王命斬狀首二人坐黜者二十餘人餘宥之三月𠡠授王東南兵馬都元帥鎮海鎮東等軍節度使浙江東西等道管内觀察處置兼兩浙鹽鐵制置發運等使開府儀同三司檢校太師兼中書令杭州越州大都督上柱國吴越國王食邑一萬戶實封一千戶仍賜匡聖廣運同徳保定功臣夏四月太白晝見是月乙亥城西上清宫災五月内衙指揮使鈄淊以罪黜於處州六月甲申日有蝕之秋七月朝廷命擒河中府李守貞初守貞之叛求援金陵偽齊王㬌達舉兵應之未㡬守貞就擒淮人壓境而退是月王命弟𢎞億為明州刺史冬十月𠡠遣散騎常侍張煦等持節備禮册王為吴越國王仍賜玉册金印法物等册曰惟乾祐二年嵗次乙酉十月庚午朔十九日戊子皇帝若曰我先帝承有晉崩離之後醜虜充斥毒螫中夏是用順天致討大拯黎元太阿一揮胡馬宵遁享萬靈於無主解兆庶之倒懸較定世勲以吴越居右伊朕𦕈末䖍奉世訓嗣位之始即疇􅅷功前命為元帥按地圖授武節東南之境得行征伐命勑為真王駕大輅執桓圭牛斗之鄉盡荒土宇詢於有位僉曰克諧咨爾匡聖廣運同徳保定功臣東南靣兵馬都元帥鎮海鎮東等軍節度使浙江東西等道管内觀察處置兼兩浙鹽鐵制置發運營田等使開府儀同三司檢校太師兼中書令杭州越州大都督上柱國吴越國王食邑一萬戶實封一千戶錢某象緯炳靈公王襲慶横江負海者三千里開國承家者六十年而能望辰極以駿奔奉天朝之師律充庭納貢則外府告盈下瀬宣威則前茅獻㨗忠信著於羣后禮讓行於一方故𤣥冕九章為王之服昭其名也朱輪駟馬為王之馭昭其器也而又三吴百越列土分疆有民人焉有社稷焉恢祖襧之令圖實典禮之鉅著勸夫忠孝以御邦家今遣正議大夫守右散騎常侍上柱國賜紫金魚袋張煦左補闕崔頌持節備禮册爾為吴越國王於戯品秩甚尊名數尤重肅廣庭而備物練吉日以覃恩爾其正厥位事大以敬教民以順馭衆以恩神其福之禮曰惟王建國諸侯所以守舊邦書曰惟帝念功王者於是出好爵匡我堯緒永為漢藩浙江如帯稽山如礪福禄無窮貽厥百世汝往欽哉對揚我休命是月内衙指揮使諸温以罪黜於温州是嵗下令以境内田畝荒廢者縦民耕之公不加賦時王募民墾荒田勿取其租稅由是境内並無棄田或有請糾遺丁以増賦王命杖之國門民皆大恱庚戌三年春二月金陵以偽永安軍節度使查文徽取福州遣劔州刺史陳誨泉州刺史留從効率兵犯我無諸王命指揮使潘審燔率師禦之遂生擒查文徽及行軍判官楊文憲等三十餘人斬馘萬計陳誨留從効等走之初福人告查文徽曰吴越兵已棄城去請公為帥文徽信之乃遣陳誨率水軍下閩江文徽自以歩騎繼至城下閩州刺史吴誠詐遣兵數百出迎文徽誨諌曰閩人多詐未可圖也宜立寨徐徐圖之文徽曰疑則生變不若乗機據其城乃引兵徑進誨整衆鳴鼓還於江湄吴誠與潘審燔等勒兵擊賊大敗之遂執文徽等士卒戰溺死者一萬餘人陳誨等率親部而遁是月甲午丞相中書令鄖國公杜建徽卒建徽字延光新登縣人祖仲明不仕累贈水部貟外郎父稜賛忠去偽功臣兩浙行軍司馬鎮海軍節度副使常潤二州刺史初入都建稜率鄉黨以武安為號時武肅王輔董庶人起石鏡鎮旋平彭城漢宏功業寖盛稜謂諸子曰吾每責人不過十罰則為之傷心而觀錢公每有斬决皆談笑自若成大事者是人也當事之必貴吾族稜遂歸於我光啟三年命征薛朗平之遂為常州尋遷潤州乾寧中安仁義適東陽命稜率師討平之及武肅王以宣州降卒𨽻中軍號武勇都前後左右皆無賴稜常患之乃宻䟽曰狼子野心稜觀武勇將士終非大王所蓄願以士人代之武肅王不聼及徐綰叛命使祭之旌其先見徽即稜子也少强勇不與諸弟𩔖甞於山莊搆小茆齋輒私署軍州押衙紀於棟鄉里見焉驚因聞於稜稜亦加責徽對曰大丈夫何止一軍事押衙耶始從軍無事人之志及稜歸武肅王乃從父命而盡心於我稜在常州為淮人所逼徽馳赴父難不及境而城已㧞徽乃率所部還新登及稜自淮南歸軍中嚴整無改稜尤稱之徽累征伐皆单衣入陣賊衆無不披靡所至輒立大功軍中謂之虎子乾寧初從征董庶人被射中肩徽亦能軍開平中與武肅王弟鐸率師救姑蘇與敵遇因逼河河梁上斷乃鞭馬徑渡及㟁馬斃遂瘞之號曰馬塜至今存焉徐綰之叛徽馳自新登以本部赴難因命守禦時賊將聚木焚北門徽使持火鈎取其木先焚之遂不得聚賊計遂罷時有勸王東保會稽徽按劔曰事茍不濟當同死於此必東渡亦售命於賊耳武肅王納之睦州陳詢之貳我也王以徽為詢姻婭頗疑之乃使馬綽伺其意徽曰陳氏負恩背義自貽覆族之禍徽既姻婭義當見疑然累書以諭之皇天后土茍或鍳照則㧞城獲書方明徽心耳俄有睦州㕔吏來降持徽所遺書至武肅王嘉歎久之賜徽錢一百萬徽兄建思甞譖徽於武肅言其第中蓄兵仗將為異圖王使人閱之徽方食使者强抵徽卧内徽但食不頋使者聞之武肅王感悟益加殊待及搆第於城南王親與規畫徽性儉率出入導從不過數人凡財物多散鄉里親族武肅王每㑹王人必指之曰此杜丞相今日塵忝多其力也忠獻王時其孫昭逹為内衙都監使盛治第宅强徽觀之曰乳臭兒不諳事乃爾後昭逹果以罪誅及春秋髙尚能騎射甞從擊毬於廣塲興酣有宿中箭鏃自臂中飛出人皆壯之徽為詩自叙曰中劔斫耳缺被箭射胛過為將須有膽有膽即無價初稜將亡散家財與諸子惟徽但授一笏稜曰此吾厯任所秉者唯汝能傳之徽厯官自武安都將國子祭酒至涇源昭化等軍節度使累官吴越國丞相兼中書令封鄖國公皆自國初至忠獻王以來奏授也凡子弟孫姪多連姻公室朱紫車馬充溢門庭有國以来莫比其盛卒年入十八諡曰威烈三月𠡠授王守尚書令増食邑二千戶實封五百戶夏四月王以查文徽等獻於五廟國人為之聳觀先是征伐以来擒獲雖衆而獻俘之禮至是方備是月丙午王親享五廟六月勑授王兄東府安撫使𢎞儇知福州威勝軍事秋七月戊寅命弟𢎞億為東府安撫使冬十月王歸查文徽於金陵十一月朔日有蝕之乙酉漢少主遇弑是嵗潭帥馬希廣為其兄希蕚所攻殺而自立臣於金陵金陵遣將邊鎬守之盡遷馬氏之族於金陵是月漢太后臨朝辛亥廣順元年春正月丁卯周太祖即位改元大赦漢太后遷居西宫三月𠡠授王諸道兵馬都元帥加食邑一千戶實封三百戶仍降尚書令册禮夏四月王奉廢王居東府即越州王築宫室治園圃花卉山石池塘亭苑奉廢王日娱恱之嵗時供饋甚厚夏六月丙午武勝清海等軍節度使王世父元懿薨以其子仁倣嗣元懿字秉徽武肅王第五子母李氏懿有燕頷之相起家鎮海軍右直都知兵馬使尋授安國衣錦軍防遏指揮使累授檢校兵部尚書懿性至孝而純直其母甞侍武肅王指令不稱㫖被捶自是成疾每疾發侍婢多厭倦惟懿不離左右雖糞溷亦親侍之常在衣錦城出逰諸野遇菖蒲花尋收之新定一日閭里間輒數處火起民頗憂懼有巫楊韞因之遂興妖言曰某日某所復當火皆如其言民由是競禱之懿謂左右曰火如巫言巫為火也宜殺之以息其奸於是命斬韞於市火遂絶貞明中自新定判東陽東陽之南有白砂神郡人畏而奉之每嵗三月有大風雨自白砂起郡城或言神本海龍每嵗一復東南為怪壊民廬舎及懿臨郡夢朱衣言白砂王奉啟相國今以他適將由郡城且慮驚駭已由南山而去翌日風雨果如之人皆異之頗喜宴逰彫飾之事文穆王襲國禮敬尤篤懿每飲酒及其半而傾於地文穆王因宴乃致鈔鑼於懿前意誡其事懿自是遂改累奏授賓睦二州刺史清海武勝等軍節度使太傅同中書門下平章事金華郡王終年六十六諡曰宣恵在郡三十年初懿之為新定有卜士方氏時人號為龜精常數卜以貽懿曰太乙接大河金華寳貝多郡侯六十六别處不經過至是果如其言是月命復王從兄仁俊官爵壬子二年春二月制授王天下兵馬元帥増食邑二千戶實封五百戶改賜推誠保徳安邦致理忠正功臣夏四月朔日有蝕之𠡠衢州刺史王叔元璝知福州威勝軍事王弟𢎞偓為衢州刺史六月乙未王妣吴越國順徳太夫人吴氏薨夫人錢塘人諱漢月中直指揮使珂女也幼而婉淑奉文穆王恭穆夫人尤寵愛之夫人善胡琴性慈恵而節儉頗尚黄老學居常被道士服餘皆布練而已每聞王决斷政事有及重刑者夫人常頻蹙以仁恕為言諸吴將有遷授皆峻阻之及其入對多加訓勵有過失必面責之故諸吴終夫人之世不甚驕恣𠡠封吴越國順徳夫人薨年四十諡曰恭懿秋八月丁酉𠡠葬恭懿夫人於錢塘慈雲嶺之西原九月甲寅朔丞相裴堅卒堅字廷實吴興人父光庭累官至中書令有術士景嵗􅀎言休咎以紙大書台字以貽光庭不旬日果貶台州刺史大有政聲堅㓜明敏善屬文及長有知人之鑒事吴越國有善政條教有方累官禮部尚書中書令拜吴越國丞相終年五十六諡曰文憲冬十月朗州指揮使彭城言姓犯武肅王諱改彭城舉兵逐邊鎬克復湖南獻㨗於朝廷朝廷以為武平節度制置武安等軍事因遷湖南節制府於朗州癸丑三年春二月湖州所𨽻建州降卒鄭懐嵩等十一人以刺史散香於資福寺遂率其黨二百餘人作亂即日盡誅之三月𠡠授王起復鎮東大將軍左金吾衛上將軍貟外置同正貟王以兄𢎞儇為温州刺史夏四月建報恩元教寺於城北薦王妣也王親閲内外諸軍非驍勇者咸停放之冬十月大閲馬歩軍艛艫於碧波亭十一月命弟𢎞仰為台州刺史十二月湖南王逵舉兵執朗州彭城言囚之朝廷尋授王逵湖南節制是嵗東陽有大象自南方来陷陂湖而獲之境内大旱邊民有鬻男女者命出粟帛贖之歸其父母仍命所在開倉賑䘏甲寅顯徳元年春正月丙子朔周主祀圜丘改元是月周太祖崩晉王即位是為世宗夏五月辛巳王命鑄王妣恭懿太夫人銅容二致於奉國金地二尼寺秋七月𠡠遣使加授王天下兵馬都元帥仍賜金印冬十一月𠡠遣進奏使章思忠歸諭機事航艦不利思忠溺焉是月北漢主殂子鈞立乙卯二年春二月朔日有蝕之三月制加王食邑一千戶實封四百戶夏四月庚子王親祀五廟秋七月庚午有虹入天長樓樓在内城之東王避寢於思政堂九月王復於天寵堂閏月丁酉世子惟濬生冬十月乙丑朔𠡠遣司空李糓率師伐金陵十二月王遣使入貢𠡠王出兵㑹擊金陵是月王師渡淮丙辰三年春正月車駕東征詔王以國兵分路進討是月南擊塲門樓火金陵李景僭稱唐皇帝致書於京師仍令偽皇太弟璲致書於統師李糓又遣偽宰相孫盛等入貢二月王師入淮南静海軍制置使姚彦洪率家屬軍士戶口等一萬餘人奔於我是月王命丞相吴程前衢州刺史鮑修讓等攻毘陵命都指揮使路彦銖等伐宣城命都指揮使羅晟等督水師次於江隂應王師也既而𠡠遣殿直薛有光来宣諭仍賜沿身衣冠法物三月我師克常州生擒刺史趙澤偏將諸承向重霸等一百餘人遂班師時營田副使陳滿言於丞相吴程曰周師南征舉國驚擾常州無備易取也吴程如其言請於王從之丞相元徳昭上曰唐大國未可輕舉也若我入唐而周師不至􅀎無慮乎吴程固争王遂命程取常州是月金陵遣其偽燕王𢎞冀復據淮南王命從弟蘇州刺史文奉為應援都統使屯於本州備徵發夏五月乙酉建州刺史陳誨以小船沿溪而下福州指揮使馬進姚章等執於賊未㡬誨亦宵遁是月車駕還京師六月王命兄仁俊知福州彰武軍事周改威武軍為彰武軍史失書秋九月癸卯王親閲兵於龍山教塲冬十月車駕親征夀春是嵗始括境内民丁益師旅也丁巳四年春正月始議鑄錢三月王師大敗淮人於夀春夏四月宣諭使薛有光航海歸於京師是月車駕還京師秋七月庚子王命弟𢎞信爲衢州刺史八月勑遣諫議大夫尹日就至賜王生辰御服紅袍二副冬十一月車駕復東征是月泉州刺史留從効請修貢於京師附我以聞詔從之戊午五年春正月丁未前衢州刺史王弟𢎞偓卒偓字賛堯文穆王第十二子也母陳氏偓性仁慈事母以恭儉聞及為郡時嵗旱部民將逐食於他郡民不忍别偓俱詣郡􅆹告白而去偓為之流涕其為政寛恕厚重王加友愛尤篤及卒中外無不歎惜終年二十五二月丁卯王師復維揚𠡠遣殿直趙誨来宣諭仍出艛艫於𤓰歩迎鑾長風渉等䖏王師欲濟江乃命上直都指揮使邵可遷路彦銖等帥艦四百艘水師二萬以㑹之江北諸郡悉平三月王不康丙午𠡠命翰林學士都承㫖陶糓司天監趙修已賜王羊馬槖駝每嵗班賜自此始也是月金陵李景復稱江南國主遣偽臨汝郡公徐遼宰相馮延己奉表稱臣於行在王師乃罷初金陵之將内附也王亦飛書以諭之既而附我以誠欵聞詔從之夏四月辛酉城南火延於内城王出居都城驛詰旦煙焰未息將焚鎮國倉王親率左右至瑞石山命酒以祝之曰不糓不徳天降之災宫室已矣而倉廪儲積盖師旅之備實所痛惜若盡焚之民命安仰天其鑒之乃命從官伐林木以絶其勢火遂滅即日王見丞相以下罪已之暇且曰吾旬月所苦尤至而災釁之餘遂覺康裕中外聞之頓安丁卯王命弟𢎞儀復為東府安撫使是月𠡠遣天下都軍頭周廣来宣諭仍賜邵可遷以下及將士衣服有差五月辛巳朔日有蝕之唐主去帝號奉周正朔六月戊寅前台州刺史王弟𢎞仰卒仰文穆王第十三子也母周氏仰善騎射通儒術能書寫及為郡吏民畏服性雖嚴急而政事寛簡終年二十四諡曰成顯秋八月𠡠遣閣門使曹彬賜王兵甲旗幟等冬十月乙巳王遷於思政堂是月南漢主殂子鋹嗣己未六年春二月甲申王遣丞相元徳昭寧國軍節度使吴延福入貢京師夏四月車駕親征幽并是月𠡠陞湖州為宣徳軍授王兄𢎞偡特進檢校太尉充本軍節度使五月熒惑犯心六月癸巳周世宗崩少主即位秋八月𠡠加王食邑一千戶實封四百戶仍改賜崇仁昭徳宣忠保慶扶天翊亮功臣又𠡠王元妃孫氏為吴越國賢徳夫人王世子惟濬為鎮海鎮東等軍節度副使檢校太保冬十月王重建功臣堂庚申建隆元年春正月癸巳今大宋皇帝受禪大赦改元封周少主為梁王𠡠遣使来宣諭二月王但用今名避廟諱也三月甲寅大慶堂成王舊邸也堂寛髙廣大凡一百間命勒碑文以紀其事夏四月勑授王兵馬大元帥加食邑一千戶實封五百戶五月昭義軍節度使李筠叛丁巳車駕親征六月甲午𠡠加吴越國賢徳夫人為賢徳順睦夫人又授兩軍節度副使王世子惟濬金紫光禄大夫檢校太保充節度使是月𠡠陞明州為奉國軍授王弟𢎞億金紫光禄大夫檢校太保充本軍節度使秋七月庚子潞州平𠡠遣通事舎人武懐節来宣諭九月甲寅楊州節度使李重進叛車駕東征是月王遣上直指揮使孫承佑率師至潤以迎應之庚申王以寧國軍節度使王舅吴延福等有罪並除名配外郡延福等兄弟五人俱有異圖左右將校勸王誅之王曰吾以先太夫人同氣之故安忍置之於法言訖遂嗚咽垂涕衆皆稱賀於是黜延福等於外郡以全吴氏之族冬十一月丁未揚州平𠡠遣通事舎人王繼筠丁徳裕来宣諭仍賜國信庚申𠡠遣西上閣門副使武懐節来宣諭甲子王命衢州刺史從弟𢎞信入貢自太祖革命王有貢奉即加常數太祖禮之亦異扵常十二月戊辰車駕還亰是月王遷扵功臣堂辛酉二年春二月江南國主李景遷國扵豫章三月𠡠遣使丁徳裕送王弟𢎞信囬仍賜王戰馬二百疋羊五百口駝二十頭夏六月甲寅豫章李景殂子煜嗣位於金陵秋七月丁亥昭憲王太后崩遣使来宣告自五月不雨至於是月玉命取龍湫於天台山以祈雨九月始𣙜酤冬十二月王命弟𢎞信復為衢州刺史壬戌三年春二月𠡠遣右殿直王蓍来宣諭仍賜國信夏五月東陽信安新定三郡民災戊辰王遣使賑䘏秋七月壬戌大風㧞木八月庚寅泉州留從効為大將張漢思所弑漢思自稱權知清源軍事九月庚戌夜所在地震響如雷冬十月庚寅勑遣上殿直景徳倫授兩鎮節度王世子惟濬為邕州建武軍節度使庚子𠡠遣西上閣門副使武懐節至以泉州張漢思不禀朝命俾王責之翌日王遣使往責之漢思遂從命焉癸亥四年春三月朔日有蝕之是月王師盡取荆湘之地初畨禺衡州刺史張文表侵湖南朝廷援之遂執文表及班師因取二地荆帥髙繼冲潭帥周保權並入於京師夏四月丁未泉州張漢思為四門指揮使陳洪進所幽洪進歸命於王請命於朝遂授洪進平海軍節度使檢校太傅秋九月丁巳重建天寵堂壬申大閲艛艫於西湖賜内外將校服帶有差冬十月甲申獲巨魚扵江壖長九丈六尺十一月甲子太祖有事南郊大赦改元乾徳王命姪昱入貢𠡠遣引進使丁徳裕来宣諭仍加王食邑一千戶實封四百戶改賜承家保國宣徳守道忠貞恭順功臣又加建武軍節度使王世子惟濬檢校太尉十二月孝明皇后崩𠡠遣使来宣告是月命姪郁為秀州刺史甲子乾徳二年春正月戊寅朔大雨震電二月戊申朔日有蝕之三月制王落起復天下兵馬都元帥加食邑一千戶實封四百戶四月重建城南寳墖寺成鑄武肅王文穆王忠獻王銅容供於寺秋八月庚申王駕復天寵堂謂丞相以下曰頃以寡徳遂貽災釁曽未十年中外如斯實宗廟之休公等之力然作之者勞吾不敢忘更賴公等以輔不逮丞相以下咸稱大慶冬十一月王師伐蜀王乃命親從都指揮使行軍司馬孫承祐等率師會焉乙丑三年春正月乙酉西川平蜀主孟昶入於亰師二月壬寅朔日有蝕之乙丑王命姪台州刺史昱入賀秋七月有虎出於龍山凡傷數十人捕之逾旬而獲八月癸卯重建寳墖寺於城北是月勅遣通事舎人張延通来宣諭仍賜生辰禮物甲寅丞相吴程卒程字正臣山隂人祖可信定州虞唐縣令父蛻大順中登進士解褐鎮東軍節度掌書記右拾遺累官禮部尚書程起家校書郎武肅王承制累授檢校戶部員外郎借緋長興初王女將選婚於士族乃以孟粲于葆暨程等三人見於王庭武肅王熟視程乃選之承制遷金部郎中借金紫以程有吏術因命提舉諸司公事文穆王襲國奏授程為職方郎中觀察支使節度判官天福中文穆王子儇遥典睦州命程知州事忠獻王時以程判西府院事尋拜丞相福州李儒贇伏誅授程威武軍節度使乾祐三年淮人侵福州程授諸軍節度獲其將查文徽初淮人薄閩城授甲於將卒而將卒充溢庭廡紛然不可遏程因登檻瞋目叱之衆皆股栗自是軍政嚴肅程始在東越以父廕不事苦學有謂程曰觀子骨法與羣儒𩔖但恨他日登將相不長談論耳程遂勤學文穆王時有西府院官滕擕甞夢程化為赤龍望南方而去擕因語其夢於人曰吴氏子非我所測也及為福州始騐其兆尋以國用䌓廣乃命程兼掌屯田𣙜酤事乾徳初程夢一羽人為布䇿於前計字之筭而所遺者三果三載而卒年七十三諡曰忠烈冬十一月王命從叔前知福州彰武軍事元璝為睦州刺史姪昱復為台州刺史丙寅四年春二月乙亥宣徳節度使同平章事王兄𢎞偡卒偡字恵逹文穆王第八子也母陳氏起家内衙諸軍都知兵馬使檢校司空年十八出為湖州刺史有妖巫登衙門大樹恣為鬼神語州人皆驚畏偡曰妖由人興乃命注弩而射之巫果請命因鞭之州人咸服偡明吏術􅀎為詩頗有竒句王嗣位恭敬尤篤顯徳中王城灾悉以器用服玩上之累奏授特進檢校太尉宣徳軍節度使建隆初勑授同中書門下平章事終年三十八諡曰恭義先是大星隕於西北月餘而偡終焉夏五月丙戌王從兄婺州刺史仁倣卒六月𠡠授王子内衙都指揮使惟治為容州寧逺軍節度使金紫光禄大夫檢校太保九月壬寅王避正寢於功臣堂計都入須女也癸卯王兄知福州彰武軍事𢎞儇卒儇字智仁文穆王第二子也本名𢎞偁起家上直副兵馬使檢校尚書右僕射二十餘年為東府安撫使洞曉政術吏不敢欺文穆王嘉之賜金酒器一副因命兼領新定性簡儉善騎射􅀎書有文而自晦福州初歸我將校有仇憾者率多相誣謂左右曰人各有憾一啟之誣搆交生人相疑懼豈國家推心懐逺之道也因悉不問閩人莫不感悦尋鎮永嘉愈事清率所蓄聲伎悉放之每食不過鮑魚菘菜而已顯徳中甞因入覲温人謂其將代乃卧轍阻之儇乃復伺夜出人皆宿於城門詰旦侍妾以籃轝先出衆疑儇在其中遽擁而廻官吏具聞王命示歸期人始從焉温人舊苦徭役儇乃置簿書以均之民感其恵多為儇醮本命又俗尚淫祀儇皆鎻其祠宇器玩以充公用及移鎮無諸温人有擕家以從者謂之随使百姓儇出城日皆行啼巷哭曰願公早囬至是以神柩由温江歸㑹稽三郡之民為之號踊凡兩鎮無諸㑹稽一鎮永嘉通任二十餘年承制累授檢校太尉拜丞相終年五十有四諡節恵冬十一月甲寅命王弟信知婺州武勝軍事丁卯五年春二月丁卯除睦州刺史元璝知福州彰武軍事戊辰王弟奉國軍節度使億卒億字延世文穆第十子母沈氏初孕文穆王夢僧入寢帳及生故字曰和尚起家内衙諸軍左右都虞侯檢校左僕射性俊㧞善屬文年二十一出為明州刺史頗著善政凡科率舊制除出之顯徳中王命括民丁將益軍旅州縣長吏因之多所殘弊億乃手䟽之辭理切直王感悟遂寢其事王甞與丞相以下論及時務且言民之勞逸率由時君奢儉因為詩二章以言節儉之志命億應和億以北方侯伯多獻淫巧乃因詩以風刺王嘉歎乆之仍賜詩以美其意億甞以息女許王舅吴氏子而諸吴驕恣日益遂怒之自是不通時人稱其强正建隆初奏授明州奉國軍節度使檢校太保末年夢金甲神告其終期因㑹賓客飲酒與之訣寢疾三日而終年三十九諡曰康憲壬申𠡠祀禹祠於東府己卯王從兄温州刺史仁俊卒三月五星聚奎如連珠在降婁之次太平之兆也是月建武軍節度使檢校太尉王子惟濬入貢而還賞賜吴越國賢徳順夫人珠翠冠帔等夏四月辛巳命王子寧逺軍節度使惟治兼判奉國軍事秋七月辛亥𠡠授王弟儀依前鎮東安撫使金紫光禄大夫檢校太保冬十月王遣元帥府掌書記黄夷簡入貢是月𠡠遣使至賜王生辰禮物十一月辛酉大閲於教塲仍宴將帥戊辰六年春三月乙酉丞相元徳昭卒徳昭字明逺撫州南城縣人父仔倡任新撫饒信四州刺史淮南節度使檢校太傅仔倡之在信州也頗傾心於我屬衢睦作叛亦有犄角之力及為淮人所攻其下内叛遂奔於我武肅王禮以賔席惡其本姓危氏乃更曰元因為錢塘郡徳昭起家鎮東軍節度廵官錢塘縣令累授睦州軍事判官知台州新亭監始在信州仔倡使日者視諸子日者指徳昭曰獨此子非武官及學文其師授以文體文穆襲國命林鼎為丞相曰元徳昭有輔翌之才吾子孫無所憂矣連掌文翰忠獻王時南閩用師凢兵機細務悉以委之尋拜丞相王即位禮遇彌至徳昭厚重多謀臨事而不撓每屬嚴警議者盈庭徳昭至則他論皆息軍中有不議理者徳昭以事諭之無不聼服性嗜酒雖沈醉無所怠事晚年衰耗王見之謂左右曰吾向見徳昭容色衰倦必一旦不諱人誰輔我因泣下徳昭理家以孝友聞每時序置酒環列几席者凡四代甞為詩云滿堂羅綺兼朱紫四代兒孫奉老翁及寢疾自為埋文治後事終年七十有八中外無不歎息諡曰貞正乙巳建奉先寺於城西薦文考也夏六月戊午蘇州長洲縣民王安妻産三子秋七月北漢主殂養子繼恩嗣九月北漢將侯霸榮弑其主而以繼元嗣壬辰福州彰武軍事元璝卒璝少强直好詩學武及長從征有功屢授是任凡在麾下畏服嚴明無有敢犯者處兄弟不疑侍文穆及王盡臣禮以此上下和睦卒年六十有七是月勑遣使賜王生辰禮物冬十月辛酉命世子建武軍節度兩軍副大使惟濬兩浙行軍司馬孫承祐入貢助郊祭也十一月癸卯皇帝南郊大赦改元開寳十二月己酉朔日有蝕之大宋嘉祐元年丙申嵗正月七日四代孫朝奉郎守尚書刑部郎中集賢殿修撰知梓州軍州事兼管内橋道使提舉戎瀘等七州賊盜甲兵専勾當納溪夷人公事上䕶軍賜紫金魚袋錢中孚寫大宋紹興二年壬子嵗六月二十七日七代孫廸功郎前河南府儀曹椽錢渙伏覩曽祖修撰所傳吴越備史於蔡子發家遂取而歸復藏吾家焉在臨安府寳蓮山寺題吴越備史卷四欽定四庫全書吴越備史補遺舊本備史皆止於戊辰年而忠懿之事未終此卷不知作自何人盖恭本傳及秦王貢奉録家王故事為之或以合於備史今釐正之開寳二年春正月制加王食邑三千戶實封六百戶是月遼主明扆嗣位秋八月𠡠遣使至賜王生辰禮物并御衣紅袍一副金鎻甲一副及駞馬一百頭三年春正月王親饗五廟秋九月王遣子惟濬入貢是月詔王出師伐富州王將起師尋以路逺詔止之四年秋九月𠡠遣使賜王生辰禮物衣冠劔佩等冬十一月皇帝南郊制加王食邑二千戶實封六百戶仍改賜開吴鎮海崇文耀武宣徳守道功臣五年春三月建武軍節度使檢校太尉王世子惟濬貢奉歸賫賜吴越國賢徳順睦夫人珠翠冠帔各一副秋九月王遣元帥府掌書記黄夷簡入貢太祖謂夷簡曰汝歸語元帥當訓練兵甲江南倔强不朝我將討之元帥當助我無信人言唇亡齒寒王宻表謝且請師期冬十月王親饗五廟復謁寳墖寺拜先王銅容六年秋八月𠡠遣使賜王玉帯一條御衣一襲及生辰禮物冬十一月二日大雪雪氣如煙七年夏五月𠡠遣進奏使錢文贄賜王襲衣玉帶玉鞍勒馬各一事金器二百兩銀器三千兩錦繡一千段秋七月𠡠詔王取常州詔曰𠡠錢俶朕統御萬邦撫臨兆庶推至誠而待物期率土以歸心布恵行仁是予本志興師動衆非我願為惟彼江南言修臣禮久被撫綏之化頗傾依附之心貢封章則惟見恭勤修外貌則多從減降既云事大每欲包荒甘言甞信其赤心内稔豈疑其奸計而又疊傾誠欵願降冊封既禮分之未虧故我心之無間使人頻至詞㫖愈専是以特降近臣俾其畧来赴闕頒宣優厚恩禮殊隆何期終日包藏一旦彰露不惟多方託故懇避来朝而乃修葺城池選練軍旅教習戰陣抽㸃鄉兵為捍拒之謀作攻守之備朝􅋝養冦垂二十年心狠貌恭突然自敗向展為臣之禮適滋觀釁之方每云傾輸動彰狡詐既行問罪須至興師今者禁衛出軍雲臺選將尅期攻取直抵昇州卿任重統戎心専蕩冦況早者曽披章奏具述事宜今騐姦兇果符陳請聞兹討伐必罄忠廑今候丁徳裕到彼住三五日可部領兵士起發且往攻取常州毘倚之懐寤寐無已故兹詔示想宜知悉是月王宻遣行軍司馬孫承祐入奏機事九月孫承祐自京賫宻詔囬師期定矣王即日命境内訓練士卒揀閲兵甲是月𠡠遣内客省使丁徳裕賜王生辰禮物冬十月𠡠授王東南面招討制置使仍賜御劔一口御甲一副金鞍御馬一疋仍命丁徳裕為行營兵馬都監又以雲騎雄㨗等指揮歩兵凢千人輔王進攻常州是月庚申王親率鎮國鎮武親從上直等都指揮使王諤等五萬餘人發自國城丁徳裕為先鋒使是日天氣晴和風色便順癸亥次嘉禾有氣黒色形如覆舟當行府之上占者曰王氣也丙寅王率諸軍入毘陵前鋒所至賊望風而遁有獲巨龜於旌門之下占者曰𤣥武之應也戊辰王次毘陵遂克闗城常人以牙城自守王命營於九僊墩命親從指揮使凌超等分營四門命鎮國都指揮使王諤攻江隂鎮武都指揮使金彦滔攻宜興並率水艦由吴興出太湖而進十一月詔遣弓箭庫使王文寳来宣諭仍賜湯藥以金盒盛封至是月王遷行府於賊城南門金彦滔克宜興獲其令尉等官士卒凡二百五十人馬八十疋王即命金彦滔獻於京師十二月癸亥王親率軍將攻㧞城寨殺賊軍二千餘人生擒六百餘人辛未又敗賊萬餘人於城北金陵大將盧絳宵遁先是城中既危金陵遣大將盧絳率萬人来救至是敗之絳僅以身免翌日王命鈐轄使沈承禮等並告於京師八年春二月詔遣内直使陳理来宣諭仍以戎服五萬副賜王軍卒又賜王將帥服帶器帛有差是月王親率大軍攻其壘不克夏四月我師復大攻城壘時偽知常州軍州事禹萬誠遣觀察推官鄭簡降欵於軍門且請命焉王從其請禹萬誠等詣行府待罪王賜以衣冠器幣等悉送於京師以請命又命羊酒置其家以安慰之江隂寧逺等軍沿江石橋等寨軍兵来降王悉宥之是月𠡠遣使来宣諭授王守太師加食邑六千户實封九百户仍賜湯藥及沿身法物等五月詔客省使丁徳裕權知常州仍又遣𠡠上侍禁李輝賜王襲衣玉帶玊鞍勒馬各一事金器二千兩銀器一萬兩錦綵一萬段詔王歸國是月王遣兩浙諸軍都鈐轄使沈承禮等率兵㑹王師於金陵先是毘陵降人凡二千餘口至是悉分還本郡仍表奏之詔書褒焉冬十一月我師克金陵偽主李煜出降是日冬至軍中皆㑹飲承禮謂諸將士曰城中以我節序必有讌享備我怠矣宜出其不意以圖之乃召敢死士十人以火攻其城陷其東門士皆賈勇攀壘而上王師覩之亦攻其南煜危廹遂出降焉是月王乃表賀之復遣大將孫承祐上表請入覲十二月王克金陵有功𠡠遣東頭供奉官徐靖賫賜王綵錦八對御衣一副金盔一頂金甲一副御酒一百瓶駞馬三百疋仍賜御札一通褒焉又賜王麾下孫承祐為平江軍節度使沈承禮為寧海軍節度使又賜為防禦使者三人為刺史者六人賞克金陵之功也是月詔許王入覲焉𠡠錢俶省所差鎮東軍支使王通今月二十八日走馬到闕奏今月十五日偽命知常州禹萬誠等歸附已安撫城中事具悉卿位髙王霸天付將才門専衛社之勲世著勤王之節一昨親提銳旅取彼堅城勢孤而既絶援兵力盡而遂輸降欵遽歴寒暄之候遂成克復之功永増史冊之光輝實恊君親之任委甚為嘉賞不捨寐興故兹奬諭想宜知悉九年春正月庚申王發自國城先是太祖皇帝因王入覲𠡠遣供奉官張福貴淮南轉運使劉徳言開古河一道自𤓰洲口至潤州江口逹龍舟堰以待王舟楫其堰遂名曰大通堰又於京城之南勑建大第連亘數坊棟宇宏麗儲什物供帳之𩔖皆御王者賜名曰禮賢宅以俟王駐節焉二月辛丑王次寳應勑遣引進使翟守素至賜王湯藥以金盒盛之又賜金鞍轡馬二疋仍押御厨儀鸞翰林皆至焉甲辰王次泗州𠡠遣内臣至賜馬三百疋駞一百頭以載行李辛亥又遣内司賓洎内臣至賜王夫人孫氏湯藥二金盒法酒五十瓶茶果五十盒是日次近畿皇帝詔山南東道節度使興元尹皇子秦王徳昭迎勞仍賜法酒一百瓶果子一百盒翌日王至亰師詔興元尹賜宴於迎春苑尋詔王居禮賢宅王未至前數日太祖幸其宅躬自閲視其恩禮如此戊午王朝見於崇徳殿進賀平江南及允朝覲表貢奉犀玉帶及寳玉金器五千餘事上酒一千瓶遂賜宴於長春殿中席就幄次賜黄金照匣黄金鈔鑼及瓶盤等皆御物也己未王進謝詔宴於後苑丙寅駕幸禮賢宅賜金二千兩銀三萬兩絹二萬疋又賜王世子建武軍節度使惟濬及陪臣通儒學士崔仁冀等絹帛有差是日王遣世子又進通犀帶二條金玉寳器五千事三月制賜王劔履上殿詔書不名進封王夫人孫氏為吴越國王妃封王女為彭城郡君仍詔内臣賜王妃湯藥法酒茶果等五百餘事翌日宰臣上言異姓諸侯王無封妻為妃之典上曰行自我朝盖旌忠賢何必古也時又詔王宴於苑中獨太宗秦王侍坐酒酣上命王與太宗秦王叙昆仲之禮王叩頭陳讓再四翌日太祖將幸洛陽詔王歸國王懇請随駕詔不許惟留王子惟濬從行是月王奉辭詔遣賜金器二千兩銀器一萬兩銀三萬兩對衣玉束帶玉鞍轡御馬一疋細馬五疋綾羅錦縀共八萬疋戎装器八百事散馬一百疋衙墜腰帶絡縫衫等二千事又賜王麾下將帥等官錢帛有差太祖謂王曰南北風土炎暑不同宜加調䕶卿可早歸又親賜宻封包袱一封謂曰卿至途中宜宻視之王涕泣進言願三嵗一朝上曰川陸迂逺當俟我詔㫖即来次日王妃入辭中宫賜金器三百兩衣著二千疋銀二千兩是月甲戌王離亰師詔秦王賜晏於迎春苑𠡠遣引進使翟守素押翰林御厨儀鸞送至睢陽次日又遣入内小底乗驛至賜王湯藥二金盒王妃湯藥一金盒戊子王在舟中再拜宻開所賜黄袱視之皆羣臣乞留王章䟽也王既入朝文武羣臣屢上䟽乞留王太祖知王忠厚謹慎固不允及王起行時宻以賜焉夏四月丙辰王至國城丙寅王命子惟治詣闕謝恩即日王視事移座於東偏謂左右曰西北者神亰所在天威不違顔咫尺某豈敢寧居乎五月太祖郊畢制加王食邑三千户實封一千户秋八月𠡠遣進奏使汪知杲至賜國信及生辰禮物冬十月太祖宴駕太宗即位大赦改元太平興國𠡠詔以封命諭王以廷美為開封尹封秦王徳昭為永興節度封武功郡王徳芳為興元尹又𠡠遣侍御史雷徳驤来告哀王率府僚將校等發哀王二日不食十一日不視事十一月王遣元帥府衙内都指揮使王子惟渲賫通天犀帶一條金器五百事玳瑁器五百事塗金銀香龍等巨萬詣闕以為賀是月𠡠遣樞宻都承㫖武珍制加王食邑五千户實封一千户仍賜龜魚寳帶襲衣等是月呉越國王妃孫氏薨太平興國二年春二月勑遣給事中程羽来歸王妃之賵諡王妃曰闕夏五月王下令以文軌大同封疆無患凡百禦敵之制悉命除之境内諸州城有白露屋及防城物亦令徹去之秋八月詔遣翰林學士都承㫖李昉賜王生辰禮物是月王遣兩軍節度使世子惟濬入朝修覲禮也三年春二月六日王發國城三月二日次揚州𠡠遣閣門使梁逈内班閻承翰来賜王湯藥茶酒及押諸司官迎接七日次洪澤驛𠡠遣供奉官李思彦至賜王湯藥一金盒玉鞍轡馬一疋散馬三十疋玳瑁絨毛暖衣等物及賜從行將校有差十五日王次宿州又遣入内小底副行首蔡守恩賫詔至仍賜王龍茶三觔以金盒盛之御酒二十瓶荔枝鵝梨石榴共六百顆以銀装籠子盛封十七日王次永城時太宗勑遣王世子兩軍節度使惟濬迎候以内班李神佑領翰林儀鸞御厨諸司随世子至賜御筵一席是日王遣平江節度使孫承祐自亰至傳宣撫問二更閣門使梁逈又至復傳宣撫問二十四日王至亰師𠡠詔皇太弟開封尹廷美賜宴於迎春苑仍遣賜王對衣八事玉排方腰帶金器一千兩銀器一萬細衣三千疋玉鞍轡馬一疋是日王安居於禮賢宅二十六日朝見於崇徳殿謝恩及謝差親王迎接賜宴於長春殿王進上法酒五百瓶金銀器物三千兩綾錦一萬龍鳳香等二萬事翌日遣使賜王生料羊二百口法酒三百瓶粳米二百石雜買錢一萬緡草料柴炭稱是又賜從行將校等官錢三萬緡二十九日遣内司賓来賜果子三十盒法酒一百瓶蒸羊食物等十匱三十日詔王宴於後苑王復進寳玉金銀酒器等三千兩通犀帶一條龍鳳龜魚帶六事時太宗命射每中的者即進金銀器三百兩太宗中的者六夏四月八日詔王宴於崇徳殿二十三日宴王於後苑二十六日詔王宴於南郊御莊王又上酒器金銀器皿等共二千餘兩王酒酣至暮而歸第次日遣内司賔賜王御衣紅袍一副綵衣六事寳帶一條金酒器三千兩細馬四疋御馬一疋儀鸞一副是日王進拜表謝恩仍請以吴越封疆歸於有司優詔不允表略曰伏有懇誠貯扵肺腑幸因入覲輒敢上言益虞神道之害盈必冀天時之從欲臣近䝉賜以劔履上殿詔書不名仍以本道召募卒徒甞營戈甲特建國王之號并増師律之嚴皆所以假其寵名詫其隣敵方今幅員無外名數洞分豈可冒居自罹公議合從省罷以正等威除本道軍甲器已曽奏納外所有封吴越國王及天下兵馬大元帥職名並乞觧罷凡頒詔命悉願名呼庶聖朝無虚授之恩㣲臣免速亡之禍五月三日遣内使賜王湯藥四金盒金器二百兩銀三千兩次日王再上言請之略曰臣慶遇承平之運逺循肆覲之儀宸眷彌隆寵章皆極斗筲之量實覺滿盈丹赤之誠輒兹披露臣伏念祖世以来親提義旅尊戴中京略有兩浙之土田討平四方之僭逆此際盖隔朝天之路莫諧請吏之心然而禀號令於闕庭保封疆於邊􅗲家世承襲已及百年今者幸遇皇帝陛下嗣守丕基削平諸夏凡在幅員之内悉歸輿地之圖臣一邦僻在江表職貢雖陳於外府版籍未歸於有司尚令吴越之民猶阻唐虞之化太陽委照不及蔀家春雷發聲尚為聾俗則臣實使之然也罪莫大焉願以所部十三州獻於下執事其地閭里名數别具條析以聞伏望陛下念奕世之忠勤察乃心之傾向特降明詔允兹至誠是月六日乃下詔從之詔曰卿世濟忠貞志遵憲度承百年之堂構有千里之江山自朕纂臨來修覲禮覩文物之全盛嘉書軌之混同願親日月之光遽忘江海之志甲兵樓櫓既悉上於有司山川田土又盡獻於天府舉宗効順前代所無書之簡編永彰忠烈所請宜依於是所部州十三縣八十六户五十五萬七百兵一十一萬五千暨民籍倉庫盡獻於朝帝御崇元殿受之是月王麾下將佐軍校聞之皆慟哭曰吾王不歸矣𠡠陞揚州為淮海國制王依前守太師尚書令兼中書改封王為淮海國王食邑一萬户實封一千户仍充天下兵馬大元帥仍改賜寧淮鎮海崇文耀武宣徳守道功臣以王弟𢎞儀𢎞信並為觀察使以王子惟濬惟治並為節度使十三日賜王淮海國王金印一靣仍賜禮賢宅為永業十五日又授王子惟演惟灝及未官者子弟并麾下將校孫承祐沈承禮並為節度使等官有差又賜賓幕宰相而下拜官者又二千五百人二十三日詔王宴於長春殿至暮歸第六月四日詔王宴於後苑命世子惟濬侍坐泛舟於宫池十五日遣入内小底賜王湯藥四金盒對衣四事八寳玉帶二條法酒一百瓶二十四日詔王宴於御莊秋七月命亰城張燈於王宅第前後賜設燈山陳樂聲以寵之十八日詔王宴於崇徳殿命世子惟濬侍坐焉二十六日遣使至王第慰問仍賜茶藥一金盒八月六日詔王緦麻以上親並赴闕授以官爵九日命以杭州伶人馬迎恩等四十五人賜王俾偹旦夕宴樂十四日詔王宴於後苑泛逰宫池二十四日遣内使賜王生辰禮物九月九日詔王大宴於長春殿歡樂終日二十日王忽染風疾太宗傳宣旦夕遣使撫問二十五日又遣内司賓賜王茶果湯藥等冬十月七日王進朝謝賜宴於後苑十一月朔太宗南郊禮畢詔加王食邑二千户實封一百户十二月八日遣使賜王蒸羊食物茶果等共十二匱法酒一百瓶二十五日詔王宴於長春殿至暮歸第特輟御前二大燭送焉己卯四年春二月朔王入朝賀大宴於苑中太宗顧王甚厚飲必命釂王大醉及罷拜不能興太宗仍以金装擔子送王歸第仍以賜之是月車駕征太原王請從行翌日詔中使别押諸司供帳御厨從王每旦夕傳宣撫諭錫賚殆無虚日王小心畏慎每晨趨闕蚤先至宫門假寐以待一日夜漏四鼔清蹕啟行時風雨大作諸節鎮無一人至者太宗見王與世子惟濬稱歎久之謂王曰卿中年宜避風冷自今入見不須太早仍輟御前四大燭賜焉又召王旦夕宴飲一日中頓賜王從官酒食再賜衛士羊肩巵酒觀其飲啖太宗見其雄壯因頋王王進曰正所謂如虎如貔如熊如羆上大恱翌日㑹劉繼元降上御連城臺誅軍中先亡命於太原者時大臣皆侍坐太宗頋謂王曰卿能保全一方以歸於我兵不血刃深可嘉也仍賜紅􅂁一副玉鞍轡馬一疋細馬二疋又賜世子惟濬細馬一疋綵衣一副秋七月車駕凱旋大行封賞中書進擬加王食邑一萬户實封一千户以麻卷入御筆改増加王二萬户實封二千户是月二十六日王入朝賀進金銀器三千兩錦綺二百疋即宴王於苑中又命世子惟濬侍坐八月二十四日遣中使賜王生辰禮物冬十月六日遣内使賜王法酒二百瓶御食八匱十一月十二日宴王於長春殿十二月十九日詔王宴於崇徳殿酒酣至暮歸第五年春正月太宗御朝元殿受朝賀時王以劔履升殿觀者榮之三月清明節太宗御大明殿召王乗馬擊毬凡五籌仍以毬杖引毬以授王俾王擊之是日宴於殿廡飲必唱籌頋謂王曰卿中年宜以此娯況今清明令節宜加調䕶王啟陳謝夏四月一日王以風疾告假遣御籌中使一日三至第仍賜湯藥茶果間日一至六月三日車駕親幸禮賢宅撫慰再四仍賜金器一千兩錢一萬索銀一萬兩綾絹一萬疋王遣子惟治進謝秋八月十一日車駕又臨撫慰親賜湯藥二金盒二十三日遣中使賜王生辰禮物九月十一日王進朝謝於崇徳殿復上金􅏻定器二千事水晶瑪瑙寳􅏻器皿二十事珊瑚樹一株冬十月二十一日詔王宴於朝元殿至暮又以金􅏻肩輿送王歸第仍以賜焉又以御前二大燭前導十一月戊午駕幸大名府王請從駕詔許賜王肩輿舁從行七日太宗獵於城之東時風寒頗嚴令中使傳宣俾王先回是月二十日車駕還京六年春正月王風恙復作遣尚醫中使駱驛而至自是賜王免朝二月太宗南郊禮畢制加王食邑一萬户實封一千户夏五月王尚在風疾遣中使以紫白水晶棊子盛以金盒雜寳文楸棊枰賜王且諭曰朕萬機之暇頗留意卿疾未痊宜用此自怡一日内臣趙海常被酒詣王府第將吏以為傳詔者亟禀於王即進寢室見之海因問王疾何如王曰足疾已久沈痼今又加之風眩海探懐中出藥百粒以奉王時王方命茶盡餌之諸子孫及左右惶懼憂駭計無所出海既去家人皆泣盖有所疑也王笑曰主上待我甚厚中貴必良藥也翌日太宗聞之大驚即遣中使撫慰乃杖海脊二十桎梏坐海於王第門者三日然後流於海島王遣世子惟濬陳謝太宗撫問乆之又賜湯藥一金盒六月十一日王復貢黄金三千兩白金二萬兩秋八月二十四日遣内使賜王生辰禮物翌日駕幸禮賢宅王疾尚未痊出迎拜不能興太宗親曳之撫問再四王侍坐進茶太宗仍賜細茶果二十盒袪風法酒二十瓶又賜王子以下絹帛有差冬十月一日王朝謝於文徳殿太宗大恱擕手撫問良久遂賜宴於長春殿謂王曰卿恙少可天氣嚴寒宜避風冷自後免入朝王稽顙陳謝十二月三日遣中使賜獸炭一千擔柴米稱是七年春三月太宗貶秦王廷美為西亰留守夏四月王風疾復發太宗遣中使慰問賜王湯藥一金盒又遣入内小底以龍鳳簫笛娱王終日秋八月二十四日遣中使賜王生辰禮物翌日王遣子惟灝進謝貢金銀器二百五十兩八年春正月十三日遣中使賜王珍珠寳燈一座仍命坊市張燈於王第前後俾王怡恱三月三日詔加王食邑二千戶實封五百户夏五月遣内使賜王珍珠黄羅􅏛一龍香凉茶二十觔秋八月二十三日遣使賜王生辰禮物翌日王遣世子惟濬貢上白龍腦香一百觔金銀陶器五百事銀二萬兩黄金一千兩冬十一月王以天下無事兵革偃息乃讓大元帥及國封表上但許罷兵柄其國封如故仍加王食邑三千户實封五百户十二月六日遣中使賜御筵一席以儀鸞迎送王第近代無比雍熙元年春二月二日上幸太乙宫路由禮賢宅王力疾出見於道旁上駐輦撫諭至於再三及駕還命取他路歸遣中使諭王恐煩迎接徑由他路歸矣夏四月十三日遣中使賜湯藥二金盒秋八月二十三日遣中使賜王生辰禮物冬十月華山陳摶號希夷先生謁王王問先生得養𤣥黙之道摶曰山野之人何知神仙黄白之術也十二月十一日太宗郊禋禮畢進封王為漢南國王加食邑二千户實封四百户仍改賜寧海鎮國崇文耀武宣徳守道功臣二年春正月太宗以王善於草𨽻遣中使取王草書筆迹王以風恙手不能握筆命將往時所書絹圖草字遣世子惟濬同中使以進下詔奬諭仍賜金匣玉硯一副龍鳳墨一百錠紅綠筆一千管盈丈紙二百軸細白絹三百疋幕府宰相洎朝中大臣文士撰恩賜漢南國王金匣玉硯詩文進上觀覽命黄絹圖本遣賜王夏四月召王宴於後苑帝曰春氣暄和萬物暢茂四海安寧朕當以天下之樂為樂宜令賞花賦詩五月駕幸禮賢宅撫慰久之又命王取平日所書𨽻書觀看太宗大恱收取數幅翌日遣中使賜王御筆二百枝龍墨二十錠紅袍一副秋八月二十三日遣中使賜王生辰禮九月九日召王扶疾宴於崇徳殿是日楚王元佐廢為庶人元佐太宗長子也聰敏鍾愛之因力救秦王廷美貶不解遂發狂㑹重九宴諸王元佐以新瘥不預諸王歸過元佐遂恚曰是棄我也因夜縱火燒其宫太宗怒詔廢之冬十月遣内使賜王夫人龍鳳珠冠一頂金三百兩銀二千兩十一月十五日遣中使賜王幕府將校幣帛又加授王子惟治等九人官爵有差三年春二月太宗以王疾未痊詔免入朝改封南陽國王仍賜領南陽節鉞加食邑二千户實封一千户麻降王復抗表陳讓國事表四上四月王將赴南陽詔免入辭賜御衣一副襲衣玉束帶一條金器一千兩玉石器皿一百事銀器一萬兩仍詔山南東道節度使王子惟濬送王至尉氏縣詔雍州團練使王子惟渲韶州刺史王子惟灝並從王行是月二十六日王發亰師詔遣中使賜御酒二百瓶龍茶二百觔櫻桃二金盒仍遣中使押翰林儀鸞御厨送王五月王遣子惟灝詣闕謝恩貢上鰲山寳樹一座紫金獅帶一條金銀器皿共一萬兩太宗撫問再四六月太宗命韶州刺史王子惟灝歸加王食邑五千户實封三百户仍賜國信湯藥二金盒茶餅二十匱寳帶一條金器一千兩銀􅏻器皿稱是又賜王子惟灝銀二百兩秋八月王不康𠡠遣東頭供奉官髙品尚醫李宻并王孫相繼而至又遣中使王首宿至賜王生辰禮物仍令撫問四年春二月𠡠遣給事中崔灝改封王為許王加食邑一萬户實封二千户仍改賜安時鎮國崇文耀武宣徳守道功臣端拱元年春正月太宗藉田大赦改元二月𠡠遣中使進王為鄧王加食邑一萬户實封三千户三月王遣子惟治表賀貢上金飾玳瑁器皿五百事玉器二十事水晶盤四事金二千兩銀二萬兩錦綺二萬疋羊二百口法酒二百瓶以為賀禮夏四月太宗命王子惟治歸賜王御羅袍玉帶瑪瑙嵌珍珠酒器八對又輟御前金燭臺一對以賜焉秋七月王復不康太宗聞之𠡠遣中使王守文翰林醫官王佑洎王諸孫駱驛而至仍又𠡠遣供奉官詔加王食邑三萬户實封五千户仍賜撫問及賫御藥一金盒八月王疾稍痊遣子團練使惟渲詣闕謝恩貢上黄犀帶一大玉帶四金飾酒器一千事黄絹草書八幅𨽻字四幅太宗撫問再四是月𠡠遣皇城使李恵河州團練使王繼恩同王子惟渲賜王生辰禮物國信至王扶疾拜命與来使燕接極歡二十三日晡時王於寢齋之西軒命左右讀唐書數篇又命諸子孫誦調章詩叶數篇未訖忽風恙復作四鼓而薨是夕大流星墜於正寢之上光燭滿庭王以天成四年八月二十四日四鼔而生復以端拱元年八月二十四日四鼓而薨以生記薨實周一甲子矣即日王繼恩先還京報訃太宗聞之哀悼不已詔廢朝七日復𠡠王繼恩押入内班賈繼勲䕶䘮歸於京師冬十月二十四日王䘮發南陽十一月二十二日至亰師太宗復發哀詔權窆於城東别墅即日命有司致祭翌日遣中使賞御筵一席致獻於王䘮次前二十五日太宗御文徳殿命工部侍郎郭贅追册為秦國王太常定諡曰忠懿二十八日復遣工部侍郎郭贅致祭於䘮次十二月十八日遣中使獻茶湯於䘮次二年春正月丁酉日遣使押翰林儀鸞鹵簿鼓吹葬王於河南府洛陽縣賢相里陶公原命大臣以下俱素服送三十里仍命有司撰碑文王任太師尚書令兼中書令國王凡四十年為元帥三十五年窮極富貴福履之盛近代無比王性儉素自奉尤薄常服大帛之衣帷帳裀褥皆用紬絹紫絁食不重味禀性謙和未甞忤物在藩日每有朝廷使至接奉勤厚進貢之物制作精妙將遣使必列陳於庭北面焚香再拜而遣之廢王甞於山亭擊鼓聲聞於外守衛者遽以聞王王曰吾兄以閒適為懐非鼔樂不歡乃命􅏻金魚水鼔四面奉之國人聞之感王孝友有出涕者由是廢王無憂廢之恨終以疾卒太平興國中趙普再入相盧多遜罷為兵部尚書一日普召王世子惟濬至謂曰朝廷知盧多遜求取元帥財物極多今未鞫劾者恐累元帥耳請具所遣之物列狀上之惟濬歸白王王曰主上英明凡大臣有過即自行何用狀上惟濬懼普因與僚吏等再三堅請曰若不預言事恐不測王曰且姑休矣我當取案籍考視之於時盡取當時簿籍命火焚之即召惟濬等至謂曰我入朝之初荷蒙主上殊常之遇故左右大臣咸有饋物非獨盧相也豈可見人將溺而加石焉汝等少年慎勿為此禍福我自當之惟濬等惕懼而退普聞之召惟濬至深自歎服稱王寛洪大度事遂寢王博覽經史手不釋卷平生好吟詠在國中編三百餘篇目曰政本國相元徳昭翰林學士陶榖皆撰序後文僖公搜尋遺墜總集為十卷撰後序行於世時天禧四年文僖公沗機衡之命特詔尊王為尚父王自國初供奉之數無復文案今不得而書唯太祖太宗兩朝入貢記之頗備謂之貢奉録今取其大者如赭黄犀帶龍鳯龜魚仙人鰲山寶樹等通犀帶凡七十餘條皆世希之寳也玉帶二十四紫金獅子帶一黄金九萬五千餘兩銀一百一十萬二千餘兩綾羅錦綺二十八萬餘疋色絹七十九萬七千餘疋金飾玳瑁器一千五百餘事水晶碼碯玉器凡四千餘事珊瑚樹一髙三尺五寸金銀飾陶器一十四萬事金銀飾龍鳯船舫二百艘銀裝器械七十萬事白龍碯二百餘斤王自入朝至歸國復入朝太祖太宗所賜金器并金物六萬四千七百餘兩銀器四十萬八千八百餘兩玉石器皿一萬七千事寶玉帶四十二條錦綺羅紈一十六萬六千三百餘疋御衣并袍襲衣等金盔六頂甲六副金玉鞍轡御馬一十六疋細馬四十八疋駞三百餘疋散馬二千七百二十疋金印四顆玉册二御劍三口法酒三千餘瓶衙墜腰帶三千事鳯冠四頂他物稱是吴越備史補遺
