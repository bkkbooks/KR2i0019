body:
  text: 惲乃王庶兄𢎞侑之親惲謀立𢎞侑故請誅之免𢎞侑為庶人復姓孫氏更名本罪異志也是月王以遺命承制授兩軍節度使九月庚申王即位於僊居堂赦境内外頒賚有差及租稅等丞相曹仲逹攝政事是月辛未王遷於思政堂命境内給復一年諸闗梁禁制悉從除減又命田園有𨽻道宫佛寺比入賦稅者悉免之冬十月長星見十一月金陵来祭我先王是月𠡠授王起復鎮國大將軍右金吾衛上將軍員外置同正員領鎮海鎮東等軍節度檢校太師兼中書令吴越國王食邑一萬户實封一千户仍賜保邦宣化忠正功臣是嵗番禺劉龔殂子𢎞晟嗣壬寅七年春正月閩人来祭我先王二月癸卯𠡠葬先王於龍山之南原三月𠡠遣使大中大夫李鶚来歸先王之賵乙丑中吴建武等軍節度使廣陵郡王王世父元璙殂子文奉嗣元璙字徳輝武肅王第四子也起家奏授沂王府咨議恭軍宣武節度判官累遷散騎常侍賜金紫尋屬軍旅事乃改授馬軍􅆹事指揮使天復二年徐綰叛頋全武請奉王子之䢴溝武肅以淮帥常請結姻好乃遣元璙㣲服為全武僕而去比及望亭有逆旅媪輒識之至潤州安仁義亦知其非常將以其下十人易之全武懼因賂閽吏中宵而去及抵䢴溝指陳逆順之理淮帥為之動容歎曰生子當如錢郎我之子㹠犬耳即日遣使命頵還軍廣陵尋逆婦而歸後累征縉雲新定皆有功授邵州刺史尋征吴興髙澧及攻東洲復授睦州刺史尋遷蘇州累𠡠授中吴建武等軍節度使蘇常潤等州團練使太傅同中書門下平章事侍中中書令在郡三十年性儉約而恭靖便弓馬文穆王即位以王兄尤加禮遇因元璙来覲為酒授璙曰今日之事宜兄當之俾予小子至是實兄推戴之力璙俯伏曰大王功徳髙茂先王擇賢立能君臣之分敢忘忠順因相顧感泣久而益歡尋奏𠡠封廣陵郡王封不及授宣命於柩前終年五十六葬以王禮諡曰宣義壬申制加王食邑七千户仍改賜保邦宣化忠正翊戴功臣夏四月漢主龔殂子玢立六月晉髙祖崩少主重貴即位秋七月王以内衙指揮使章徳安李文慶為内衙左右都監使冬十月以都指揮闞燔胡進思為内衙左右統軍使十二月己巳以龍山武功堂為文穆王廟癸卯八年春正月癸未重建功臣堂二月晉主還京是月丙辰丞相皮光業卒光業字文通世為襄陽人父日休有盛名為蘇州軍事判官太常博士光業生於姑蘇十嵗能屬文及長以所業謁武肅累署浙西節度推官賜緋命入貢京師梁後主特賜進士及第仍賜秘書郎授右補闕内供奉賜金紫貞明中淮人来求好命光業聘之及還贈錢三百萬復禁其出且曰可以市易光業曰我使介也豈賈豎也乃委置而去淮人急載随之梁主選武肅子傳珍為駙馬都尉命光業如亰師及回至靖海光業舅氏滕文規為山隂令日暝遽見黄衣吏報曰皮補闕今日已及靖海文規詰之遂失所在尋兼兩浙觀察使文穆即位命知東府事初光業旅逰㑹稽有神降於里巷光業往視之神遂不語及去衆詰之曰皮秀才来神何不語荅曰皮秀才此土地主我小神不當見之至是果騐國建拜丞相凡教令儀注多其所定光業美容儀善談論人或以為神仙中人終年六十七贈諡曰貞敬三月唐主昪殂子璟嗣年號保大閩王延政稱帝國號殷是月漢彭城𢎞熙弑主玢而自立夏四月朔日有蝕之秋七月王貶内衙都監使章徳安於處州李文慶於睦州冬十月𠡠遣使授王吴越國王玉册册曰惟天福八年嵗次癸卯十月丙午朔六日辛亥皇帝若曰在天成象拱辰分將相之星惟帝念功啟土列侯王之國朕所以法昊穹而光宅稽典禮以䟽封而況世著大勲時推令器探寳符而嗣位杖金鉞以宣威羽翼大朝藩籬東夏宜列諸侯之上特隆一字之封簡自朕心叶於輿論咨爾保邦宣化忠正翊戴功臣起復鎮國大將軍右金吾衛上將軍員外置同正員檢校太師兼中書令杭州越州大都督充鎮海鎮東等軍節度浙江東西等道管内觀察䖏置兼兩浙鹽鐵制置發運營田等使上柱國吴越國王食邑一萬七千户實封四千户錢某為時之瑞命世而生負經文緯武之才藴開物成務之志英華發外精義入神亞夫繼社稷之勲頋榮擅東南之美眷言祖考志奉國朝清吴越之土疆執桓文之弓矢天資厥徳代有其人荷基構以克家事梯航而述職殊庸斯在信史有光是舉彛章爰行盛典土茅符節方推翼世之賢黻冕輅車更重策勲之禮斯為異數允屬真王今遣光禄大夫檢校司徒行太子賓客上柱國太原縣開國男食邑三百户王玫使副正議大夫行尚書吏部郎中柱國賜紫金魚袋趙熙等持節備禮册爾為吴越國王於戯周寵元臣四履錫命漢封異姓八國始王指河岳以誓功俾子孫而襲爵爾纂服舊業朕考前文勿忘必復之言更廣無窮之祚懋昭前烈爾惟欽哉十一月辛巳王駕遷於功臣堂是月癸未丞相曹仲逹卒仲逹臨平人也本名𢎞達避王名更之祖信知嘉興監事累贈司徒本歙州人尋歸杭州為臨平鎮將入都建時信因保嘉興東界遂家臨平焉父圭浙西道營田副使檢校太尉圭將生時信夢人謂曰我當為爾子有二千石信語夢於鄉黨鄉黨不能諭皆賀曰生此子必致豐稔圭有膽氣乾寧中淮人圍嘉禾圭與其族人師魯守之賊中望氣者曰此雖孤城中有貴人不可圖也圭每與師魯登樓張樂縱飲矢石交至視之宴如也嘉禾平圭以功授蘇州刺史開平間淮人復圍蘇州屬正月望夜師魯第盛陳燒燈之宴賊之俘執者咸縱之觀圭終蘇州師魯形短而足跛武肅常稱之曰今之晏平仲也人遂號爲曹晏嬰竟卒於鎮東軍都押衙仲達初生室有紫光少時圭常節其衣食雖嚴冬尚未挾纊品饍悉與僕𨽻等又日令運甓圭在姑蘇時與仲達求婚於睦州陳詢及將逆卜之曰陳是親必不就當聘他門由是榮貴既而途由國城武肅王見而竒之乃以王妹儷焉累授台處二州刺史文穆即位居諒闇命仲達權知政事國建拜丞相今王即位復攝政事時大賚中外諸軍軍中有言不均者輙舉仗不受賜諸將不能制仲達諭之因皆釋仗而致謝仲達性淳厚好施與文穆尤重之常止呼丞相而不名終年六十二贈諡曰安成是月納元妃仰氏寧國軍節度使同參相府事詮之女也甲辰開運元年春正月壬寅丞相林鼎卒鼎字渙文閩人也父無隱鼎生於明州大隱村初刺史黄晟頗好禮士無隱依之有詩名嘗爲詩云雪消二月江湖闊花發千山道路香知言者以無隱必有貴子鼎初謁武肅以爲觀察押衙推尋爲文穆王幕府文穆王以其才行累薦不見用一日復宻薦之武肅王曰我觀林鼎骨法真輔相器然我不貴者欲汝貴之庶其盡心於汝也文穆襲國署鎮海軍掌書記節度判官鼎性讜正而强記能書歐虞法比及中年夜讀書每逹曙所聚圖書悉由手抄其殘編蠧簡亦手綴之無所厭倦國建乃掌教令尋拜丞相每政事有不逮者鼎必極言之天福中建州之役鼎指陳天文人事累䟽切諫及師行果不利著文集行於世終年五十四諡曰貞獻三月僞閩王延曦爲其下指揮使朱文進所弑而文進自立復修貢於京師是月勅授王落起復増食邑三千户夏四月丙午王親祀五廟秋七月辛未朔晉少主改元開運大赦是月以彭城知逺爲行營都統九月朔日有蝕之南船務石井有物形如守宫尾長七尺許鬛且角獲之置於安溪潭冬十一月王命從兄東府安撫使仁俊爲内外馬歩都統軍使弟𢎞保爲東府安撫使閏十二月閩人殺朱文進尋以僧巖明爲主巖明姓卓氏乃雪峰寺僧平素爲衆所重相與迎之遂立爲帝未幾爲其下李仁逹所殺而自立歸欵金陵乙巳開運二年春三月丙午王從祖順化軍節度使鏵卒鏵字輔軒太師英顯王之第五子武肅王之少弟也生而有文在其足曰王及長而滅既生而太師薨武肅育之武肅薨鏵請服通喪性多藝尤精音律承制累授温明二州刺史檢校太尉奏授恩州防禦使文穆時授兩浙行軍司馬拜命之日儀注特盛尋奏改本州團練使順化軍節度使終年五十三諡曰忠簡夏四月晉主還大梁秋七月修武肅王廟於城西奉栴檀神像而致焉八月朔日有蝕之是月金陵遣將王建封克建州虜王延政而歸冬十月勅遣太子賔客羅周岳右庶子王延濟册王守太尉十一月朔王大閱於北郊是月誅内都監使杜昭逹内衙都指揮使明州刺史闞燔庶人孫本賜死貶都統使王兄仁俊本府安置杜昭逹闞燔皆好貨冨人程昭悅以金寳交結二人薦於王昭悅得侍左右愛特踰於舊將燔不能平昭悅懼謀去燔燔專而愎國人皆惡之王亦惡之於是昭悅出燔爲明州刺史右統軍使胡進思爲湖州刺史燔謂進思曰出我是棄我也進思曰老兵得大州幸矣何爲不行乃各受命既而復以他故㽞進思統軍使王子仁俊母杜昭逹之姑也昭悅因譖燔昭逹謀奉仁俊作亂下獄鍜鍊成之誅昭逹與燔幽仁俊於東府昭悅收仁俊故吏慎温其使證仁俊之罪栲掠備至温其堅守不屈王嘉之擢爲國官丙午三年春二月朔日有蝕之三月勅授王東南面兵馬都元帥増食邑二千户實封五百户仍改賜推誠匡運忠亮威德功臣秋七月庚寅呉越國夫人許氏薨夫人丹丘人也諱新月善音律文穆王後庭樂部皆命掌之初鄜氏生孝獻世子後庭咸尊敬有尼契雲掌香火於麗春院之佛堂頗有知人之鑒視夫人曰彼鄜氏者逺不能及至是果如其言王襲位勅封呉越國夫人薨年四十四勅諡曰仁惠八月重建天寵堂是月壬申葬仁惠夫人於國城西山之原冬十月金陵攻福州節度使李𢎞義遣客將徐仁宴李廷諤等求救於王李𢎞義本名逹殺卓巖明而歸欵金陵金陵授之節鉞仍編入屬籍更名𢎞義既而遣僞兵部侍郎陳覺使於𢎞義覺還及建州又遣侍衛官碩忠以金陵僞勅使之入覲𢎞義以其初不宣命至是方以書至不從覺乃與監軍使馮延魯自建州興師皆金陵之志也是月王命統軍使張筠趙承泰等率水陸兵三萬人以救無諸時福州乞師於王王召諸將議行諸將吏皆曰道路險逺難於師救内衙都監使水丘昭劵以爲當救王曰唇亡齒寒吾爲天下元帥曽不能救隣道將安用之諸軍冝樂飽食安坐耶命水丘昭劵專掌用兵程昭悅掌應援饋運而以軍謀委元昭德遣筠等率師救之時王召左右議鑄鐡錢以益將士禄賜王弟𢎞億諫曰鑄鐡錢有八害新錢既行舊錢皆流入隣國一也可用於吾國不可用於他國則商賈不行百貨不通二也銅禁至嚴民猶盗鑄况家有鐺釜野有鏵犂犯法必多三也閩人鑄鐡錢而亂亡不足爲法四也國用幸豐而自示空乏五也禄賜有常而無故益之以啟無厭之心六也法變而弊不可遽復七也錢者國姓易之不祥八也王深嘉之乃止是行也宿衛衣錦軍武肅王廟庭者聞甲馬號令之聲凡數夕而止及接戰閩淮人視王師周遍郊野人皆丈餘蓋靈助也十二月王命弟𢎞偡爲湖州刺史丁未四年春正月契丹主入東京稱會同十年廢晉少主爲負義侯遷於契丹黄龍府二月庚午有雉集於玊華樓辛未晉彭城知逺稱帝於河東國號大漢是爲髙祖復稱晉天福十二年己夘王誅内都監使程昭恱釋東府仁俊罪三月庚寅今大元帥呉越國王出鎮丹丘戊戌王遣將余安率水軍救福州大敗淮師獲其將都指揮使楊匡業蔡遇等僞東南面行營都統王建封等走之擒戮裨將孟堅等并餘黨二萬餘衆器械數十萬李𢎞義歸附於我更名儒贇初忠懿王之治閩城壘甓皆有錢文曰此城終歸錢氏忠懿頗惡之因命剗去而錢文愈明又謡曰風吹楊葉鼓山下不得錢郎戈不罷至是皆驗是行也金陵歸罪於陳覺馮延魯謂其專命而行也金陵始以覺爲東南面招討使延魯爲監軍及其敗績反以專命爲罪以贖恥一何偷哉爲君而偷復歸於下其喪師也不亦宜乎夏四月李儒贇遣弟儒賓來請入覲從之五月我師凱旋王饗將帥於光册堂賞賚有差是月勅授王諸道兵馬都元帥増食邑五千户實封五百户仍改賜資忠緯武恭懿翊戴功臣是月楚王希範殂弟希廣嗣六月乙夘王薨於咸寧院之西堂年二十在位七年勅諡曰忠獻八月勅葬龍山之西原王英明果斷權變不測初嗣位尚少温柔好禮恭勤政務發摘姦伏人不敢欺諸校驕恣者能優容之及被譴皆不知覺兵籍使錢丞德家火俯邇内城命親軍援之王登而望有伺便攘竊者亟命斬之衆因悉力火遂滅淮人之攻閩也李儒贇來求援諸將議將不從王因集而詢之果同其說王變色曰唇亡齒寒春秋明義吾爲天下元帥執大兵柄豈不能恤隣難乎諸將躍馬肉食不能爲我身先耶有異議者斬及大舉遣將誓師辭令明肅衆皆踴躍承命既而果成大功開運中將益車徒乃下命募軍中及民間子弟而踰時無應者乃命大糾之令曰糾而得之者糧賜皆蠲半翌日投書者雨集遂加精訓南方之㨗多其力也民有獻嘉禾者王問倉吏蓄積幾何對曰十年王曰然則軍食足矣可以寛我民乃命復其境内租稅三年論曰王岐嶷之姿雖由天縱纉嗣之日方屬妙年帑藏因回禄之初將校競陸梁之志乃能恭勤庶務紹開霸圖有果斷之名無酣嗜之累以致興復宫室開拓土疆光有大功聿修厥徳而享祚非永孰不哀哉忠遜王諱𢎞倧文穆王第七子孝獻世子同母弟也起家内衙指揮使檢校司空開運元年冬十一月出爲東府安撫使累授檢校太尉尋拜丞相開運四年六月丙寅即位於天册堂是月晉主入大梁改號曰漢秋七月閩帥李孺贇來覲是月庚子有雉升於天册堂之㦸門旋厯廊廡久而獲之閠七月王命李孺贇復任無諸王親餞於碧波亭八月葬忠獻王於國城西原冬十月今大元帥呉越國王至自丹丘十二月李孺贇復貳於我王命東南面安撫使鮑修讓等攻討擒而戮之己酉傳首國城是月命丞相呉程知福州威武軍事庚戌内衙統軍使胡進思指揮使諸温鈄㴞等以内衙兵遷王於義和後院諸將校率衆迎今大元帥即位焉自忠獻王時諸校驕慢雖旋加誅殛而在位者皆優饒遇之及王纉嗣性既嚴急誅杭越侮法吏三人而統軍使胡進思恃迎立功干預政事王惡之每有僭越必顯責讓進思頗憂懼不自安屬内衙指揮使何承訓希㫖請誅之又謀於都監使水丘昭劵昭劵以進思黨盛難制請於王且容之王猶豫未决承訓懼以謀告進思進思遂亂率親兵戎服入見王叱之不退猝愕入義和院進思鎻其門矯稱王命告中外曰王猝得風疾傳位於某因帥諸將迎大元帥於私第且言於丞相元德昭德昭至立於簾下不拜曰俟見新君進思等亟出褰簾德昭乃拜進思稱王命承制授元帥元帥曰若全吾兄乃敢承命不然當避賢路進思許之元帥始視事於是進思殺水丘昭劵進思妻曰他人可殺昭劵正人君子也柰何殺之初遜王將即位近侍陳禹嘗夢以金鈔鑼承日輪加遜王之頂而手持二鐶未幾墜地既而以夢語人人曰汝主將有非常之事然其二鐶不過二十旬耳及即位又以黄金一鎰命近侍袁文昌鑄巨錢文昌意其求䜟且懼不就乃宿謀於匠者别鑄一以爲備翌日以所授金鑄之遜王臨視果不就因潛以宿鑄者獻至是皆驗其兆後廢王薨請諡曰忠遜以王禮葬會稽秦望山之原呉越備史卷三
