front:
  text: 忠獻王忠遜王附忠獻王諱𢎞佐字𤣥祐文穆王第六子也母吴越國仁恵夫人許氏王以天成三年七月二十六日己巳生於功臣堂初孝獻世子之居監撫也文穆王治其府於城北將俾居之一日孝獻會王以采戲於青史樓遽謂王曰君王方為我營府署今與爾賭之比及四擲而王遂得六赤孝獻失色從容曰五哥入府某當將符印之命因再拜孝獻竟怒擲骰盆於樓下俄而孝獻薨王授兩軍節度副使檢校太傅天福六年秋八月諸將請誅内衙指揮使戴惲
