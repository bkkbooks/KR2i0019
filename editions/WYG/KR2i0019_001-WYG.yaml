front:
  text: 九華太夫人皇考諱寛威勝軍莭度推官職方郎中守大府少卿累贈禮部尚書開府儀同三司守太師中書令追封英顯王皇妣水丘氏累封秦國太夫人追封趙國太𤣥太夫人王即長子也先是五年邑中大旱邑令命道士東方生起龍以祈雨生曰茅山前池中有龍然不可起起必大異邑令乃止明年復旱又召東方生起龍將臨池遽指王所居曰池龍已生此家矣時王已誕數日始誕之夕皇考方他適隣人急走告曰適過君家後舍聞甲馬之聲甚衆非有盜乎皇考乃馳歸王已誕矣復有紅光滿室皇考頗怪之將棄於井祖妣知非常人固不許因小字曰婆留而井亦以名焉王自幼常與羣兒聚􅃧于樹隂石上或伐薪必使羣兒聚以供已隨多少而賞罰焉王嘗憩後山忽一石屹然自立王志之及貴建功臣精舍遂以石為佛坐樹號衣錦將軍十三年冬十月皇祖太尉薨將葬之夕大風㧞樹於野詰旦術者引靈輀將就葬所謂皇考曰此㧞樹之穴是天啓也宜以葬遂窆之畢術者撫王曰當貴此孫耳王常逰徑山書院有道人洪湮者毎迎於門王頗惡之一日自後山僻徑而往湮亦迎焉王問其故湮曰君非常人故預知耳乙未乾符二年夏四月浙西鎮遏使王郢作亂勅本道徴兵討之時董昌戍石鏡鎮亦募鄉里之衆以副召王王遂委質于董氏始為偏將王入軍中驍勇絶倫為董氏所重時王年二十四及董為杭州一日因事遣王之臨安途餘杭有瞽者善摸骨相集于龍光橋在餘杭縣王因請相竟無一言王一日自臨安還日已暮矣相者復在舊所王遂贄金請相相者曰旁無人乎王曰獨在斯相者乃引臂乆之嘆曰天下亂矣朞時之内再遇貴人言訖而去旬日後王復以束帛至餘杭將酬之訪於鄉閭竟絶蹤跡戊戌五年冦盜蜂起有朱直管曹師雄王知新等各聚黨數千剽掠於宣歙間秋九月王率本鎮兵討平之以功聞授石鏡鎮衙内都知兵馬使遷鎮海軍右職己亥六年秋七月黄巢擁衆二十萬大掠州縣淮南節度使髙駢羽檄徴兵討之巢將及石鏡鎮衆纔三百人王謂董氏曰黄巢以數萬之衆踰越山谷旗鼓相逺首尾不應冝以伏兵襲之彼或少却則可逐矣巢前軍二千餘衆果﨑嶇而至王率二十騎伏於草莽巢小將单騎先進王親注弩射之應弦而斃伏兵遂起巢兵大潰王謂衆曰此術止可一舉耳大軍必至則衆寡莫敵矣宜乘勝張虛聲以懾之乃進屯八百里古地名也途次逆旅遇老嫗因誡曰後有兵至當言臨安兵屯八百里未幾巢兵果至具如所對賊衆相頋曰向止數騎尚不可當況八百里乎遂不犯境王又伺其後軍殺獲人馬而還歸功董氏淮南髙駢聞而偉之庚子廣明元年冬十二月黄巢犯闕僖宗入興元杭州始建八都
