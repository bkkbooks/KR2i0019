body:
  text: 臨安縣曰董昌王副之餘杭縣曰陳晟於潛縣曰吳文舉鹽官縣曰徐及新登縣曰杜稜唐山縣曰饒京冨春縣曰文禹龍泉縣曰凌文舉各聚千人以衛鄉里既而髙駢召董氏赴廣陵王亦從焉時駢熟視王顧左右曰此人他日爵禄必逺過於我時駢將大舉討巢命董氏從行王謂董曰竊窺髙公無討賊之志茍從其行功効不立是同坐罪宜以捍衛鄉里為辭董然之告於駢駢因禮而歸焉是月黄巢自稱大齊皇帝辛丑二年春正月僖宗幸蜀改元中和勅髙駢為東靣行營都統起師討巢駢竟不出兵秋八月己丑夜星大如杯椀交流如織至丁酉乃止西晉之末五星互經天縱横無常未幾五胡之亂騐矣九月詔授董昌杭州刺史授王都知兵馬使太子賔客壬寅中和二年秋七月浙東觀察使彭城漢宏姓犯王諱以天子西幸乃遣弟漢宥馬軍都虞候辛約率兵二萬營於西陵將圖浙西既燒漁浦刼富春兵勢甚盛董氏遣王率師禦之是月十二夜將渡江而星月皎然兵不可渡王親掬江沙而吞之祝曰吾以義兵討賊天將見助願隂雲蔽月以濟我師俄而雲霧四起咫尺晦暝王大喜即先渡江竊賊號縱火斫其營精兵繼至破賊殆盡漢宥辛約走之擁入溝塹士卒大半溺屍骸相枕冬十月漢宏又率衢婺等四州兵七萬餘人遣登髙鎮將王鎮領之營于江干連營相屬王率儒童鎮將徐靖浙江都逰奕使阮結啣枚宵濟復大破之王鎮奔諸暨王獲漢宏所署主將憲官偽勅二百餘道俘馘萬計兵甲生口稱是歸漢宏所掠民間妻女于鄉里者數百人是月詔王兼侍御史癸夘三年春三月漢宏又分兵於黄嶺巖下貞女等三鎮及山洞凡九十三所皆千餘人以圗大舉王率八都兵自冨陽以趨之破黄嶺巖下及山洞三十餘所生擒貞女鎮將陽元宗巖下鎮將史弁等仍焚其兵甲夏四月漢宏自領兵屯諸暨古剥嶺至於亭山龜山之下王先攻諸暨獲糧二萬餘斛旋破古剥嶺亭山等寨賊皆宵遁五月漢宏又遣將何肅黄珪等率本道排門軍營于蕭山諸暨等處王親禦之破賊一萬餘人生擒都虞候章公直餘皆走之冬十月漢宏又遣弟漢容與辛約巴立李萬敵等㑹温處等州兵洎白丁十萬餘衆從蕭山西陵大出戰船以謀宵濟王自新沙由漁浦而攻之戮何肅等遂趨蕭山是月戊午王親與漢宏遇自午至戌破賊大衆漢宏易服持膾刀而遁時軍中有異其状者將擒之漢宏誑曰我宰夫耳遂伏于亂屍之内得免次日漢宏復舉餘黨四萬人來我師乘勝大敗之斬漢容辛約及招討判官譚昇都知兵馬巴立先鋒李萬敵仍獲漢宏偽淮海招討使印一紐戰艦五百艘馬四千蹄兵甲萬計俘馘千人漢宏宵遁歸越甲辰四年春二月婺州王鎮執刺史黄碣請降於王漢宏聞之使其下婁賚殺鎮而代之夏四月浦陽鎮將蔣環㑹我師攻婺州生擒婁賚而還未幾勅命中使焦居燔為杭越通和使俾其改過王遂班師以待之漢宏因殺王人密徴水師於温州刺史朱褒出戰船習於望海以史惠施堅實韓公玟領之復圖水陸並進秋七月勅授王國子祭酒兼御史大夫右千牛衛將軍冬十二月朔天子南郊改元光啓乙巳光啓元年春正月僖宗發蜀三月至京師冬十月授王檢校散騎常侍右武衛將軍十二月監軍使田令孜進逼帝如鳯翔丙午二年春正月田令孜刼駕如寳鷄二月至興元冬十月大將朱玫立襄王為帝書朱玫僭立煴為帝以正其反逆之罪也是月一日王謂董氏曰除惡務去根本不爾當為後患願以全師討之董曰然王即日進師以諸都兵馬使阮結守梅市監陣使錢爽守雙童遏後使駱團守平水降將使章可周唐晟王公備等守蘭頭江海遊奕使崔則守羊石是月辛亥王親率師自諸暨趨平水導山路至曹娥埭癸丑破韓公玟因與朱褒遇水師戰䑲皆焚而溺之甲寅進屯豐山梅城鎮將施堅實執漢宏右直將張師及歸于王丙辰進㧞越城漢宏走台州辛酉戮漢宏妻母弟姪及其黨史惠史侃都虞候蔡約於軍門十二月丙午台州刺史杜雄執送漢宏至命斬于㑹稽市漢宏斥刑者曰吾亷察也非汝輩可殺吾嘗夢手捧金錢殺吾者錢公也乃請王親刃焉漢宏兖州使院之小吏也尋為大將領本州兵以禦黄巢冦遂殺將首刼輜重而叛詔忠武軍討之不利復命前濠州刺史崔鍇招㩦之宏遂降授宿州刺史㑹浙東觀察使栁瑫以賄免官皆恥代之議者以宏降將也以降將代贓吏冝矣乃除之既有七州之地復萌逆節常㑹客酒酣謂衆曰天下喪亂金刀之䜟焉知非僕遂撫掌大笑後又㑹于使院有羣鴉噪庭樹上因使伐木有座者言此樹有年矣鴉噪乃常耳願勿為怪宏曰我將斬白蛇豈止此樹耶遂伐之又嘗搆别第窮極雄壯一日有飛帛書署其門曰漢宏是賊豈冝造此大宅宅之中堂懸一錦傘守衛甚謹即夕失之人皆以為任俠所獲及舉兵至西陵將謀渡江乃禱於江干俄有一矢墜其前莫知所來宏頗惡之既敗棄其母挾妻而奔就執之日董庶人讓之宏曰成即是敗即非自古何有不敗之家不亡之國僕射有名將良䇿宏無之以至於此何必太讓哉既而儒童鎮將徐靖以俘掠居人戮之於市北關鎮將彭城孟安姓犯王諱故號彭城與弟孟宿輒啟府庫散其本部仍執亷使牌印王因饗於擊塲遂責之孟安即席謀王立斬以狥時孟宿部兵屯於外王親撫之悉有其衆越人及諸將皆推王為主王固讓董氏董遂權莅於越杭人復請王代董氏時浙西節度使周寳承制以王權知杭州軍州事兼杭州管内都指揮使是月赴本郡録其事以聞詔授王檢校尚書丁未三年春正月帝在興元勅授王杭越管内都指揮使上武衛大將軍充杭州刺史董昌為越州觀察使凡國王自陪臣以下所授官爵自貞明戊寅以前制用詔勅皆自間道而至戊寅以後南康貢路阻絶則皆航海而至皆出其迎授徐審德本日月而書之他皆倣此三月潤州客司軍將彭城浩姓犯王諱逐節度使周寳出於毗陵推度支催勘使薛朗為主仍火其城是月帝至鳯翔夏四月六合鎮使徐約攻䧟蘇州淮南髙駢為其下畢師鐸所幽乃召宣州觀察使秦彦為主五月王命東安都將杜稜浙江都將阮結靖江都將成及率兵討薛朗初杭州山賊朱直為亂遂募八縣鄉兵以討之因為八都臨安董昌首之今東安浙江皆其數也其諸都地名都號首將名姓並見於前六月師次陽羡與賊將李君旺遇大破之獲船八百餘艘秋九月秦彦殺髙駢駢擁兵叛命信用妖人自取亡滅秦彦與畢師鐸出師屢敗疑駢黨内應遂殺之髙駢之事豈非佛氏所謂輪廽果報者乎易曰積善之家必有餘慶積不善之家必有餘殃曽子曰出乎爾者反乎爾者也若髙駢所得猶未足以償數千人之怨纔足以見天道好還之不差忒耳是月詔加王檢校户部尚書至日王師次禹城斬賊將丁重德屬將趙君度走之遂進攻常州丁從實棄城宵遁從實浙西小將也有微功於周寳故用為是郡郡人以為暴虐號為丁滅門及是奔于海陵鎮鎮使髙霸及楊行密同入海赴髙駢之難從實竟為行密所害十月周寳遂歸于王王以屬郡禮具櫜鞬迎之於郊仍舍于樟亭驛是月廬州刺史楊行密始入淮南十一月十二日文穆王生十二月命杜稜為常州制置使遣阮結等進攻潤州是月乙未周寳卒寳字尚珪曽祖侍選唐滄州魯城令幽薊之亂魯城以一邑拒冦為賊所害祖光濟左贊善大夫依侯希逸於平盧軍為衙門將毎行陣獲攻魯城者必殺之以祭父父懷義以武藝為韓臯所重累官至工部尚書天德軍使寳即第三子也以父廕為千牛備身尋求去職依天平軍帥武宗三年徴方鎮有才器者入宿衛寳因𨽻右神䇿軍出為良源鎮將有戎政本軍表聞授右廂都押衙馬步軍知軍事大將軍出涇州聚糧二十餘萬斛黄巢之亂移鎮海軍節度使僖宗幸蜀加授右僕射檢校司空中和二年拜同平章事時朝廷以丞相王鐸率諸道兵復長安以寳為天下租庸副使兼管内營田使五年特授進檢校太保兼侍中進封本郡王至是以疾薨年七十四子璵嗣比唐制武選以馬上擊毬較其能否有置鐡鈎於毬杖以相擊寳嘗遇此選為鐡鈎所摘一目睛突寳即取而吞之復擊毬遂獲頭籌授涇原勅賜一木睛以代之木睛不知何木視之亦明置水中無所礙真睛矣一日早起盥漱其睛墜水盆中侍姬竊笑寳怒曰我瞎漢何足笑也遂殺之潤州衙軍以軍額號鎮海軍盖宿舊也寳復置親信號決勝軍處之後樓使其子璵揔之衆號為後樓軍其衣食糧賜數倍於鎮海士卒頗有怨望因恣横于外一日㑹客于後樓即席有言其事者則殺之而薛朗與鎮海將彭城浩素友善遂以寳意示之且誡其戢下浩聞之憤曰可以免禍者不過反耳是夕遂率鎮海軍叛乃推朗為主寳聞亂率家屬跣襪拓芙蓉門召後樓軍曰後樓軍兒郎能救我乎後樓聞之亦同叛焉寳遂奔髙駢駢與寳夾江為鎮頗有嫌隙及奔駢駢遺書曰竊承走馬以及奔牛遣送黄虀一瓶葛粉十斤以表虀粉之意寳在涇原至於金陵多㑹賔客歡宴終日後庭樂妓百餘人水陸餚饍日極豐羙以撫養欠均以致叛亂得非驕奢蠧其福禄而使然乎戊申文德元年春正月孫儒殺秦彦畢師鐸彦等因髙駢信妖􅃤酷遂亂殺駢并殺駢子弟甥姪有一婦人臨刑㦸手大罵曰我必訴於上帝使汝等後日舉家戮殺一如我今日至是果如所言是月駕在鳯翔丙寅我師克潤州生擒薛朗而還王命剖心以祭周寳彭城浩走之王命阮結為制置使又命築嘉興縣城二月駕還長安大赦改元文德三月朔日有蝕之僖宗疾革命立夀王為太弟帝崩太弟即位是為昭宗詔加王檢校司空夏四月孫儒入淮南䧟揚州楊行密奔海陵復歸廬州秋九月王命從弟銶率兵討徐約於蘇州盡驅州人以守城皆文其面曰願戰南都有軍事衙推陳車車本二名上字犯忠獻王諱謂人曰南都者盖都邑之稱杭州其終建國乎冬十一月楊行密攻殺宣州刺史趙鍠而有其地己酉龍紀元年春正月朔改元三月我師破徐約於蘇州約奔入海中箭而死約曹州人初從黄巢攻天長遂歸髙駢用為六合鎮將浙西周寳子婿楊茂寳為蘇州刺史約攻破之遂有其地而制度不軌刼王貢賦至是而滅冝哉王命海昌都將沈粲權知蘇州事夏四月丁丑命築安衆營於臨安五月甲辰潤州阮結卒結字韜文錢塘人也杭州建八都結亦副焉中和二年以征漢宏有功授散騎常侍光啟三年征常州又平潤州累授户部尚書四年充潤州制置使尋遷刑部尚書初徐約之黨三千餘人來降結撫之失所因散香於甘露寺輒為所叛卒投于江遂成疾而卒年四十六王以其弟右驍衛將軍阮綽領其本郡仍命成及代之及盡誅其叛卒秋七月勅授王金紫光禄大夫檢校司空本州防禦使冬十月勅除給事中杜儒休為蘇州刺史以沈粲為制置使十一月帝南郊更名􅓮改元大順是月宣州楊行密遣將李友陷我毗陵執杜稜而去初李友攻毗陵鑿穿地道而入兵甲俱以土中夜入于稜之寢室因執稜于卧榻而去十二月淮南孫儒遣其下彭城建封姓犯王諱帥衆陷我潤州成及奔歸庚戌大順元年春正月戊子朔皇帝受册尊號大赦夏四月勅遣使徴兵討李克用因路逺事遂寢秋七月常州李友陷我姑蘇制置使沈粲害刺史杜儒休及兄延休而奔於我王以其失備復害刺史將欲誅之粲遂奔孫儒初沈粲之攻杜儒休儒休曰勿殺我與爾金粲曰殺爾金將焉往遂殺之儒休延休異母兄弟也同日而生至是同日而死異哉非聖人不能知其所以然也是月楊行密遣將張行周為常州制置使八月制加王吳興郡開國男閠九月孫儒復遣彭城建封攻毗陵殺張行周而復困姑蘇是月王命築新夾城環包氏山洎秦望山而廽凡五十餘里皆穿林架險而版築焉王嘗親勞役徒因自運一甓由是驂從者争運之役徒莫不畢力冬十一月孫儒陷姑蘇李友奔常熟十二月孫儒歸淮南仍以沈粲為制置使是月勅遣使髙品賜官誥加王檢校司空同平章事辛亥二年春正月孫儒自淮南復入姑蘇將乘勝以圖我王出舟師以禦之儒遂絶南顧夏四月彗星見大赦天下秋七月城東安鎮冬十二月孫儒燒掠蘇常遂逼宣州因圍楊行密行密遣使求救于我王出糗糧甲兵以助之是月常州甘露鎮使陳可立據本州王遣師平之壬子景福元年春正月丙午朔大赦改元二月命從弟銶為蘇州招輯使夏四月初陞杭州為武勝軍授王本軍防禦使六月王出師㑹宣州兵敗孫儒于宣城行密斬孫儒傳首京師宣州以沈粲歸王戮之于市而行密因有廣陵焉初楊行密軍師張某或曰李某頗善占筭前一日謂行密曰明日大水亭午可獲孫儒時畏日曦赫儒兵正勝人皆哂其言及詰旦西北有雲大如箕漸漸彌漫俄而㴻雨大水暴作儒謂衆曰城中大水將及我諸營自顧無相救也俄而水深丈餘城中知其號令乃徑出兵以擊儒營他皆不救因獲儒軍師之言果騐是月泉州王潮攻陷福州殺范暉而有其地亦作鮑姓乃陳巖之子婿也巖為福州數年而卒以暉繼之至是為王潮所害時福州嘗有僧記之曰潮水來岩頭沒潮水去矢口出矢口盖言將來繼潮之人也癸丑二年春二月楊行密以其將田頵牧宣州安仁義牧潤州夏閠五月詔授王本軍團練使蘇杭等州觀察處置使進封彭城郡開國侯食邑七百户秋七月丁丑王率十三都兵洎役徒二十餘萬衆新築羅城自秦望山由夾城東亘江干洎錢塘湖霍山范浦凡七十里咸通中京師有望氣者言錢塘有王者氣乃遣侍御史許軍中使許計賫璧來瘞秦望山之腹以厭之使廽望氣者言必不能止又郭璞著臨安地志云天目山前兩乳長龍飛鳯舞到錢塘海門山起横為案五百年生異姓王至是果騐率十三都者八都之外有紫溪保城龍通王泉三鎮是為十三都九月制授王鎮海節度浙江西道觀察處置等使潤州刺史先是今年三月詔以鳯翔宿衛耀德都頭李鋋授特進同平章事領浙西差朝廷以李茂貞徹海王忠其黨將奪之權乃有此授而丹陽已為淮人所有鋋不能至所治至是命王時議當之又周寳莅丹陽州人凡有期必曰待錢來斯之應也蜀禪月大師休公嘗上詩曰今日再三難更讓䜟辭唯道待錢來明矣甲寅乾寜元年春正月乙丑朔大赦改元二月王命成及權蘇州刺史三月制王自光禄大夫檢校司徒進充本道營田招討鹽鐡制置發運等使夏五月勅遣中使彭城延鉅姓犯王諱特授王開府儀同三司同中書門下平章事六月勅遣中使賈居蟾賜王私門立㦸乙夘二年春二月進封王開國公食邑一千户是月威勝軍節度使董昌僭稱皇帝建元順天國號羅平年號或云天册或云天聖皆非也江東羅諌議隱撰吳越行營露布曰羅平者啓國之名順天者建元之始又曰以將門稱天册之樓以㑹府為宣室之地明矣昌以書告王其所稱云權即羅平國位印文曰順天治國之印王得之召賔吏以議曰董氏昔吾鄉黨也今吾隣藩也其豐功茂績崇名厚禄又吾所以贊成也今採聼妖妄遂圖僭亂吾已受朝廷將相當徴兵以討之然惡跡方炳庶或能改吾先馳書以勉之救其覆族之祸衆悉稱善乃遣賔屬沈滂率將吏數百人移書以諫之曰與其閉門作天子與九族百姓俱作塗炭不若開門作節度使終身冨貴無憂也及今悛悔尚可及矣昌竟不聼王乃表聞之仍又親率兵至迎㤙門望樓再拜且諭曰大王奄有數州位兼將相非不貴矣非不冨矣一旦顛倒兵柄改易臣節自貽伊戚禍不旋踵今率諸州兵至城下以俟大王改過茍不見聼則天子赫怒羽林黄頭濟江而至襲大王之城非唯大王有累卵之危實鄉黨生靈皆歸鼎㸑矣禍福之道唯大王擇之昌於是送犒師錢二億萬仍執妖人應智王温室巫姬阿韓掾吏吳瑤秦昌裕至於軍門且言待罪于天子王遂誅應智等而還復表其事時越州都指揮使馬綽指揮使駱團出降俄而詔王討昌又勅遣中使髙品李重密來勞我師仍削奪董昌官爵詔曰夫雷霆霜雪上天降以成物明賞飭法哲王垂以理人是則陽春不可以獨為嵗功仁恕不可以專為君德威刑之作其在茲乎朕以𦕈躬祗膺大寳奉祖宗之丕訓荷天地之洪休八年于茲一日無怠遜於志者既求諸道逆于心者必本於情茍懲誡之不明懼典章之斯廢威勝軍節度使隴西郡王董昌出於行伍屬遇艱難權握兵戎位崇將相器纔盈而自覆鼎必折而遂傾因慿生祠輒有狂計假陳妖異惑亂邪巫鼓噪危樓偽為建國不思理代徒生犬吠之音欲就叢祠妄舉狐鳴之兆賴浙西節度使錢諱與諸司等皆忠誠憤激壯節堅髙始以逆順之理飛章諭之而不悟次以攻伐之謀盟約脅之而不回至于率兵直以摩壘雖復假言幻惑止遏兇邪終為閉壁偷安不便束身歸罪是其隂詐猶欲張皇魚戯鼎而雖亦可哀蜋拒轍而終為不率天討有罪鬼得而誅其董昌在身官爵並削奪仍委諱進兵攻討越州城士庶且多寧無勇敢之徒善以功名自許如有梟戮生擒董昌者授以三品正員賞錢一萬貫如先有官者超三資酧奬如是董昌威制曽助妖謀幡然改圖轉禍為福有所自効者罪並不問賞則與之於戯惡殺好生君人令德仗順伐逆武夫令猷鳴鼓而攻既非獲已奮戈而起亦冝慎諸勿發勿焚無誤無失罔俾觀聼謂我黷武而勤兵也夏四月辛夘蘇州雨雪乙巳皇考太師薨六月制授王檢校太傅彭城郡王兼浙江東道招討制置兩浙鹽鐵發運等使是月王起師討董昌秋七月制授王起復雲麾將軍上金吾衛大將軍員外置同正員是月帝幸莎城旋至石門鎮八月車駕還京於是董昌求援於淮帥楊行密行密遣將䑓濛等困圍姑蘇以應昌冬十月行密又遣安仁義田頵等攻我鎮戍昌遣裨將陳郁鍾福朱黨屯於香嚴寺又遣李蕙崔温屯于石侯香嚴石侯皆地名王命武勇都知兵馬使顧全武馬歩軍都知兵馬使王球率兵往逐之遂戮李蕙崔温等未幾昌復搆湖州刺史李師悅率兵四千餘人侵我封境又遣徐淑困我嘉禾王命内衙都虞候方密襲之不克更命顧全武率所部禦之因破烏燉光福二砦而府城東接大江賊不得聚然沙路平漲賊之游兵得以來往王謂全武等曰賊若有我江壖襟𢃄甌越則不可當也汝善禦之十一月衢州刺史陳儒卒弟岌嗣時顧全武遣偏將孟寳蔣燔率兵屯于西陵是月勅王依前起復檢校太傅兼侍中加食邑一千户是嵗終郊封胥山伍子胥為惠應侯封胥山祠不詳詔命日月羅代集有碑云三年閠三月則知詔下之明年為碑今按長厯乾寜三年今甘崇耳丙辰三年春正月勅授費州刺史髙彦夷州刺史沈夏並檢校司空是月安仁義出戰船從湖州將渡江以應董昌王命武勇都指揮使許再思等禦之仁義竟不敢渡然沙路之患未弭乃祭江海而禱胥山祠一夕驚濤沙路悉毁江壖一隅無所患矣昌又遣徐珣李𤣥賔等據肅清四朴九鄉之地王命顧全武王球擊之徐珣等來降昌又遣將湯舊領兵守石城袁邠領兵守永寜時昌鎮遏使朱威與賀蘭風招輯使孫仲殷等並投欵于王旦為越軍所襲朱威等由海道而至二月王命顧全武許再思自西陵趨石城與湯舊遇遂破石城去越城僅三十里生擒其黨六百餘人湯舊等走還昌不能援三月我師復攻餘姚袁邠因大戰賊黨逃溺者相半而明州刺史黄晟遣指揮使梁從晊率兵來應我師袁邠堅壁自固昌益兵以救之顧全武遣武勇隊主彭城彦章截其衝要生擒賊將徐宣斬首二百餘級昌又遣暨陽鎮將陳都自南秦秦一作臻了口至于冨陽漁浦等處屯聚王命王球等擊之仍遣婺州兵及諸鎮兵以應之時陳都率其黨千餘人來降夏四月我師執袁邠及偏將潘薦等凡二千餘人王以朱威復為永寜鎮使是月顧全武進圍越城而楚武王馬某始有湖湘之地王馬姓名犯宣祖廟諱故以諡易之五月辛已董昌親閲戰于五雲門仍懸玉帛以誘我師顧全武許再思等奮擊之其黨大敗昌愕視而退至是始懼自去其帝號初城中有言王師雄壯强盛者輒怒而斬之有言王師兵疲而糧絶者則喜而賞之于是親閲我師奮擊始大懼而退次日王命分兵進攻以顧全武充諸軍都虞候東面都知兵馬使與指揮使孟寳等攻五雲門王球充右副指揮使與蔣燔攻亭山及申光門陳章充右副指揮使與錢顔攻關子門許再思充馬軍都虞候北面都知兵馬使攻昌安門駱團充西面都指揮使攻迎恩門是月癸未越城將㧞而䑓濛等陷我姑蘇刺史成及被執王乃召全武議將分兵西陵以偹北冦全武上言曰賊之根本繫于甌越豈以失一姑蘇而遂逭天討願先㧞越城然後復茂苑未遲王從之乙未董昌猶據牙城拒之王紿昌曰奉詔令大王致仕歸臨安昌乃送牌印而出顧全武遣上武勇都監使吳璋執昌至而斬之越州平王命散府庫金帛以賞將士開倉廩以賑貧乏又斬偽宰相李邈蔣環等十餘人以下脅從者悉宥之董昌臨安人也始為土團軍破山賊有功為石鏡鎮將尋遷杭州平彭城漢宏復除越州其始起餘杭洎領甌越頗有亷儉之度累授開府儀同三司檢校太尉同平章事封隴西郡王時屬京師喪亂文籍多亡越州有裴氏書樓昌悉取其書以貢授諸道採訪圖籍使既而恣為淫虐凡按罪人無輕重枉直必命骰子使之對擲勝者宥之否則殺之而案牘不復叅決但一槩誅戮而越州有白樓門門外即殺戮之所地為之殷守閽者嘗夜聞鬼哭凡軍中制度多所改易𨽻中軍者衣黄布背印威儀二字𨽻外軍者衣白布字號如之凡所器玩無小大皆號以元字軍中文其臂者亦如之識者以為元者錢之文也皆當歸錢氏昌建生祠諸郡置土馬有誑馬嘶發汗者畢被賞又立將吏木偶悉用長釘以釘其足曰使三二百年免有顛踣末年盈滿遂圖僭亂故妖人應智等竟以幻惑進愚民俗吏致龜魚符印者日以百數又集無頼之徒皆斷腕劈耳號曰感恩都以偹腹心及議立國號有客使倪德儒語昌曰中和辰巳間越中嘗有聖經云有羅平鳥主越人禍福敬則福慢則禍於是民間悉圖其形以禱之今觀大王署名與當時鳥狀相𩔖乃出圖示昌昌欣然遂以為號僭立之際年月日時皆用夘從妖言也或云古䜟書云漢東㟁上重日生昌以名應之故悉用夘以符日出之義也初昌議立㑹稽令吳鐐諌曰大王不為真諸侯以傳子孫欲為假天子以取滅亡也昌族誅之山隂令張遂曰浙東雖領六州大王稱帝彼不從徒守孤城為天下笑昌又殺之節度副使黄碣惡其惑亂屢諌碣家奴有致印於昌者碣將殺奴奴遂投昌匿之碣乃密致書於管權官李滔曰順天將期一統其如之何以愚計之針豈為矟耶有竊其書送昌昌集召議之碣曰今王室雖衰天人未厭大王興於畎畆受朝廷厚恩位兼將相富貴極矣奈何一旦忽為滅族之計昌詬之曰爾賊負我好聖明時三公不能待先求死耶遂斬碣首投諸厠中仍族誅之而李滔亦遇害識者以昌言先求死者盖相繼之兆也自王師攻討而遷延未克者以其姪真小得衆志耳俄而真與小將刺羽不和譖于昌而殺之衆由是觧體作亂盖天之所廢然也自前年仲冬不雨至是月乃雨昌暴虐如是今平之乃雨秋七月李茂貞犯闕帝幸華州八月勅授王檢校太尉兼中書令加食邑一千户實封一百户賞去偽之功也仍遣供奉官甯全道賜王旌節又遣中使韓彛範來宣諭將授王越州王固讓遂除宰相王摶亦作溥出鎮越州摶以王有大勲冝當所授復固請辭冬十月勅改越州威勝軍為鎮東軍授王領鎮海鎮東等軍節度使十一月戊子湖州刺史李師悅卒子繼徽嗣師悅要節制於朝廷制授忠國軍節度使使臣未及境師悦已寢疾使人覘之回報旌節已至蕪湖師悅聞之喜不及拜命而卒是月安仁義由南蕩率餘黨攻東陽刺史王壇堅壁自固丁巳四年春正月帝在華州是月王命行軍司馬杜稜都監使吳璋率兵救東陽安仁義復攻睦州一夕大風雨賊衆驚擾而遁夏四月命顧全武與王弟鎮并武勝軍都指揮使沈夏陳璋髙遇許再思等率兵自海道以救嘉禾時諸將皆欲緩進惟全武請倍道兼行王從之一日師次嘉禾圍逼已乆城中莫知所之遽見我旗號皆大悅賊亦謂之神是日遂内外夾擊擒賊將李宗禮偏將顧金等二十餘人俘馘不可勝計乘勝大破賊寨十有八所又擒賊將魏約張宣楊燔閻建等士卒三千餘人嘉禾平全武等又乘勝逐田頵于驛亭埭頵由吳興而遁於時大水我師逐之斬馘沉溺者僅于十里初安仁義田頵之攻我也乃請淮帥楊行密率兵親至㩦一僧􅃝肩者來視王城僧曰此腰鼓城也擊之終不可得又聞城中鼓角之聲曰錢氏子孫皆當貴盛未可圖也行密乃先歸而安仁義田頵駐屯于北郊復有電火焚頵營震折威鎗由是俱敗天使然也六月己酉王如東府受鎮東節鉞先是勅命到時王謂衆曰淮冦未殄吾不敢奉命至是方行秋七月庚寅王至自東府命顧全武率師復姑蘇八月我師屯崑山既而勅王起復加食邑一千户又遣中使焦楚鍠賫鐡劵至劵文曰維乾寜四年嵗次丁巳八月甲辰朔四日丁未皇帝若曰咨爾鎮海鎮東等軍節度浙江東西道觀察處置營田招討等使兼兩浙鹽鐡制置發運等使開府儀同三司檢校太尉兼中書令持節潤越等州刺史上柱國彭城郡王食邑五千户實封一百户錢某朕聞銘鄧隲之勲言垂漢典載孔悝之德事羙魯經則知褒德䇿勲古今一致頃者董昌僭偽為昏鏡水狂謀惡跡淬染齊人爾披攘兇渠盪定江表忠以衛社稷惠以福生靈其幾也氛祲清其化也疲羸泰拯於越於塗炭之上師無私焉保餘杭於金湯之固政有經矣志奬王室績冠侯藩溢于旂常流在丹素雖鍾繇刋五熟之釜竇憲勒燕然之山未足顯功抑有異數是用錫其金板申以誓詞長河有似帯之期泰華有如拳之日惟我念功之㫖永將延祚子孫使卿長襲寵榮克保冨貴卿恕九死子孫三死或犯常刑有司不得加責承我信誓往惟欽哉冝付史館頒示天下是月勅封胥山惠應侯為吳安王景福二年始作羅城而江濤勢激板築不能就王因禱之沙漲一十五里餘功乃成故有惠應之請前年安仁義以游兵往復禱之一夕驚濤沙路盡毁至是感其靈貺請而封之九月湖州刺史李繼徽以州附淮南牙將沈攸拒之繼徽遂奔是月乙未王親廵吳興收繼徽家屬凡二百餘人而還湖州平王命海昌鎮將髙彦為湖州制置使李繼徽亦作彦徽父師悅乃徐州馬歩院之小吏也屬王仙芝作亂遂投行伍役以獻黄巢首級功遂授是郡師悅能書長於斷讞州有十五都頭其下俱數千人師悅撫之盡得其所時朝廷命將代師悅召諸校議之咸曰但慮君侯厭小郡耳不爾則茍有代人斷不奉詔㑹進士顧雲旅逰于霅乃請雲草奏論之雲表略云觀龍綸而仿彿猶鳯篆而依稀因不復代矣師悅在任置舟楫樹倉廪以圖割據董昌僭偽師悅率兵食以應之至是繼徽復以㩦貳而敗焉初繼徽將納淮人也沈攸以逆順之理諭之其衆因誓曰附李氏者居西附沈氏者居東而居東者十得其九繼徽於是惶惑而遁矣冬十月淮人以䑓濛守姑蘇代朱黨也十一月己邜台州刺史杜雄卒雄台州楊梅鎮人也初與朱黨婁文俱為草冦婁文以雄為副文害刺史羅虬遂侵彭城漢宏不利因降漢宏署婁文知明州亊以杜雄知台州後漢宏敗率其下六百餘人奔雄雄使偏將方師立饗漢宏于驛亭其黨皆醉遂執漢宏歸越董昌奏授雄為德化軍使至是而疾卒戊午五年春正月帝在華州改元光化是月我師救蘇州生擒淮將李近思斬首一千餘級又斬其將梁琮張顒等而楊行密復遣將李簡率兵五千餘衆屯於無錫我師復攻之獲其偏將陳益等而還餘皆走之是月王以越州指揮使駱團為台州制置使二月勅移鎮海軍于杭州為理所從王請也又授都押衙董名犯太祖諱上一字等恩命有差秋七月勅授王檢校太師賜定亂安國功臣八月車駕還京九月婺州刺史王壇遣將攻東陽王命使諭之息民故也冬十月王遣顧全武率師克蘇州䑓濛李德誠等皆宵遁其下秦裴因力屈而降蘇州平初遣顧全武等攻蘇州淮將刺史䑓濛等皆棄城宵遁獨秦裴守崑山不下全武攻之裴屢出戰復靳侮全武全武怒益兵引水灌城城壞乃出降王曰爾軍弱如此何敢乆為旅拒裴曰裴義不負楊公今力屈而降耳王善其言而全武亦請宥之王從其請王以嘉興都將曹圭權蘇州制置使㝷命為本州刺史是月勅王兼兩浙安撫使加食邑一千户實封一百户閠十月婺州王壇抗命王遣師伐之而衢州刺史陳岌貳於我王復遣顧全武等討之十一月成及至自淮南王亦以魏約等歸淮南以報之己未光化二年春正月我師大敗陳岌黨于龍丘二月勅遣高品周道安改王本縣石鏡鄉為廣義鄉臨水里為勲貴里所居安衆營為衣錦營仍賜兩浙行軍司馬杜稜以下一百二十人並號贊忠去偽功臣三月婺州王壇求救于淮南夏四月勅陞杭州為大都督府是月淮帥遣將康儒等來應東陽王命副指揮使方密羅聚等濟師於婺州及蘭溪義烏等縣秋七月淮人有使入衢州者為我師殺之仍獲陳岌所送楊氏地圖州印以歸庚申三年春正月淮將康儒徐從臯等復攻婺州王遣從弟銶率師討之三月我師大敗賊徒于軒渚遂絶其糧康儒等由清溪而遁夏五月勅遣中使王金峰賫詔封王為南康王加食邑一千户實封一百户王表陳讓秋八月勅授王行軍司馬杜稜檢校太子太保是月庚申龍鬭于浙江因過于郛郭壞廬舍或吸居人浮空而去數里方墜亦有死者九月王壇奔宣城壇本孫儒隊將儒敗率其黨三千奔睦州陳晟晟頗疑之處於外城未幾壇將降黨與三河鎮將陳􅃊攻婺州婺州刺史蔣環奔會稽壇遂有其地至是而壇奔宣城是月辛夘王親廵婺州命浙西營田副使沈夏權婺州刺史壬辰王至東陽而東陽鎮將王永伏誅永東陽人也在鎮治城壁置鼓角粧樓舞榭甍棟相接又來妖妄立十十一作石瑞亭將窺本郡及王壇攻之王以前年婺民為安仁義所撓王故遣使諭之壇罷兵將追永歸于府城而壇不從命故代之事平責永以不敬故斬之以謝百姓是月甲午王復廵衢州陳岌降王以岌為浙東安撫副使命顧全武權知衢州事岌兄儒本黄巢之黨㝷降朝廷授以饒州光啓三年率其部伍自饒􅆹事直指衙門而出人無預知者且誡其下曰我自棄他郡州人無負我者有殺掠者斬由是市不易肆既而徑趨衢州知州𤣥泰迎於郊儒詰之曰𤣥宗御容安在泰泣曰使君不見容矣時信安有𤣥宗銅容泰毁之故以是為責遂斬之而自據焉凡在信安十年頗有惠愛毎秋主司請納稼儒必至城南緑野亭觀其刈穫始使輸之又嘗見吏於倉所輒振衣以避糠粃儒怒而罰之其所為率皆𩔖此南海節度使彭城宗龜道由信安見其品裁乃撫之曰此賊有士人之風儒亦欣然而謝之及儒病岌入省之因顧岌曰汝非偵我耶今汝仁弱其如諸校何乃召列校豪强者十餘人入卧内皆斬之遂以郡付岌王壇之叛岌寔同其惡至是降而宥之冬十月勅遣中使取王形圖于凌煙閣王命寫容以進十一月庚寅中尉彭城季述姓犯王諱與王仲先樞密王彦範等幽昭宗于問安宫立德王裕以為帝以昭宗為太上皇勅遣使進王為東安王王不受命是月己酉葬皇考太師于安國縣錦衣郷或云義成郷清風里初太師薨因有淮師葬是以緩按羅氏後集太師誌銘曰昔嵗己夘今辰巳酉十一月也今以長厯推之十月二十五日乙酉葬太師未知孰是辛酉天復元年春正月昭宗反正大赦改兀出太子裕復為德王而彭城季述等皆伏誅是月勅遣使供奉官吐突令鐸來宣諭仍賜國信二月王親廵衣錦營大會故老賔客山林樹木皆覆以錦幄表衣錦之榮也命指揮使陳璋為衢州制置使夏四月丁丑王親廵東府五月勅授王守侍中進封實王加食邑一千户實封一百户仍陞王所居衣錦營為衣錦城封石鏡山為衣錦山大官山為功臣山秋八月勅授邵州刺史王子文穆王禮部尚書遥領卲州刺史九月王以衢州制置使陳璋為本州刺史是月壬子皇妣秦國太夫人水丘氏薨冬十月淮將李神福等冦衣錦城王命顧全武方密率師禦之全武等為賊所執楊行密遣李神福等率兵欲圖杭州全武列八寨以拒之神福詭言還師其所獲杭俘走還者皆不追至暮遣羸兵先行而伏兵青山全武不知其詭奮勇追之伏兵大發遂被執王聞之驚曰喪我良將也既而神福欲歸又恐為王所邀乃遣人守衛王祖考丘壠又令全武通家信王遣使犒之神福受其犒賂而還十一月駕狩于鳯翔王聞之悲泣乃遣使奔問帝嘉之賜王御服夾襖子一副仍降御札于衣襟焉十二月淮人以師老糧乏求成而還是月勅王起復雲麾將軍上金吾衛大將軍員外置同正員時王以衣錦城被冦命𤣥同先生閭丘方逺下元金籙醮于龍瑞宫其夕大雪惟醮壇之上星斗燦然殿宇無所沾洒又有鑑湖宿釣者聞車馬之聲甚衆復有一黒虎蹲于宫門外醮罷乃去鑑湖昔賀知章所居者一名賀湖因犯僖宗廟諱今以唐秘書此湖故名易之也壬戌二年春正月帝在鳯翔三月朔日有蝕之是月癸丑至乙夘三日浙右大雪盈丈雪氣如烟而味苦夏四月淮人以顧全武方密歸我王亦以秦裴報之裴即光化時蘇州降將也是月制加王食邑一千户實封一百户五月勅封王為越王又加食邑一千户實封一百户是月庚戌温州刺史朱褒卒兄敖代之褒永嘉人也兄誕始為本州通事官屬冦亂兄弟皆聚兵禦之以功遂攝司馬及副使胡燔卒乃自據焉褒處兄弟性頗强悖一日輒收兄誕印綬以州屬彭城漢宏漢宏署褒州事褒耳下有一赤㸃毎怒發則㸃移至口怒觧如故誕􅆹吏嘗忤褒褒將殺之其母力救對曰比求郡盖欲殺此輩耳卒不聼漢宏之亂褒率黨助之尋以同姓結援于梁太祖奏授本州刺史充靜海軍使褒善屬詩文亦好禮士但動不量力故不及世而家㓕亡矣秋七月王親廵衣錦城治溝洫八月丙戌將還府城親饗將校武勇都指揮使徐綰即席將謀不利惶懼辭以疾王惡之即日命綰率所部先還次日王發自衣錦城徐綰率兵已及府城焚掠郛郭左武勇都指揮使許再思以兵迎綰同叛將及内城王子傳瑛亦作元與三城都指揮使馬綽牙將陳為等發懸門以禦之王次龍泉有馳來告叛者王遂疾行時北郭城門牙將潘長與徐綰遇斬首二百餘級退營于龍興寺王微服至德勝門牙將周肅遣偏將鍾審以舟迎王王遂沿江至内城東北登城而入城中莫有知者北門直更卒慿鼓而寐王親斬之衆皆驚悟隨命都監使吳璋三城指揮使馬綽守北門内城指揮使王榮武安都指揮使杜建徽守南門又命指揮使顧全武率兵衛屯東府全武上言曰東府不足往當詣䢴溝何者綰必召田頵頵來淮南即興師矣宜早圖之杜建徽言曰楊氏嘗由王脫孫儒之難彼丈夫者豈不能報王耶請以難告王從之命全武行全武曰獨行事必不濟請擇諸公子王曰我欲以元璙聘于楊氏汝當輔而行焉全武遂與同往湖州刺史髙彦遣其子渭來赴難渭趨靈隱山而至為賊伏兵所害命渭所部營于城南髙彦之聞難也亟遣子渭行渭曰今日不利彦曰赴難之急何以吉辰耶遂促渭行渭不敢抗命遂率所部徑趨靈隱山而來至是果敗九月徐綰果召田頵于宣城頵先遣客吏何饒來致意曰相公請大王東之越城虛府署以相待所貴者兵不血刃耳王復曰軍中叛亂何方無之爾相公不嘗為人長乎反助其逆須徑來何用肆言也既而頵至洎于北門以旗鼓自蔽王登城將與之語俾開旗頵不之答王注弩中其執旗者頵見王城中大鼓噪懼退還營遷壘于西北隅今清波門是也乃使其黨據營以辱王亦注弩斃之頵伺夜復攻西北隅梯橦畢集城中矢石如雨賊墜溝洫者不可勝計頵遂㧞營而退十一月頵復具舟楫將渡江絶西陵王命副指揮使盛造朱郁大破之俄而楊行密使至頵營王城中莫有知其意者王曰田頵悖而無機倘得密意必明言其可否王乃使人往覘之頵迎行密來使于半道紅半道紅在北郊舊植桃花之所凢數里並轡而行果與言及罷兵之事覘者逥以其言聞皆如王所料既而頵率徐綰許再思歸宣城王命致犒師錢一百億以送之頵慮為我師所逐遂請質而去初王行至龍泉聞變召李咸占之曰大王霸業方永但分野小災耳請勿為慮不然大王當有疾王曰寜我有疾豈冝害百姓耶王又召葉簡筮之曰賊無如我何王曰淮人將同惡乎簡曰淮人不來宣城當濟賊季冬方敗然宣城亦當敗于明年今不足慮如期皆騐也後武勇都指揮使徐綰本孫儒之黨來降乾寜中王以守禦功因偹心膂前年錦城之役不用命王惡之及是使治溝洫遂叛是月温州禆將丁章逐刺史朱敖敖奔無諸章遂㨿是郡癸亥三年春正月己巳帝還京師夏四月温州丁章為木工李彦斧殺之禆將張惠據温州是月城婺州秋七月睦州刺史陳詢貳子我仍率黨攻婺州蘭溪縣王遣指揮方永珍等率師討平之九月宣城田頵安仁義俱叛于淮而淮帥楊行密請師于我王命方永珍率師至京口又命從弟鎰率兵次宛陵以應行密師又命指揮使楊習代方永珍於睦州冬十月我師與淮人生擒安仁義于潤州歸淮師而斬之田頵死於陣其母奉文穆王歸焉甲子四年春正月帝發長安三月勅遣衛尉卿許渾來宣諭仍賜國信是月王子元璙與所聘楊氏至自淮南夏四月帝至洛陽大赦改元天祐勅遣給事中鄭祈刑部員外郎楊永休亦作永承進封王為吳王加食邑二千户實封二百户秋八月昭宗崩太子即位勅遣來宣告王素服舉哀于軍門是月淮人檻送徐綰歸我王命剖心以祭髙渭冬十月朔日有食之是月癸酉大雪平地丈餘乙丑天祐二年春正月制授文穆王等官爵是月淮將閻睦等來援新安王命從弟鎰與指揮使顧全武等禦之我師不利鎰等被執于賊三月廣帥彭城隱始有南海而衢州制置使陳璋亦貳于我夏四月陳璋會睦州兵及淮將陶雅等同攻東陽王命弟鏢帥師討之秋八月處州刺史盧約弟佶冦永嘉張惠奔無諸王命方永珍濟師于東陽會師討賊九月陳璋陷東陽執刺史沈夏送于淮南夏海鹽人也徐及為監鎮與髙彦𨽻其中及亦八都之一號海昌者也王副董庶人討彭城漢宏于越州徐及遣夏與髙彦率本部㑹我師王見之甚悅延入卧内謂曰吾東討之師已衆渡江之役無勞爾輩但徐及平素强梁終非我所蓄以我東討或為後患汝還本營為我殺之皆當以列郡牧汝然吾非誨人為逆但境土苦于干戈不仁者當盡除之用息生聚且汝等當識吾意夏等再拜聽命王厚遣之既回告及曰董公與錢公以兵討賊聞將軍遣所部見助喜動于色然以東北為慮設有狗䑕偷竊復勞後顧夏等寔託將軍以為後據及有軍師竊視夏等謂及曰二校至自錢塘皆有色文在其面將軍冝備之及不聼夏遂與其下謀之一夕竊發及死其下遂分夏性兇暴不即我歸乃以所得衆七千餘人聚於臨平山下擇㓜弱者盡殺之惟留三千餘人徑往嘉興刼吳公約同入海為剽公約不從將殺之乃叩頭曰惟吾兄之命遂與俱往未幾夏以公約庸懦因放其歸夏所圖無成始復歸王王亦優容之累從征伐厯奏職官領遥郡至任果以殺戮為事左右指令小不稱意即加屠害王頗惡之夏一日復構私第于北郭制度雄壯侔于公府今北市酒家樓俱夏之第也其長子有過輒手刃之王以其噬子滋不悅出為東陽刺史淮将陶雅以兵攻其郡王不急救遂為淮人所執尋遇害陳璋自稱衢婺二州刺史復分兵與淮將許野鶴等犯我暨陽王命楊習逐之一本作廬璋兵大敗習遂攻東陽冬十月有獸入吳興一角而麟趾十一月王命建功臣堂于府門之西樹碑紀功仍列賔寮將校賜功臣名氏于碑隂凡五百人是月楊行密殂子渥嗣十二月睦州刺史陳詢奔淮南詢即晟之弟餘杭人也晟在郡十八載而卒子紹權嗣詢黜紹權而自立懼非王命頗不自安屬徐許之亂乃通田頵頵敗詢益懼及王命桐廬縣使府復徴軍賦遂不聼命而叛至是而奔丙寅三年春正月淮將陶雅率其黨自睦州歸歙是月王親廵睦州時宣州觀察使王茂章為淮人所圖因奔于王王以為鎮東軍節度副使二月辛夘王至睦州陳璋退保衢州婺州平是月丁酉𤣥同先生閭丘方逺卒方逺其先齊人嬰之後也父閏不仕以文學節行稱方逺㓜辨慧學于廬州道士陳𤣥悟尋傳法籙于天台主洞霄宫葉藏質方逺雅好儒學毎披卷得之趨必曰葛稚川陶隱居俱吾之師友也詮太平經為十三篇景福庚戌嵗始居餘杭大滌洞初入謁王談莊老之義逡廵而罷退而歎曰彼英雄也是不冝與談𤣥虛之道翌日入謁遂陳春秋因延之盡日由是王厚加禮遇重建天柱宫俾以居之王奏請賜紫又勅賜號𤣥同先生一日王于城南樓命方逺圖形前一夕王夢方逺駕鶴至由是王益竒之江東羅隱毎就方逺授子書方逺必瞑目而授餘無他論門人夏隱言謂方逺曰羅記室上令公客先生何不與之語方逺曰隱才髙性下吾非授書不欲及他事而隱亦盡師弟之禮是日乃降聖節前一日王使人以香花至方逺受訖乃入齋中作控鶴坐怡然而逝復有異香滿室王以夏隱言繼其住持也一日王命方永珍楊習等進攻衢州三月命浙西營田副使馬綽權睦州刺史夏四月朔日有蝕之洪帥南平王鍾傳卒子匡時嗣六月淮人陷洪州擄鍾氏而歸秋八月衢州陳璋導淮將周本呂師造等入其境為我師所逐遂奔淮南璋本孫儒之黨㝷降于王以從征董庶人功遂被任用天復初始赴本部王親餞于江干徐綰作亂越州客軍張洪等疑懼乃與其黨三百餘人奔璋璋納之又屬丁章叛于永嘉而宣州田頵使其下戚滔將招之璋因假道而遣王聞之乃密使衢州羅城指揮使葉讓殺之事􅂥璋遂殺讓而叛初王命璋城衢州工畢以圖獻王王視西門樟樹謂左右曰此樹不入城陳璋當非我所畜也至是果騐九月周本等率其黨歸信州王命方永珍為衢州制置使是月勅遣右散騎常侍王矩司勲郎中裴均授王吳王册禮冬十一月乙丑湖州刺史髙彦卒子澧嗣彦海鹽人也初與沈夏同受王密㫖殺徐及及死以首歸于王彦等前後從征悉有功効及湖州李彦徽棄郡奔淮南王親廵吳興其將沈攸等皆以已功有牧守之望王遂題詩一章於嬰蘭堂在湖州東南溪次末云須將一片地付與有心人衆亦不測王將登舟始言曰我將此郡付汝冝善撫之彦性淳厚居十一載政治簡便累奏授職官遥領費州刺史㝷至今任將終有道塲山僧如訥訥口能容拳垂手過膝是乃異僧及入州城彦以師事之一日彦與之語訣别未幾而卒是月勅命王本道建三代師廟閠十二月王命弟鏢為婺州制置使吳越偹史卷一欽定四庫全書吳越偹史卷二宋錢儼撰武肅王下丁夘四年春三月勅升衣錦城為安國衣錦軍王命文穆王伐温州夏四月戊午克温州斬盧佶而還王命都監使吳璋為温州制置使文穆王復討處州是月梁太祖受唐禅大赦改元開平奉唐帝為濟隂王勅遣上金吾衛將軍石彦辭刑部郎中薛昭序來宣諭初梁室受禅有勸王拒之王笑曰古人有言屈身於陛下是其略也吾豈失為孫仲謀耶遂受之五月處州盧約納欵于我王以為浙江安撫副使命指揮使俞浩為處州制置使是月勅遣金吾衛大將軍安崇隱進封王為吳越王増食邑二千户實封三百户仍賜號啓聖匡運同德功臣初節度判官羅隱勸王舉兵討梁曰縱無成功猶可退保杭越自為東帝奈何交臂事賊王以隱不遇于唐有怨心其言雖不能用心甚義之六月勅遣中使來宣諭秋七月勅賜王管内刺史並授官爵仍賜母妻封邑八月勅授王兼淮南節度揚州大都督淮南四面招討制置使九月詔封衣錦軍神祠號崇福侯是月蜀帥王建稱帝國號武成冬十月勅授文穆王金紫光禄大夫十二月淮人攻信州刺史危仔昌來求救于我王遣師援之戊辰開平二年春正月勅改臨安縣為安國縣廣義郷為衣錦郷夏五月淮南都將張顥殺其帥楊渥而自立為畱後逾旬日大將徐温復殺顥立楊渥弟隆演為帥六月制授王檢校太師守中書令増食邑一千户實封一百户秋八月勅改杭州唐山縣為吳昌縣台州唐興縣為天台縣是月又勅升杭越等州為大都督府王送宣州王茂章入京師茂章更名景仁避廟諱也九月制授鎮東軍節度副使成及為保大軍節度使同平章事副使餘如故未幾淮人困圍我姑蘇王命從弟鋸率兵討之己巳三年春正月梁主遷都洛陽祀南郊大赦二月朔日有蝕之勅選王子兩浙副使傳瑛為駙馬都尉夏四月制授王守太保増食邑二千户實封二百户是月王命弟鏢江海遊奕都虞候何逢司馬福等率師圍姑蘇内外夾攻生擒淮將何朗閭丘直等凡三千餘人獲兵甲生口三十萬戰船二百餘艘陳璋周本吕師造等夜遁五月甲寅王親廵姑蘇是月丁巳明州刺史黄晟卒晟明州鄞縣人也初應募於望海鎮鎮中立表以選其魁梧者晟以矮陋不中選乃𨽻鎮都虞侯林膺而晟性强幹膺甚愛之後濳還本鄉募衆據平嘉埭時權知州事楊僎召署為平嘉浦將有衆千餘人初彭城漢宏嘗以台州賊婁文知明州事文為楊僎所敗其黨杜宗自寜海鎮率鄉民據奉化晟自平嘉埭以所部兵擊之執杜宗等不殺盡驅之使還台州獲其粟帛悉屬於本道遂為奉化鎮將佽飛都知兵馬使及餘姚鎮將相嘉侵越州董庶人禦之不利而刺史鍾季文乃遣晟領兵攻相嘉擒殺之董庶人奏授晟左散騎常侍充浙東道東西副指揮使鍾季文卒遂有本郡晟頗尚禮士辟前進士陳鼎羊紹素以為門賓江東儒學多依之悉加優待仍築其居號曰措大營及董庶人僭偽晟亦移書諭之及王師舉晟亦率衆應之在任十有八年遺䟽不請其子為嗣凡府庫所蓄必題曰送使其忠順如此辛酉王自姑蘇復如東府辛巳復廵明州因城定海鎮命子元㺷為明州制置使信州危仔昌為其下應淮人而叛遂奔于我王以為淮南節度副使六月壬寅王發明州勅遣刑部尚書姚洎禮部員外郎羅衮授王吳越王册禮戊申至自東府王之廵句章也行次餘姚丈亭鎮舟湊巨石不能進既而大雨震電有二龍負王舷之下鎮遏使翁元軻拽舟而進二龍自舷而升焉此其異常也秋閏八月制授王守太尉加實封二百户制曰集非常之事必有挺非常之才建第一之功必有居第一之位朕膺圖受命負扆開階未嘗以真太尉之官輕於擬議大司馬之職易於簡求盖由其爵尊任重不有英佐孰當異恩啓聖匡運同德功臣淮南鎮海鎮東等軍節度使淮南浙江東西等道管内觀察處置充淮南四面都統營田安撫兼兩浙鹽鐡制置發運等使開府儀同三司檢校太師兼中書令杭越等州大都督府長史上柱國吳越王食邑一萬五千户實封一千户錢某海岳騰英星雲誕秀契君臣咸一之德有文武兼偹之才宣慈惠和忠正亷毅敦詩説禮樹百行於藩籬去暴除奸敵萬人於帷幄弼于興運明乃嘉謨頃屬淮夷不賔王化自爾益封吳會兼鎮廣陵追擒毎盡於隻輪覆溺連收其巨艦復聞奸宄屢復廵討謂天盖髙若永可恃爾又横戈憤悱獨力支梧妙運神機大殱戎醜𤣥雲陣起雄風驅下瀬之師白露圍開沴氣散常州之化再安生聚重復土疆薛公之三刺咸明漢主之一竒斯在况早攀鱗翼備見肺腸同德同心二紀密叅於締搆惟忠惟孝四方咸則於儀刑茍非劇恩何以加賞是用鏤於彛鼎册以輅車擬吕望之尊崇正列侯之貴重仍加真食復寵兼官式是奬酬且旌忠烈於戯進以正大易所以經邦慎厥終始書用之居位勉思遵守克荷寵靈服予訓辭錫爾繁祉可守太尉加實封二百户餘並如故是月勅置蘇州吳江縣明州靜安縣今定海縣是也從王請也冬十月湖州刺史髙澧貳于我遣其黨焚燒義和臨平等鎮王命弟鏢帥師討之十一月乙酉發運使羅隱卒隱字昭諌新登縣人也祖知㣲福唐縣令父修古應開元禮科隱本名横凡十上不中第遂更名初從事湖南厯淮潤皆不得意乃歸新登及來謁王懼不見納遂以所為夏口詩標於卷末云一箇禰衡容不得思量黄祖漫英雄之句王覧之大笑因加殊遇復命簡書辟之曰仲宣逺託劉荆州都縁亂世夫子辟為魯司冦只為故鄉隱曰是不可去矣王初授鎮海節度時命沈崧草謝表盛言浙西繁富成以示隱隱曰今浙西兵火之餘日不暇給今朝廷執政方切於賄賂此表入奏執政豈無意於要求耶乃請更之其略曰天寒而麋鹿常逰日暮而牛羊不下朝廷見之曰此羅隱辭也及為賀昭宗更名表曰上則虞舜之全文右則姬昌之半字當時京師稱為第一隱性不喜軍旅唯與丞相杜建徽善王初城西府命賔竂廵覧顧謂左右曰百歩一敵樓足以言金湯之固隱徐曰敵樓不若内向及徐許之亂人皆以為先見一日隱寢疾王親臨撫問因題其壁云黄河信有澄清日後代應難繼此才隱起而續末句云門外旌旗屯虎豹壁間章句動風雷隱由是以紅紗罩覆其上其後果無文嗣隱累官錢塘縣令尋授鎮海軍掌書記節度判官鹽鐡發運副使授著作佐郎司勲郎中厯遷諌議大夫給事中賜金紫卒年七十七嵗所著江南甲乙集淮海寓言及䜛書後集並行於世初新登鼉江常有二氣亘于江上晝夜不㓕及隱洎丞相杜建徽生而二氣不復見識者以為文武秀氣焉庚午四年春二月湖州髙澧導淮將李簡陳璋等入其境都將盛師友沈行瑜閉城不納王遣子元璙濟師禦之淮人挾澧而遁澧髙彦第三子也初彦夢一羽人持劍入卧内彦驚問其故羽人答曰來為君之子報數千寃耳其母自是而孕不足月而生澧年十三四性即暴虐及嗣父位恣行殺戮將吏侵晨入衙必與妻子訣别而入毎登消暑樓眺望則州城東西水陸行人亦皆絶跡澧夜义精也嘗詣太常博士丘光庭不知因廽顧見一青面鬼遂大呼俄而見澧密言曰博士慎勿言是騐之也又召鄉丁為衙軍號儕要都皆文其面衣青衫白袴以緋抹額凡所指令必躬身仰首如夜义之狀刀鎗弓矢常居左右又令州人皆黥面約三日當畢過限則誅澧則以畫面而傅之乾粉州人既黥澧乃洗去晩年將敗召郡吏議曰我欲盡殺百姓可乎吏對曰百姓租賦所出殺之無可取供給願求他可殺者時親紀三丁軍三千餘人㑹有言其怨嗟者集於開元寺紿曰將饗汝因閉三門之半而納之入者旋殺迨半在外者方覺因奔逸縱火為亂澧聞盛怒閉城大索戮之無遺王以其兇虐滋甚將伐之由是而叛先是道塲山僧如訥以髙彦將死與其訣别退而謂其衆曰髙公將殂我亦當逝何者盖有白面夜义治此政矣爾輩亦冝避之俄而澧代其父白面者盖澧未黥面耳澧至淮南屢取倡姬入私室殺而食之時王將戮之至是叛遂為淮人所害三月癸巳王廵吳興命弟鏢為刺史癸夘至自吳興夏五月奏改西府富陽縣為富春縣東府暨陽縣處州松陽縣為長松縣秋七月詔原前監軍周廷誥已下二十五人時有詔誅之王以其自前朝將亂求出避禍並非彭城季述之黨請以原之遂有是命八月始築捍海塘王因江濤衝激命强弩以射濤頭遂定其基復建候潮通江等城門初定其基而江濤晝夜衝激沙岸板築不能就王命强弩五百以射濤頭又親築胥山祠仍為詩一章函鑰置于海門其略曰為報龍神并水府錢塘借取築錢城既而潮頭遂趨西陵王乃命運巨石盛以竹籠植巨材捍之城基始定其重濠累塹通衢廣陌亦由是而成焉冬十月戊寅王親廵衣錦軍製還鄉歌歌曰三節還鄉兮掛錦衣碧天朗朗兮愛日暉功臣道上兮列旌旗父老逺來兮相追隨家山鄉眷兮會時稀今朝設宴兮觥散飛斗牛無孛兮民無欺吳越一王兮駟馬歸丙戌至自衣錦城命湖州都將盛師友權婺州刺史命斬湖州廵校將沈行思一名行瑜初髙澧將奔而師友行思同有閉城之功王廵吳興乃命師友從行而其時行思尚羈于霅行思亦頗有牧守之望乃謂其同職陳環曰盛君來豈不珮印綬而歸耶不然我後安處子為我裁之時環已得密㫖俾遣行思歸國乃紿之曰二人之功本無優劣然王情尚未可測冝亟詣府城面較功績以决其可否行思來覲王亦優待之環以送行思家屬至行思始悟其事深銜環遂懷怨望王將及國城行思與陳環俱候于北郊行思自取巨槌擊殺環奔王舟以陳其前功復言師友與環毁間之狀時師友方從亟引之以相證行思輒奪威鎗將刺師友左右遂擒之王曰吾早以汝强梁故不欲任始念汝閉城之功將牧之他郡而今所為若此疇能容之乃命斬于龍丘山許其家屬收塟而師友遂有是命辛未五年春正月丙戌日有蝕之夏四月制命王守尚書令兼淮南宣歙等道四面行營都統増食邑二千户實封一百户勅遣刑部侍郎李光嗣建王生祠于衣錦軍勅翰林學士李琪為碑文時從僚史將校衆所請也五月朔梁改元乾化是月築松江南北二城鏁栅畢備設險故也秋七月勅命淮南兩浙幕府將吏五百人並賜贊政安國功臣九月梁主如相州冬十月湖州刺史王弟鏢殺防戍指揮使潘良懼譴遂奔淮南十一月梁主還京是冬廣帥彭城隱殂弟巖嗣壬申乾化二年夏閠五月朔日有蝕之梁主如洛六月梁主遇弑郢王友珪僭位秋七月遣刑部尚書李皎尊王為尚父八月己丑城西陵癸酉三年春正月友珪改元鳯厯肆赦二月均王友貞舉兵誅友珪遂即位於汴京更名頊復稱乾化勅遣供奉官楊彦賔來宣諭三月勅授王尚父册禮夏四月制増王食邑三千户實封二百户淮將李濤率兵二萬自千秋嶺冦我衣錦城王命文穆王討之生擒李濤等八千餘人王又命子元璙帥水師攻東州又獲賊將李師愈姚延環等三千餘人而還五月淮將復冦衣錦軍復命文穆王討之六月師克廣德縣獲花䖍渦信及吏卒七千餘人而還是月辛夘彰義軍節度使檢校太尉兼侍中成及卒及字𢎞濟錢塘縣人也祖克評嘉王府長史父貞國子博士及性淳厚為鄉里所重咸通中戍戎間捍山賊逐齊冦聲名遂振及八都浸盛復分十三都以富春鎮為静江都將屬彭城漢宏作亂與王同事攻討漢宏平北關鎮將彭城孟安謀亂即席奮劍將犯王及舉胡床制之偏將盛造因執孟安就戮以功奏遷散騎常侍復為靖江鎮光啓中潤州薛朗叛王命及討之時常州刺史丁從寔具牛酒以犒我師仍遺美女於諸將及取而斬之餘悉不納因克之尋平潤州王奏及授兵部尚書充常州防禦使潤州阮結卒命及代之累遷檢校司空尋為蘇州刺史乾寜時淮人圍姑蘇常熟鎮將陸郢廵檢郭用與其黨趙邯以城應冦邯手刃其母妻子以盟城䧟及以禮見楊行密行密閲及府庫私室皆藥物圖書而已由是重之至淮南辟為行軍司馬及拒之曰及以百口託于錢塘不幸城䧟於叛以至於此豈宜復以本道符竹援冨貴於隣境不惟丞相不可百口其謂我何乃引珮刀自刺行密遽止之因厚禮而歸焉累署鎮海軍節度副使奏授司徒至太傅天復中王廵衣錦軍命武勇都將士以治溝洫軍中多怨言及慮有變亟請罷役王不聼俄而亂作及護王駕廽至北郭王微服將入城及乃代乘王車行與賊鬬王遂得入王性嚴急毎有所檢發必亟加斬决或及至王雖盛怒必為之解其寵遇皆此𩔖也累奏授贊正安國功臣保大彰義等軍節度使開府儀同三司檢校太尉贈太師兼侍中卒年六十七冬十月勅加文穆王開國爵邑是月乙酉大同軍節度使駙馬都尉王子元瑛卒瑛王子也毋吳越國莊穆夫人吳氏原名傳鍇後更名焉性英敏頗尚儒學聚書千卷善草𨽻好施時徐綰之叛城中有錦工二百餘人皆潤人也瑛慮其為變乃命曰王令百工悉免今日工作遂放出城而發懸門王入城聞其事頗嘉之尋為兩浙副大使梁太祖拜為駙馬都尉累授大同軍節度使同平章事公主未及降而薨年三十六勅贈太師十二月王命子𫝊璙權蘇州刺史甲戌四年夏六月制授文穆王開國侯食邑秋七月廣帥彭城巖遣供軍廵官陳用拙奉禮幣請兄事于王王納之九月命文穆王率兵攻常州無錫縣獲將卒五百餘人而還乙亥貞明元年春正月朔改元大赦是月勅授文穆王以下官爵有差甲午王親廵衣錦軍二月勅遣給事中韋彖金部郎中李發選王子𫝊􅡋為駙馬都尉閏二月己亥王至自衣錦軍丙子二年春正月勅授浙東營田副使常州刺史杜建徽為涇源節度使王命建徽䕶送𫝊􅡋進京師尚夀春公主遂授此任秋七月勅授王為諸道兵馬元帥冬十二月王命惠州防禦使弟鏵率官吏僧衆詣明州鄮縣阿育王寺迎釋迦舍利塔歸於府城仍建浮圖于城南以致之丁丑三年春三月勅授王子贊正安國功臣鎮海軍北面水陸都指揮使兼北面行營招討金紫光禄大夫檢校太保守湖州湖州一作蘇州刺史大彭郡侯食邑一千户𫝊璙贊正安國功臣鎮海軍節度副使土客諸軍都指揮使金紫光禄大夫檢校太保大彭郡侯食邑一千户𫝊球贊正安國功臣鎮東軍東面水陸安撫都指揮使光禄大夫檢校太保守温州刺史大彭縣男食邑三百户𫝊遂贊正安國功臣鎮東軍西面安撫都指揮使光禄大夫檢校太保守睦州刺史大彭縣男食邑三百户元懿贊正安國功臣鎮東軍親從都指揮使兼土客諸軍安撫副指揮使銀青光禄大夫檢校司徒守竇州刺史𫝊贊正安國功臣鎮海軍上右􅆹都指揮使兼土客諸軍安撫副指揮使金紫光禄大夫檢校司徒前明州刺史元球贊正安國功臣衣錦軍防遏都指揮使金紫光禄大夫檢校司空守義州刺史傳㻑贊正安國功臣鎮海軍衙内先鋒指揮使金紫光禄大夫檢校司空守峰州刺史𫝊珦贊正安國功臣鎮海軍節度上押衙充安國衣錦軍親從副指揮使兼兩直都虞侯金紫光禄大夫檢校尚書右僕射守巒州刺史𫝊琰贊正安國功臣鎮海軍節度右押衙充上直都知兵馬使銀青光禄大夫檢校尚書左僕射𫝊璛等十一人各授官秩階爵及遥郡有差夏四月詔諸道兵馬元帥府開幕除吏一同天䇿上將軍府故事是月復以峰州刺史𫝊珦守檢校太保餘如故冬十月勅遣吏部尚書李燕中書舍人韋說授王天下兵馬都元帥是月黄龍見於卞山之金井洞命立瑞應宫一作祥應宫戊寅四年春三月朔四星聚斗王置元帥府僚等官勅授兩浙行軍司馬秦州節度使平章事馬綽守檢校太尉同平章事行軍餘如故夏四月廣帥彭城巖僭稱大漢皇帝年號大有進士王詡之在南海著昭陽賦一篇序云皇章基搆乾坤十有八嵗矣甲子春始作茲殿計其甲子則巖本年僭號今據皮氏舊録而書之云前年丁丑僭號其誤明矣六月西川王建殂子衍嗣改年乾德是月王命子元球權衢州刺史命鮑君福等率兵攻信州斬淮將李師造生擒偏將馮一一作敏等一千餘人刺史周本僅以身免秋八月制授涇源節度使杜建徽守檢校太傅同平章事冬十二月淮人圍䖍州將絶我貢路刺史盧光稠來告王命徴兵援之未及境而䖍州㧞矣航海入貢自此始也己夘五年春三月勅文穆王伐淮南夏四月淮帥楊渭又名隆演僭稱大吳皇帝年號武義文穆王率師與淮人戰於狼山之江大敗淮人斬賊將百勝軍使彭彦章生獲士卒七千餘人制以湖州刺史大彭縣開國子王子𫝊璟為宣州寜國軍節度使同平章事秋七月我師復攻毗陵因戰於無錫指揮使何逢吳建死之遂班師八月淮人以狼山之敗遣偽客省使歐陽汀來請通好王納之息民故也自是休兵民樂業二十餘年九月朝廷以南海僭號詔我師伐之制曰朕聞綱紀亂常前王無赦懲惡勸善有國不私茍罪惡以顯彰在刑名而何逭其有身當間關寄受國恩敢行不軌之心具騐速辜之跡頒行典憲仍命誥誡清海建武等軍節度使嶺南東西道觀察處置供軍糧料市舟等使開府儀同三司檢校太保兼中書令持節都督廣州刺史上柱國南平王食邑五千户彭城巖頃因乃父發跡本藩尋頼其兄致身賔席受先朝之㧞擢極上將之寵權念其尊奬之誠許維藩宣之任巖乃自行軍之職繼膺推轂之恩秩進三師位同四輔自朕獲承大寳累進崇資一門無比其超榮百世豈儔其寵耀而敢飛章不紀希寵無厭始求抑絶四隣後請封王南越貪饕斯甚踰僭孰偕朕毎含容再申優渥授之東鎮加以南平比罔思知足益恣兇狂妄稱漢室遺宗欲繼尉佗醜跡結連淮海阻塞梯航徒惑逺方僭稱大號在人情而共棄豈天道以能容冝命討除用清逆亂爾天下兵馬都元帥錢志扶廟社任總兵師毎興憤激之辭願舉誅夷之令是用俾予元老平彼叛臣先行奪爵之文爰舉摧兇之典其彭城巖在身官爵並宜削奪仍委指揮征討於戯將相重任子孫殊榮不能常守于藩修而乃自干於國典指兇殘而必取念染汚以將新非我無始終之恩盖爾有滿盈之罪凢百珍重悉體朕懷王雖受命而山川隔越地方擾攘尋以事寢冬十一月丁亥吳越國正德夫人吳氏薨夫人臨安縣人也父仲忻浙西觀察判官累贈吏部尚書初王議婚吳氏以王豁達大度不事産業將不許而吳世父有知人之鍳固促成之及歸室閨門整肅孝敬如禮王性􅃊急常怡顔以諫之撫愛諸子無分彼此之親累封燕晉二國至吳越國正德夫人夫人將逰奉國寺中王乃命帛百疋以偹散施夫人曰妾偹嘗機杼之勞遽以逰賞費之非念人之道遂不受而罷其仁慈節儉如此薨年六十二嵗諡曰莊穆有子十三人庚辰六年春二月勅授宣州節度使同平章事王子𫝊璟以下並起復雲麾將軍上右金吾衛大將軍員外置同正員餘並如故三月王命元帥府判官皮光業使于䢴溝夏五月淮南楊渭殂弟􅄎嗣偽謚渭為宣皇帝秋七月王以子睦州刺史𫝊懿為婺州刺史辛巳七年春三月王從弟鎰至自淮南王亦歸李濤以報之鎰以天祐二年睦州之役為賊所執李濤以乾化三年來冦我衣錦獲之至是各歸焉夏五月朔梁主祀郊改元龍德六月朔日有蝕之秋七月潭州楚王馬殷遣掌書記李峴馬臣送女歸于都知兵馬使檢校尚書左僕射王子𫝊璛冬十月制授文穆王檢校太傅同中書門下平章事充清海軍節度使自是賜王書詔不名壬午龍德二年春正月勅授文穆王以下並起復加爵邑有差秋七月王建天下元帥府于興國門之右八月兩浙行軍司馬秦州雄武軍節度使同平章事馬綽卒綽餘杭縣人也性氣淳直與王同亊董昌昌甞使王閱部伍亡其名籍王因厯唱之存亡徤悴者無所遺失綽密謂王曰老氏忌前駭此强記必相惡乃以白籍紙數幅授王若代軍籍者由是頗德之王因以從妹歸綽綽尋隨董氏於越及董僭號綽棄家先奔于王乃奏授諸城都指揮使徐綰之亂綽有發懸門之功王尋命文穆王納綽女是為㳟穆夫人綽累職鎮東軍節度副使兩浙行軍司馬睦州刺史王奏授秦州雄武軍節度使同平章事終年七十一是冬一日王晝寢夢青衣人捧簿書于前告曰大王明年錢塘官滿及寤頗惡之明年天子乃命王封册中外皆如列國之儀其兆明矣癸未三年春二月勅遣兵部侍郎崔曄一作恊刑部員外郎夏侯昭册封王為吳越國王受封册建國之儀一如典禮先一日雨雪王命李咸將卜他日咸曰大王雙受封册惟天所相雨雪必霽則可以卜社稷之延永王從之即夕星斗明麗翌日遂成其禮王建國儀衛名稱多如天子之制惟不改元置百官丞相客省等使四月唐莊宗即位于魏州大赦改元同光是月梁亡梁哀入洛陽因都焉䢴溝入賀京師上書稱大吳國王乾寜中有耕者得傳國璽以獻于王王謂非人臣家所宜畜至是獻焉五月勅遣宣諭使通事舍人吳韜走馬自淮甸至賜王名馬玉帯香藥等先是梁室詔勅不名至是依前不名亦曰吳越國王焉冬十月朔日有蝕之十二月唐主遷都洛陽甲申同光二年春二月唐主南郊大赦二月癸邜金吾衛大將軍置同正員檢校司空明州刺史王子𫝊卒王第八子也母濟南郡夫人童氏性仁厚明敏好學治郡自得政體累授鎮東軍親廵都指揮土客諸軍安撫使光禄大夫竇州刺史奏授金吾大將軍員外置同正員檢校司空改明州刺史年三十惜哉秋七月西川王衍稱大蜀皇帝致書于京師八月王遣使入貢冬十月制授王依前天下兵馬都元帥尚父尚書令吳越國王授文穆王檢校太師兼中書令充兩浙節度使觀察留後十一月升蘇州為中吳軍制授鎮東軍節度檢校太保兼中書令大彭郡侯王子𫝊璙一作元璙充中吳軍節度使乙酉三年春二月南海入賀京師上書自稱大漢國王夏四月朔日有蝕之秋八月勅遣正議大夫守尚書上柱國贊皇郡開國男賜紫金魚袋李德休等持節備禮賜黄金印玉册及沿身禮物衣冠劍珮等册曰維同光三年嵗次乙酉八月辛酉朔二十七日丁亥皇帝若曰王者惠濟黎元輯寜方夏重名器任股肱忠而能力則禮崇賞不失勞則人勸所以啓周公之土宇列漢祖之膏腴者録彼茂勲寘諸異數登進賢哲焜燿事功也天下兵馬都元帥尚父守尚書令吳越國王錢潮海靈源承天峻岳以英風彰德望以勇氣贊忠貞往因義舉之徒盛推韜略遂著襲封之績髙歩藩維挺魚鯤鳥鳯之姿擁㟁虎水龍之衆居方面任將五十年宣導休聲攘除兇醜摧堅奮銳鄙許東固圉之謀阜俗頒條廣冀北安居之頌環塹浙江之要雲滋星紀之墟說禮敦詩位崇元帥前茅後勁名重中權守畫一之規奉在三之節信立靡移於風雨義行曷倦於津塗効琛則那顧險難薦幣則常歸宰用振英謨而端巖弼鍾懿號而異列藩可謂職貢不乏梯航時至翼戴天子加之以㳟也載念尊奬爰示徽章今遣正議大夫守尚書吏部侍郎上柱國贊皇縣開國男食邑三百户賜紫金魚袋李德休使副朝議郎守起居郎充史舘修撰賜緋魚袋聶璵持節備禮胙土苴茅册爾為吳越國王於戯地奄數圻賦過千乘墨守闔閭之境軌圍勾踐之封子弟量才序進多分於棨㦸土疆漸海方輸豈限於魚鹽貴盛富强雖古之封建諸侯禮優夾輔不加於此慎厥始終無以位期驕無以欲敗度欽承賜履恊予一人汝嘉時唐主將議恩命於王顧羣臣曰朕從黌堂即聞尚父之名宜以優禮尊之命偹册禮有司乃偹竹册銅印唐主曰尚父元老不當待以人臣況已封建乎乃賜玉册金册仍以紅袍御服一副賜焉九月王師大舉伐蜀冬十二月蜀偽主王衍降是月制授土客諸軍都指揮檢校太保兼鎮海軍節度副使王子元球守檢校太尉兼侍中充靜海軍節度使是月閩王王審知殂子延翰嗣自稱閩國主丙戌四年夏四月戊寅王不康如衣錦軍命文穆王監國是月莊宗崩明宗即位大赦改元天成秋七月庚寅王至自衣錦軍八月朔日有蝕之九月制加文穆王食邑一千户實封一百户又授中吳軍節度使王子元璙開府儀同三司加食邑五百户冬十二月制授靜海軍節度使王子元球開府儀同三司食邑五百户是月建州刺史王延禀殺其弟延翰一名輸而立泉州刺史延均於福州延禀乃延均之庶兄也同起兵攻殺延翰延禀乃立延均於福州而延禀歸建州矣是嵗大水蘇州尤甚水中生米大如豆民取食之丁亥天成二年春正月唐主更名亶夏六月楚武穆王馬殷建國秋八月朔日有蝕之冬十月唐主如汴是月淮南偽丞相東海徐温卒子知誥嗣十一月吳王楊􅄎稱帝戊子三年春二月朔日有蝕之勅遣監門衛上將軍烏昭遇賜王湯藥國信等閣門通事李韞授文穆王鎮東兩軍節度使夏六月以來大旱有蝗蔽日而飛晝為之黒庭户衣帳悉充塞之王親祀於都會堂是夕大風蝗墮浙江而死都㑹堂即白太𫝊居易之虛白堂基也王重建之號八㑹亭江東羅隱為之記以王平吳定越講武計議凡八㑹於此故名之後更名都㑹堂也秋七月己巳忠獻王生己丑四年春二月制授文穆王杭越等州大都督府長史増食邑實封中吳軍節度使王子元璙増食邑五百户實封一百户靜海軍節度使王子元球兼中書令餘並如故楚州升為順化軍以明州刺史王子元珦為順化軍節度使秋七月台州大水請軍儲三十萬斛八月己酉今大元帥吳越國王王孫𢎞俶生是月明州餘姚縣修舜井獲古佛舍利數十粒兼有珠玉竒玩王命内衙指揮使徐仁綬近侍閭丘稔往迎之因建浮圖于城北一如城南之制九月因樞密使安重誨兄弟用事于朝甞要求不克乃矯制以王為太師致仕仍賜烏昭遇自盡先是烏昭遇之來使也有供奉官韓玖承王子元球恩命至玖性兇愎因恃酒凌昭遇由是有隙王以其辱君命止以常禮遣之玖還京師遂搆昭遇於樞密重誨重誨以昭遇失使臣之體而亦嗛王以要求不克誣王不禮君命遂同䜛搆命王致仕賜昭遇以自盡也王命文穆王奏雪其事奏不得通乃以絹書上之天子始得聞焉出安重誨為河東節度使是嵗所在地震居人有壞廬舍者庚寅五年春二月唐主南郊大赦改元長興元年夏五月制授文穆王以下食邑實封六月朔日有蝕之冬十一月楚王馬殷殂子希聲嗣辛夘長興二年春二月勅遣監門衛上將軍張籛兵部郎中盧重賜王國信湯藥起王致仕復元帥尚書令國王如故依前不名仍示安重誨矯誣之罪勅略曰天下兵馬都元帥尚父尚書令吳越國王錢乆列王公恒輸愛戴朕方禮加元老恩遇逺方安重誨掇緝瑕疵遽行阻絶使錢元瓘拜闕上章傾懷請罪言皆激切事且慿虚盡由爾介蠆之心有誤我含容之德情不可恕罪不可逭宜出為河中節度今已誅之以雪其寃故告秋七月有象入信安境王命兵士取之圈而育焉八月建州王延禀子繼昇繼倫奔於我盖其父為延均之所害也初審知薨延翰嗣位以延禀為建州延均為泉州延均不悅而延禀亦憾於延翰於是泉建同啓兵攻福州殺延翰遂立延均於福州延禀歸建州將行謂延均曰善紹先人基業勿煩我老兄再至延均聞之含憾至是將圖延禀乃詐言已死使軍吏迎取延禀乃囚其子繼雄仍執延禀入城延均曰果煩老兄再至矣延禀瞪詈之而就戮其繼昇繼倫自是聞難而奔於王焉冬十一月朔日有蝕之壬辰三年春二月勅遣吏部侍郎盧詹刑部郎中楊薫賜王國信湯藥等三月己酉夜大雪庚戌王薨于正寢年八十一在位四十一年朝廷聞訃廢朝七日哀悼不已詔曰天下兵馬大元帥尚父尚書令吳越國王錢本朝元老當代勲賢位已極於人臣名素髙於簡册贈典既無其官爵易名冝示其優崇冝令所司定諡曰武肅詔工部侍郎楊凝式為碑文夏四月庚午奉靈輴殯於衣錦軍應順元年申午春正月壬午勅塟王於安國縣衣錦鄉即錦北鄉茅山之原即今臨安縣也王始在軍中未嘗自安毎欲蹔憇必先整衣甲偹盥漱而後寢焉又以員木小枕綴鈴睡熟則欹由是而寤名曰警枕又置粉盤于卧内有所記則書之及撫鎮二國殆及四紀勤勞㳟儉始終一致毎夕必列侍女各主一更戒之曰外有報事當振鈴聲以為警省凡有聞報即時而遣又常以彈丸於墻樓之外以警宿直者使其不寐以應其事又嘗微行夜叩北城門吏不肯啓關曰大王來我亦不啓王乃自便門而入明日召吏厚賜之稍暇則命諸子孫諷誦詩賦或以所製詩什賜于丞相將吏以下由是往往達旦天復中近侍李詠因監契丹驛中有判官謂李詠曰武肅王常夜不睡詠詰其所知答曰嘗聞五䑓王子太師言浙中不睡龍今已歸矣訪其所聞乃壬辰之後也王少時倜儻有大度志氣雄傑機謀沉逺善用長矟大弩又能書寫甚得體要有知人之鍳及通圖緯之學毎處衆中而形神有餘純孝之道禀於天性毎春秋薦享必嗚咽流涕嘗曰今日貴盛皆由積善所致但恨祖母不能見耳嘗逰後庭層樓皇妣春秋髙不能上王親負而登焉天祐以後中原多事西川王氏稱蜀䢴溝楊氏稱吳南海彭城氏稱漢長漢王氏稱閩皆竊大號或通姻戚或達聘好皆以龍衣玉册洎書䟽等勸王自大王嘗笑曰此兒輩自坐爐炭之上而又置吾于上耶吾以去偽平賊承天子疇庸之命至於封建車服之制悉有所由豈圖一時之利乃隨波於爾輩也皆却之不納而諸國之主無不咸以父兄事之王加以自奉節儉衣服衾被皆用紬布非公宴惟瓷磚􅃮器而已㳟穆夫人嘗以王寢帳隳裂乃上青絹帳請易之王曰作法於儉猶恐其奢但慮後代皆施錦綉耳此帳雖故猶可蔽風竟不易後庭有鄭氏其父嘗以罪當死左右兾其獲宥且言斯人有息女預侍王命出其女而後斬之顧左右曰刑者公柄豈可以一婦而亂我法耶又嘗夕宴諸王子及諸孫命鼓胡琴未數曲遽止之曰外聞當謂我不恤政事為長夜之飲宴遂罷王自開創以來至於底定而撫字將帥洎行伍莫不盡得其歡心有勲將何逢殁於賊中一日王見其所乗馬悲泣不能止左右莫不感激論曰王挺命世之才屬艱難之運奮臂起義所向披靡以寡敵衆黄巢不犯其封仗順伐逆漢宏至於授首誅逐帥之薛朗遂申屬郡之禮平作偽之董昌不違本朝之命加以禦淮戎以耀威奉梁室而示略廽江山之深險致都邑之宏麗七徳克備五福是臻故入輔地圖三授天册總四海之戎柄為一人之父師威名赫然霸業隆矣然後内敦㳟儉外正刑賞安民和衆保定功勲文䑓崛起於江東𤣥德雄據於巴右比之全德固不足同年而語哉吳越偹史卷二欽定四庫全書吴越備史卷三
