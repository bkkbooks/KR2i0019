front:
  text: 吳越備史卷苐三
  hash: sha256:77d434ff941308119b4125719e21a6eb43a016ec222aab23966b1c9c94856ff2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0019_SBCK_003-1a}
body:
  text: 武勝軍莭度使掌書記范坰武勝軍莭度廵官林禹撰忠獻王忠讓王附忠獻王諱􅀪佐字􅀇祐文穆王苐六子也母吳越國仁恵夫人許氏王以天成三年七月二十六日己已生于功臣堂􅀄孝獻丗子之居􅁥撫也文穆王治其府于城北􅀅俾居之一日孝獻㑹王以采戯于青史樓遽謂王曰君王方為我營府署今與爾賭之比及四擲而王遂得六赤孝献失色王􅀙客曰五哥入府諱當􅀅符印之命因再拜孝獻竟怒擲骰盆于樓下俄而孝獻薨王授兩軍莭度副使檢校太傅天福六年秋八月諸􅀅請誅内衙􅃌揮使戴惲惲乃王庶兄􅀪侑之親意謀立􅀪侑故請誅之免􅀪侑為庶人更名罪其異志也是月王以遺命承制授両軍莭度使九月庚申王即位于仙居堂赦境内外班賚有差及租稅等丞相􅈠仲達攝政事是月辛未王遷于思政堂命境内給復一年諸􅀜梁禁制悉􅀙除减又命田園有􅀠道宫佛寺比入賦稅者悉免冬十月長星見十一月金􅁜來祭我先王是月勅授王起復鎮國大􅀅軍右金吾衛上􅀅軍員外置同正員領鎮海鎮東等軍莭度检校太保兼中書令吳越國王食邑一萬戸實封一千户仍賜保􅀖宣化忠正功臣是􅀊畨禺彭城龑殂子􅀪晟嗣壬寅七年春正月閩人來祭我先王二月癸卯勅葵先王于龍山之南原三月勅遣使太中大夫李鶚來歸文穆王􅈖乙丑中吳建武等軍莭度使廣􅁜王丗父元璙殂子文奉嗣元璙字徳輝武肅王苐四子也起家奏授沂王府咨議􅂙軍宣武莭度判官累遷散􅀐常侍賜金􅂵尋厲軍旅事乃改授馬歩􅆹事􅃌揮使天福二年徐綰叛頋全武請奉王子之邗溝武肅以淮帥常請結姻好乃遣元璙微服為全武僕而去比及望亭有逆旅媪輒識之至潤州安仁義亦知其非常􅀅其下十人易之全武懼因賂閽吏中宵而去及抵邗溝􅃌陳順逆之理淮帥為之動容歎曰生子當如錢郎吾之子㹠犬耳即日遣使命頵還軍廣􅁜尋迎婦而歸後累征縉雲新定皆有功授邵州刺史尋征吳興髙澧及攻東州復授睦州刺史尋遷蘇州累勅授中吳建武等軍莭度使蘇常潤等州􅇛練使太傅同中書門下平章事侍中中書令在郡三十年性儉約而恭靖便弓馬文穆王即位以王兄尢加禮遇因元璙來覲為酒授璙曰今日之事宜兄當之俾予小小至是實兄推戴之力璙俯伏曰大王功徳髙茂先王擇賢立䏻君臣之分敢􅁯忠順因相頋感泣乆而益􅂬尋奏勅封廣􅁜郡王封不及授宣命于柩前終年五十六􅀊􅁙之以王禮謚曰宣義壬申制加王食邑七千户仍改賜保􅀖宣化忠正翊戴功臣夏四月漢主龑殂子玢立六月􅀳髙祖崩少主重貴即位秋七月王以内衙􅃌揮使章徳安李文慶爲内衙左右都􅁥使冬十月以都􅃌揮闞燔胡進思爲内衙上右統軍使十二月已已以龍山武功堂爲文穆王廟癸夘八年春正月癸未重建功臣堂二月􅀳主還京是月丙辰吳越丞相皮光業卒光業字文通丗為㐮陽人父日休有盛名為蘇州軍事判官太常博士光業生于姑蘇十􅀊䏻属文及長以所業謁武肅累署浙西莭度推官賜緋武肅命入貢京師梁後主特賜進士及第仍賜祕書郎授右􅀘􅊴内供奉賜金􅂵貞明中淮人來求好命光業聘之及還贈錢三百萬復禁其出且曰可以市易光業曰我使介也豈賈竪也乃委置而去淮人亟載随之梁祖選武肅子傅􅈿為駙馬都尉命光業如京師及回至靖海光業舅氏􅅬文規為山陰令日暝遽見黄衣吏報曰皮􅀘􅊴今日已及靖海文規詰之遂失所在尋兼両浙􅀚察使支使文穆即位命知東府事􅀄光業逰㑹稽有神降于里巷光業往視之神遂不語及去衆詰之曰皮秀才來神何不語荅曰皮秀才此土地主我小神不當見之至是果騐國建拜丞相凡教令儀注多出其手光業羙容儀善談論人或以為神仙中人終年六十七􅀊贈謚曰貞敬三月唐主昇殂子璟嗣年􅃅保大閩富沙王延政稱帝國􅃅􅇻是月漢彭城􅀪熈弑主玢而自立夏四月朔日有蝕之秋七月王貶内衙都􅁥使章徳安于處州李文慶于睦州冬十月勅遣使授吳越國王玉􅁽􅁽曰維天福八年􅀊次癸夘十月丙午朔六日辛亥皇帝若曰在天成象拱辰分􅀅相之星惟帝念功唘土列侯王之國朕所以法昊穹而光宅稽典禮以䟽封而况丗著大勲時推令器􅊥寳符而嗣位仗金􅃏以宣威羽翼大朝藩籬東夏宜列諸侯之上特􅂭一字之封蕳自朕心協干輿論兹爾保􅀖宣化忠正翊戴功臣起復鎮國大􅀅軍右金吾衛上􅀅軍員外置同正員檢校太師兼中書令杭州越州大都􅇂􅂶鎮海鎮東等軍莭度浙江東西等道管内􅀚察䖏置兼両浙塩鐵制置發運營田等使上柱國吳越國王食邑一萬七千户實封四千户錢為時之瑞命丗而生真􅀴文緯武之才藴開物成務之志英􅂠彂外精義入神亞夫繼社稷之勲頋榮擅東南之美眷言祖考志奉國朝清吳越之土疆執桓文之弓矢天資厥徳代有其人荷基構以克家事梯航而述軄殊庸斯在信史有光是舉􅉓章爰行盛典土茅符莭方推翼丗之賢黻冕輅車更重䇿勲之禮斯為異數允属真王今遣光祿大夫檢校司徒行太子賔客上柱國太原縣開國男食邑三百户王玫使副正議大夫行尚書吏部郎中柱國賜􅂵金魚袋趙熈等持莭備禮􅁽爾為吳越國王於戯周􅃂元臣四􅂂錫命漢封異姓八􅀦始王􅃌河嶽以誓功俾子孫而襲爵爾儧服舊業朕考前文勿􅁯必復之言更廣無窮之祚懋昭前烈尓惟欽㢤十一月辛已王遷于功臣堂是月癸未吳越丞相曹仲達卒仲達臨平人也本名􅀪達避王名更之祖信知嘉興􅁥事累贈司徒本歙州人尋歸杭州為臨平鎮􅀅八都建時信因保嘉興東分遂家臨平焉父圭浙江西道營田副使檢校太尉圭􅀅生時信夢人曰我當為爾子有二千石信語夢于鄊黨鄉黨不䏻諭皆賀曰生此子必致豐稔圭有膽氣乹寜中淮人圍嘉禾圭與其族人師魯守之賊中望氣者曰此􅀌城中有異人不可圗也圭每与師魯登樓張樂縦飲矢石交至視之晏如也嘉禾平圭以功授蘇州刺史開平間淮人復圍蘇州属正月望夜師魯第盛陳燒燈之宴賊之俘執者咸縦之􅀚圭終蘇州師魯形短而􅁕跛武肅嘗稱之曰今之晏平仲也人遂􅃅為曹晏嬰竟卒于鎮東軍都押衙仲達􅀄生室有􅂵光少學圭常莭其衣食雖嚴冬尚未挾纊品膳悉與僕吏等同日令運甓圭在姑蘇時與仲達求婚于睦州陳詢及􅀅送卜之曰陳氏親必不就當聘他門由是榮貴既而途由􅀦城武肅王見而竒之乃以王妹􅓻焉累授台䖏二州刺史文穆即位居諒闇命仲達􅁠知政事國建拜丞相今王即位復攝政事時大賚中外諸軍軍中有言不均者輒舉仗受賜諸􅀅不䏻制仲達諭之因皆􅇚仗而致謝仲達性仁厚好施與文穆尢重之常止呼丞相而不呼其名終年六十二贈謚曰安成是月納元妃仰氏乃寕國軍莭度使同􅂙相府事仁詮之女也甲辰開運元年春正月壬寅丞相林鼎卒鼎字渙文隐閩人也父無隐鼎生于明州大隐村􅀄刺史黄晟頗好禮士無隐依之有詩名嘗為詩云雪消二月江湖闊花彂千山道路香知言者以無隐必有貴子鼎􅀄謁武肅以為􅀚察押衙推尋為文穆幕府文穆怪其才行累薦不見用一日復宻薦之武肅王曰我觀林鼎骨法真輔相器然我不貴者欲汝貴之庶其盡心于汝也文穆襲國署鎮海軍掌書記莭度判官鼎性讜正而強記䏻書歐虞法比及中年夜讀書必達曙􅀁聚圗書悉由手抄其殘編蠧簡亦手綴之無所􅌅倦􅀦建乃掌教今尋拜丞相每正事即不逮者鼎必極言之天福中建州之役鼎􅃌陳天文人事累䟽切諫及師行果不利著有文集行于丗終年五十四􅀊諡曰貞獻三月偽閩王延曦為其下􅃌揮使朱文進所弑而文進自立復脩貢于京師是月勅授王落起􅂧増食邑三千户實封一千户夏四月丙午王親祀五廟秋七月辛未朔􅀳少主改元開運大赦以彭城知逺為行營都統九月朔日有蝕之南􅂳務石井有物形如守宫尾長七尺許鬛且角獲之置于安溪潭冬十一月王命􅀙兄東府安撫使仁俊為内外馬􅇍都統軍使弟􅀪保為東府安撫使閏十二月閩人殺朱文進尋以僧儼明為主儼明姓車氏乃雪峯寺僧平素為衆所重相與迎之遂立為帝未㡬為其下李仁達所殺而自立歸􅅃金􅁜乙已開運二年春三月丙午王􅀙祖順化軍莭度使鏵卒鏵字輔軒太師英顕王之第五子武肅王之少弟也生而有文在其􅁕曰正及長而滅既生而太師薨武肅育之武肅薨鏵請服通丧性多藝尢精音律承制累授温州二州刺史检校太尉奏授思州防禦使文穆時授両浙行軍司馬拜命之日儀注特盛尋奏改本州􅇛練使順化軍莭度使終年五十三􅀊勅謚曰忠蕳夏四月􅀳主還大梁秋七月修武肅王廟于城西奉旃擅神像而致焉八月朔日有蝕之是月金􅁜遣􅀅王建封克建州虜王延政而歸冬十月勅遣太子賔客羅周岳右庶子王延濟􅁽王守太尉十一月朔王大閱于北郊是月誅内都􅁥使杜昭達内衙都指揮使明州刺史闞燔庶人孫本賜死貶都統使王兄仁俊本府安置杜昭達闞燔皆好貨程昭恱以金寳交結二人薦于王昭恱得侍上右愛待踰于舊􅀅燔不䏻平昭恱懼謀去燔燔専而愎國人皆惡之王亦惡之于是昭悦出燔為明州刺史右統軍使胡進思為湖州刺史燔与進思曰出我是棄我也進思曰老兵淂大州幸矣何為不行乃各受命既而復留進思而統軍使王子仁俊母乃杜昭達之姑也昭恱因譛燔昭達謀奉仁俊作􅅍下獄鍜錬成之誅昭達與燔幽仁俊于東府昭恱収仁俊故吏慎温其使證仁俊之罪拷掠備至温其堅守不屈王嘉之擢為國官丙午三年春二月朔日有食之三月勅授王東南面兵馬都元帥増食邑二千户實封五百户仍改賜推誠匡運忠亮威徳㓛臣秋七月庚寅吳越國夫人許氏薨夫人丹丘人也諱新月善音律文穆王後庭楽部皆命掌之􅀄鄜氏生孝獻丗子立于後庭咸尊敬之有尼契雲掌香火于䴡春院之佛堂頗有知人之鑒視夫人曰彼鄜氏者逺不䏻及至是果如其言至王襲位遂勅封吳越國夫人薨年四十四􅀊勅謚曰仁慧八月重建天寵堂是月壬申􅁙仁慧夫人于國城西山之原冬十月金􅁜攻福州莭度使李􅀪義遣客􅀅徐仁宴李廷谔䓁求救于王李􅀪義本名達殺卓儼明而歸􅅃金􅁜因授之莭􅃏仍編入属籍更名􅀪義既而遣偽兵部侍郎陳覺使于􅀪義覺還及建州又遣侍衛官頋忠以金􅁜偽勅使之入覲􅀪義以其􅀄不宣命至是方以書至不􅀙􅁴乃与􅁥軍使馮延魯自建州興師皆金􅁜之志也是月王命統軍使張筠趙承泰等率水陸兵三萬人以救無諸時福州乞師于王王召諸􅀅議行􅀅吏等皆曰道路險逺難于師救内衙都􅁥使水丘昭奏曰為當救王曰唇亾齒寒吾為天下元帥曽不䏻救鄰道􅀅安用之諸軍直樂飽食安坐邪王乃命募兵無有應者王命糾之曰糾而為兵者糧賜减半于是應募者雲集王命昭劵専掌用兵程昭恱掌應援饋運事而以軍謀委元徳昭乃遣筠等帥師救之時王吕上右議鑄鐵錢以益􅀅士祿賜王弟􅀪億諫曰鑄鐵錢有八害新錢既行舊錢皆流入鄰國一也可用于吾國不可用于他國則啇賈不行百貨不通二也銅禁至嚴民猶盗鑄况家有鐺釡野有􅲱犁犯法此多三也閩人鑄鐵錢而􅅍亾不􅁕為法四也國用幸豐而自示空乏五也祿賜有常而無故益之以唘無􅌅之心六也法變而􅁦不可遽復七也錢者國姓易之不祥八也王􅀷嘉之乃止是行也􅀫衛衣錦軍武肅王庿廷者聞甲馬􅃅令之聲凡數夕而止及接􅀾于閩淮人視王師周郊徧野人皆文餘乃陰兵之助也十二月王命弟􅀪偡為湖州刺史丁未四年春正月天皇主入東京稱㑹同十年封晋少主為􅀒義矦遷于契丹黄龍府二月有雉巣于玉􅂠樓是月􅀳彭城知逺稱帝于河東國􅃅大漢是為髙祖復稱晋天福十二年是月王誅内都􅁥使程昭恱釋東府仁俊罪也三月庚寅今大元帥吳越國王諱出鎮丹丘是月王遣􅀅余安率水軍救福州大敗淮師獲其􅀅都指揮使揚匡業蔡遇等偽東南面行營都統王建封等赱之擒戮禆􅀅孟堅等并餘黨二萬餘衆器械數十萬李􅀪義歸附于王更名孺贇􅀄忠懿王之治閩城壘甓皆有錢文曰此城終歸錢氏忠懿頗惡之因命剗去而錢文愈明又謡曰風吹􅀭葉鼓山下不得錢來戈不罷至是皆騐是行金􅁜歸罪于陳覺馮延魯謂其専命而行也金􅁜始以覺為東南面招討使延魯為􅁥軍及其敗績反以専命為罪以贖􅀁恥一何偷㢤為君而偷復歸罪于其下其丧師也不亦宜乎夏四月李孺贇遣弟孺賔來請入覲􅀙之五月我師凱旋王饗􅀅帥于光􅁽堂賞賚有加是月勅授王諸道兵馬都元帥増食邑五千户實封五百户仍改賜資忠緯武恭懿翊戴功臣是月椘王希範殂弟希廣嗣六月乙卯王薨于咸寜院之西堂年二十在位七年勅謚曰忠獻八月勅􅁙龍山之西原王英眀果㫁權變不測􅀄嗣住尚少温柔好禮恭勤政務發擿姦伏人不敢欺諸校驕恣者䏻優客之及􅀍譴皆不知覺義兵籍使錢承徳家火俯逼内城命親軍援之王登而望有伺便攘􅀼者亟命斬之衆囙悉力火遂滅淮人之攻閩也李孺贇來求援諸􅀅議􅀅不􅀙王囙集而詢之果同其􅀃王變色曰唇亾齒寒春秋明義吾為天下元帥執大兵柄豈不䏻恤鄰難乎乃命水丘昭劵専掌用兵程昭恱掌應援饋運而諸􅀅躍馬􅁏食不䏻為我身先即有異議者斬及大舉遣􅀅誓師辭命明肅衆皆踴躍承命既而果成大功開運中􅀅益車徒乃下命募軍中及民間子弟而踰時無應者乃命大糾之令曰紏而得之者糧賜皆蠲半翌日投書者雨集遂加精練南方之㨗多其力也民有獻嘉禾者王問倉吏蓄積㡬何對曰十年王曰然則軍食􅁕矣可以寛吾民乃命有司復其境内租稅三年論曰王岐嶷之姿雖由天縦纉嗣之日方属眇年帑藏因回祿之􅀄􅀅校競陸梁之志故䏻恭勤庶務紹開覇圖有果㫁之名無酣􅄝之累以至復興公室開拓土疆光有大功聿修厥徳而享祚非永孰不哀哉忠遜王諱􅀪倧文穆王苐七子孝献丗子同母弟也起家内衙􅃌揮使檢校司空開運元年冬十一月出為東府安撫使累授檢校太尉尋拜丞相開運四年六月丙寅即位于天􅁽堂是月晋主入大梁改􅃅曰漢秋七月閩帥李孺贇來覲是月庚子有雉升于天􅁽堂之㦸門旋厯廊廡久而獲之閏七月王命李孺贇復任無諸王親餞于碧波亭八月􅁙忠獻王于國城西原冬十月今大元帥吳越國王至自丹丘十二月李孺贇復貳于我王命東南面安撫使􅇹修譲攻討擒而戮之已酉􅀓首國城是月命丞相吳程知福州威武軍事庚戌内衙統軍使胡進思􅃌揮使諸温鈄滔等以内衙兵遷王于義和後院諸􅀅校率衆迎今大元帥即位焉自忠獻王時諸校驕慢雖屢加誅殛而在位者皆優禮遇之及王纉嗣性既嚴急誅杭越侮法吏三人而統軍使胡進思恃迎立功干預政事王􅁖之每有僣越必顯責譲進思頗憂懼不自安属内衙指揮使何承訓希旨請誅之又謀于都􅁥使水丘昭劵以進思黨盛難制請于王且客之王猶豫末决承訓亦懼反以謀告進思進思遂􅅍率親兵戎服入見王叱之不退猝愕入義和院進思鏁其門矯稱王命告中外曰王猝得風疾􅀓位于諱因率諸􅀅迎今大元帥于私弟且言于丞相元徳昭徳昭至立于簾下曰俟見新君進思等亟出褰簾徳昭乃拜進思稱王命承制授元帥元帥曰若全吾兄乃敢承命不然當避賢路進思承之元帥始視事于是進思殺水丘昭劵進思妻曰他人可殺昭劵正人君子也奈何殺之􅀄忠遜王􅀅即位近侍陳禹嘗夢以金鈔鑼承日輪加遜王之頂而手持二環未㡬墜地既而以夢語人人曰汝主􅀅有非常之事然其二鐶不過二十旬耳及即位又以黄金一鎰命近侍􅀽文昌鑄巨錢文昌意其有所求䜟且懼不就乃􅀫謀于匠者別鑄一以為備翌日以所授金鑄之遜王臨視果不就因潜以􅀫鑄者獻至是皆騐其兆後廢王薨請謚曰忠遜以王禮􅁙㑹稽秦望山之原論曰王以英敏之才􅁖強梁之黨納承訓阿順之􅀃中進思􅆸立之機輕發寡謀至于失位故知君不宻則失臣臣不宻則失身誠㢤斯言也猶賴鴒原之至愛致稽嶺之要居養玉軆以終天年掩泉扄而備王禮古之􅆸君失國未有若斯之安全者其實忠懿王之仁與孝爲􅁕多哉吳越備史卷第三
