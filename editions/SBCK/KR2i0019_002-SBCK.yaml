front:
  text: 吳越備史卷第二
  hash: sha256:85bb5b9555b9b2a715bf179c17067e3d9d74eabcaf0c5bd94a4bc426bb38f0a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0019_SBCK_002-1a}
body:
  text: 武勝軍莭度使掌書記范坰武勝軍莭度廵官林禹撰文穆王文穆王諱元􅗕字明寳武肅王第七子也母晉􅀦昭懿太夫人陳氏唐光唘三年丁未冬十一月十有二日生于杭州之東院先是有胡僧持一玉羊大可數寸光彩異常以獻武肅且曰得此當生貴子王果以丁未生焉乹寕元年二月授塩鐵發運廵官奏授金部郎中賜金􅂵天復元年八月改授禮部尚書遥領邵州刺史九月壬子王祖妣秦􅀦太夫人水丘氏薨二年徐綰許再思搆宣城觀察使田頵同劘我壘頵敗率徐綰再思回宣州慮我師逐之乃懇質武肅王王厯􅃟諸子不應命時王尚㓜請行荘穆夫人聞之泣曰置我兒于虎口也玉曰亾身以紓國家之難亦􅁕以報劬勞耳雖死無恨乃再拜而出武肅王竒而送之王自北門躡繩梯而下以赴頵營􅀄頵附于淮人及還宣城而頵叛淮帥㑹我師以攻之頵每戰不勝歸必求王􅀅肆其毒頵母老且賢常加保䕶天祐元年十月我師與淮人攻之甚急頵􅀅出􅀾乃曰今日不勝必殺錢郎其母目而送之且曰䑕軰死不旋踵矣是日果陷于宛水橋爲􅅍兵􅀁殺賊衆尚􅅰我師提頵首以示之賊衆遁散頵母遂奉王歸我師衛而歸焉二年春正月制授王檢校右僕射八月䖏州刺史盧約弟佶㓂永嘉開平元年正月武肅王命王伐永嘉四月斬盧佶而還時盧佶列巨舟四十艘于清澳海門以􅌽我師王謂諸􅀅曰賊之銳卒盡在此矣宜勿與􅀾當有他道徑襲賊壘出其不意必成􅨛也于是由安固江登陸而襲之佶由是就執師還承制改王衙内都􅃌揮使檢校尚書右僕射冬十月授王金􅂵光祿大夫檢校司空五年秋七月賜􅃅王賛正安國功臣進授司徒守湖州刺史乹化三年夏四月淮􅀅前吉州刺史李濤率兵二萬自千秋嶺㓂我衣錦軍武肅命王率師討之王以山谷迂僻乃盡伐樹木􅅸其歸路為三覆以待之時江南國主徐知誥在賊中與王􅀐相逼僅獲之俄而知誥易服乗白騾而􅇡壬辰獲李濤及偏􅀅咸知進等八千餘人兵甲生口􅁛是是行也王營中有氣如龍虎之状賊中望之有曰此覇者之氣也五月王復率􅀐兵攻宣州廣徳縣城未㧞有登城詬辱我師王怒􅁬擊之六月已夘城陷王手刃二百餘人藉藁而行獲􅀅花虔渦信及吏卒七十餘人殺戮凡二萬四千而還先是有日者視王曰公手刃百人當大貴時又有僧名自新常衣紙住廣徳山院王至衆皆遁而自新巍然晏坐軍中有詰其不去者自新曰前後上右皆兵耳去􅀅安適時王自衆中自新忽見之乃歛衣奉迎與語乆之及王還遂載而歸後王問自新當時何以見識自新曰微僧無他術但􅀚王在萬衆中骨法獨異與咸通皇帝御容頗相類故尓幸淂一識也冬十月勅授王檢校太保依前湖州刺史大彭縣開􅀦男食邑三百戸四年夏六月制授王特進光祿大夫開國侯食邑一千户秋九月王率師攻常州無錫縣丁未克之獲其􅀅朱超䓁五百餘人而還真明元年春正月勅授王鎮海軍莭度使土客諸軍都􅃌揮使湖州刺史如故三年夏六月制加王檢校太傅増食邑五百户五年夏四月王率水師大小戰艦五百餘艘皆刻龍形自東州發艦􅈳伐淮甸時淮南遣􅀅彭彦章陳汾等大􅀾于狼山江􅀅􅀾之夕王召􅃌揮使張􅀙寳計之曰彼若徑下當避其􅀄以誘之制勝之道也乃命軍中􅀫理㠶檣每舟必載石􅁅黒豆江砂以随焉翌日昧爽淮人果乗風自西北而下危檣巨艦勢􅀂雲合我師皆避之賊舟既髙且巨不能復上我師反乗風以逐之復用小舟圍其上右賊廻舟而鬪因揚石􅁅賊不䏻視及轆轤相接乃撒豆于賊舟我舟則砂焉􅀾血既漬踐豆者靡不顛踣命進火油焚之火油得之海南大食國以鐡筒發之水沃其熖弥盛武肅王以銀飾其筒口脱為賊中所得必剝銀而棄其筒則火油不為賊所有也斬其􅀅百勝軍使彭彦章一作臯獲士卒七千餘人賊􅂳四百餘艘餘皆焚之其斬馘之甚自江及岸數十里皆􅇻焉淮師自是遂求通娉王之是行也舟次狼山江之石牌灣有石幢大署其文曰向後有木龍五百来至此真聖其勝也秋七月王復􅀾于毘􅁜之無錫縣偏􅀅曽雲奔于賊我師不利王􅀐逼髙岸賊􅀅􅇷及乃舉䇿私誓曰天必助我馬當躍上不然則墜我于此馬果一躍而登岸既而復整行伍破賊而還冬十一月丁亥王妣吳越國荘穆夫人薨六年冬十月勅遣衛尉卿兼通事舍人陳琮授王檢校太傅同中書門下平章事充清海軍莭度使餘如故龍徳二年春正月勅王特進檢校太尉兼侍中加食邑三百户仍賜匡扶定􅅍立正至道功臣同光二年冬十月制授王開府儀同三司檢校太師兼中書令依前清海軍莭度使兼充両浙莭度使􅀚察留後遣進奉使婁輯􅀅命焉天成元年四月武肅王不康因如衣錦軍命王􅁥國仍俾便宜􅀙事武肅王至自衣錦軍而中外無所専命武肅王嘉歎乆之九月制加王食邑一千户實封一百户一夕王夢神人賫骨一副易王頂及醒尚痛焉三年春二月遣閤門通事舍人李韞授王鎮海鎮東等軍莭度使杭州越州大都􅇂長史加食邑一千户實封二百户秋七月己已忠献王生􅀄武肅王􅀅属王以冡嗣乃命諸子有功者數人謂曰爾無隐情各言爾功以定厥後王兄中吳軍莭度使元璙王弟清海軍莭度使元璹寜國軍莭度使􅀓璟洎諸公子等皆上言王功徳髙茂是宜委副故以両鎮属焉及武肅寝疾一日命出玉帯五賜王兄弟命王先擇之王乃取其狹小者武肅王大恱謂王曰吾有汝瞑目無恨矣四年秋八月己酉今大元帥吳越國王􅀪俶生五年夏五月制加王食邑一千戸實封一百户郊恩也長興三年春三月己酉大雪二十八日庚戌武肅王薨王哀痛終日四日不食上右􅂆以粥夏四月己未王即位悉用藩服之儀􅀙治命也赦境内凡一應􅂽絶田産尚􅀠租籍者悉免之中外頒賚有差自今年孟春洎是月陰晦弥日及王親事之日至是澄霽中外咸恱是月庚午奉武肅王靈輴殯于衣錦軍之正寝秋八月椘帥馬希聱殂弟希範嗣癸已四年春正月福州王延鈞僣稱帝更名璘三月勅遣􅀅作􅁥李鍇光祿少卿張裒來歸我先王之賵又遣引進使楊彦珣授王起復雲麾􅀅軍上金吾衛大􅀅軍員外置同正員王兄中吳軍莭度使元璙檢校太師兼中書令王弟清海軍莭度使元璹檢校太傅同中書門下平章事餘如故夏四月淮南偽客省使許確百濟􅀦太僕卿李仁旭各來祭我先王秋七月勅遣郎中張絢授王中書令進封為吳王是月畨禺偽上僕射何瑱亦來祭我先王九月勅遣侍郎張文寳來宣諭文寳泛海而來􅀍風壊􅂳飄至天長吳主厚禮之及賞􅀙者錢帛等數萬文寳獨受飲食餘皆辭之吳主嘉之竟抵抗冬十一月明宗崩宋王􅀙厚即位是為閔帝十二月庚戌寕􅀦軍莭度使同平章事检校太傅王兄元璣卒璣王之庻兄也母慶安夫人胡氏公性氣寛厚沉静寡言多尚儒􅇚不喜奢侈厯官數年􅀺庶安楽早失夫人終不棄娶之嗣是􅀊順化軍莭度使判明州王弟元珦召歸錢塘懲虐政也甲午應順元年春正月閔帝改元大赦勅遣鞍轡庫使王延縞來宣告仍賜􅀦信尋又遣散􅀐常侍孔昭序駕部貟外郎張䌧􅁽王為吳越王是月大雪平地五尺壬午奉葬先王于茅山閏月蜀帥孟知祥僣稱大蜀皇帝年􅃅明徳夏四月潞王􅀙珂率兵入洛逐閔帝而自立改元清㤗六月勅遣給事中張延雍兵部員外郎馬義􅁽王為吳越王秋七月偽蜀孟知祥殂子㫤嗣乙未清㤗二年春三月制授静海軍莭度使检校太保中書令王弟元球守太師秋七月甲辰西方慶雲見重建開元宫􅇷福于先王也丙申三年春正月勅遣禮部尚書李懌户部郎中姚遐齎奉吳越王金印至歸舊物也秋七月勅建先王廟于東府是月制授王部􅀅保順軍莭度使􅇹君福檢校太尉同平章事冬十月偽閩王㫤弑其父延鈞而自立年號通文十一月契丹立石敬瑭為􅀳皇帝于洛大赦改元天福潞王自殺十二月勅授王天下兵馬副元帥丁酉天福二年春正月朔日有蝕之勅遣供奉官周彦環賜􅀦信二月淮南以徐知誥爲齊王建國于金􅁜是月己酉夜􅁀雨自西北起連日至壬子有海魚二尾各長五十餘尺一死于桐廬一死于餘姚江三月静海軍莭度使王弟元球順化軍莭度使王弟元珦並有罪命死王許以公禮􅁙其麾下卒伍悉宥之元球元珦數有軍功先王賜有兵仗及王立元球等恃㤙驕横増置兵仗諸􅀅吏告元球遣親信禱神求主吳越又爲蠟丸與元珦議謀王不信諸􅀅復告王乃召元球元珦宴後宫既至上右告元球等有刃于懷䄂即皆格殺之王欲按諸􅀅有交通者姪仁俊諫曰昔光武破王郎曹公破􅀽絽皆焚其書䟽以安反側宜放之王乃止夏四月勅遣禮部尚書程遜兵部貟外郎韋稅封王為吴越國王仍賜天下副元帥金印一面甲午王即位建國之儀一如同光故事仍赦境内今年租稅之半是月􅀳主遷都于汴秋七月制削元球元珦在身官爵任便䖏置八月辛已王大閲于北郊是月偽吴楊氏遜位于徐知誥戊申王新建五廟于城南九月乙卯王親祀五廟冬十一月乙丑金􅁜徐知誥僣稱大齊皇帝年􅃅昇元戊戌三年春正月朔日有蝕之二月乙亥吳越國丞相沈崧卒贈謚文獻崧名吉甫閩人也祖輅大理評事賜緋父超福州長溪縣令崧􅀄生時有大蛇墜牀前引首視之乆而方去既七日􅀅浴忽風雨震壊浴盆乹寕二年刑部尚書崔凝主禮闈凡二十五人登進士弟渝濫尢衆昭宗御武徳殿命翰林學士陸扆祕書􅁥馮渥親覆試凡落十人是日崧再以章奏㨗尋歸寧途由淮甸淮帥辟之不就遂歸武肅厯鎮海軍掌書記授浙西營田副使奏授祕書􅁥检校兵部尚書右僕射凡書檄表奏多崧􅀁出荘宗即位改元同光武肅王問其祚脩短崧曰􅀚此􅃅為􅀦不成止一口耳文穆王襲位置擇䏻院以選士俾崧主之􅀦建拜崧丞相終年七十六􅀊冬十一月勅建尚書王丞王延司門郎中張守素齎捧吳越􅀦王玉􅁽及沿身法物等至􅁽曰惟天福三年􅀊次戊戌十一月甲辰朔五日戊申皇帝若曰王者握圖立極崇徳報功􅂉開􅀦以建􅀖􅂉苴茅而襲爵乃樹藩屏式奨忠勲古先哲王率由斯道唯朕薄徳敢忽􅃔章况夫奠南服之奥區鎮東甌之重地懋績雖髙于列土殊榮未􅁇于肯堂得不申加等之㤙降非常之命用紀代天之業特頒鏤玉之文乃擇吉辰爰敷盛典咨爾興􅀖保運崇徳志道功臣天下兵馬副元帥鎮海鎮軍等軍莭度浙江東西等道管内􅀚察處置兼両浙鹽鐵制置發運營田等使開府儀同三司檢校太師守中書令杭州越州大都􅇂府長史上柱國吳越􅀦王食邑一萬五千户實封一千五百户錢嶽靈禀粹天象儲精藴文武之兼才受乹坤之間氣既􅃂承吴越功邁桓文運妙略以平兇用竒兵而制變祇嗣基搆表率英雄淮夷之屏氣銷聲海嶠之波澄浪息而况興我昌運竭乃忠規懋勲庸而首列韓壇奉玉帛而誠先禹貢語尊奨則獨標大莭頋封崇則未稱鴻名宜舉徽章俾奉先正矧其天文當南斗之分地誌控句踐之都眷兹舊封允属全徳是用異車服于羣后盛蕳􅁽于列藩正二國之土疆錫九天之寳瑞表予嘉命纉乃舊􅀖大振家聲夾輔王室今遣使太中大夫尚書右丞上柱國賜􅂵金魚袋王延使副中散大夫尚書司門郎中柱國賜􅂵金魚袋張守素持莭備禮􅁽爾為吳越國王於戯服衮衣而佩􅀇玉位􅐦于諸矦駕戎輅而握兵符名尊于九代馭貴之重象賢之榮爾其祗荷天光勉清􅀦􅇍往綏厥位永孚于休戒之慎之勿忝前烈十二月王大閱兵馬歩軍泊艛艣于碧波亭已亥四年春二月勅授丗子􅀪僔為果州􅇛練使是月偽齊徐知誥改姓李更名昪僭稱大唐昇本潘氏湖州安􅁻縣人父為安􅁻砦􅀅嘗因淮􅀅李神福侵我吳興擄潘氏而去昇遂為神福家奴徐温嘗造神福家見而異之求為飬子至是乃隐本族而冒徐姓焉後嘗致書于我以毘􅁜求易吳興仍引祊田為􅀃則本潘氏明矣秋七月朔日有蝕之閩王延義更名曦殺其主㫤而自立年􅃅永隆八月戊申王建丗子府于城北是日白龍見處州長松縣遂更為龍泉縣是月刺遣刑部尚書季懌禮部郎中崔鈞授王天下兵馬元帥增食邑五千户實封五百户仍賜御服紅羅真珠戦袍金鏁甲各一副九月詔陞婺州為武勝軍授王兄元懿為莭度使是月保大軍莭度使同􅂙相府事隆仁章卒冬十月壬子吳越􅀦荘穆夫人馬氏薨夫人臨安人也父淮浙行軍司馬雄武軍莭度使同平章事馬綽之女夫人性聰慧勤于軄􅀄武肅王禁中外毋淂蓄聲伎夫人以王後嗣未立乃請于武肅王王嘉之曰我家宗祀幸汝得主之矣因而許王納妾遂生忠獻王諸子既長夫人皆均養之常置銀鹿于帳前坐諸公子于上夫人閱其聚戯喜動顔色􅀄封越國至吳越國夫人薨年五十􅀊勅謚曰恭穆十二月辛酉􅁙恭穆夫人於衣錦軍慶仙鄉庚子五年春二月甲辰温州刺史王子􅀪僎卒是月閩王曦遣兵擊其弟王延政于建州遂僣稱大􅇻皇帝王命内衙統軍使仰詮都􅁥使薛萬鍾帥師伐建州三月勅陞婺州為武勝軍又陞嘉興縣為秀州以嘉興崇徳華亭三縣􅀠焉是月勅遣右諫議大夫髙延賞兵部郎中李元􅀛授王天下兵馬都元帥夏四月癸夘鎮海軍行軍司馬兼侍中同平章事太尉􅇹君福卒君福字慶成餘姚人也祖興父璨俱不仕少羇貧性淳厚有膽氣餘姚有井面廣丈餘君福毎恣卧其上而無畏色又䏻為馬上舞雙剑鄉黨異之及􅀙軍以驍果稱􅀄事彭城漢宏及武肅王東討乃與其黨歸䧏􅃅曰向盟都累􅀙征伐有㓛䏻馬上輪雙劍入陣望之若飛電沉黙少語軍中謂之􅇹閙尋為衢州應援􅃌揮使屬刺史陳章叛淮人入其境乃以淮帥命辟為郡軄君福不納武肅聞之患其􅀍􅊣乃宻賜絹書使苟􅀙之因与賊徒季元嗣飲嗣其醉乃奔歸尋授衢州刺史淮􅀅信州刺史周本屢侵其境君福每率數􅀐往逐之本遁去及􅀅罷郡武肅王勞曰比在任戰敵而已未􅁕為副使優賀之道囙復任之凡三考文穆王領清海軍莭制辟為副使後遷湖州復二考累軄鎮海軍莭度副使浙西行營司馬奏授登州刺史保大保順等軍莭度使檢校太尉同平章事兼侍中卒年七十七􅀊勅謚曰忠壮是月甲子丗子􅀪僔薨􅀪僔王苐五子也母魯國夫人鄜氏時王年􅀅四十冡嗣未建及生特所鍾愛累奏授両浙副大使果州團練使􅀦建立為丗子􅀄王治丗子府謡言曰何䖏有鹿脯􅀅薨乃題所居屏障曰四月二十九日大㑹羣仙凡題數䖏及期果薨年方十六􅀊􅇷謚曰孝獻五月四星聚斗秋七月我師敗于建陽積雨乏糧故也八月王以丗子府為瑶䑓院冬十二月以忠獻王為内衙諸軍都指揮使是􅀊姑蘇吳興嘉禾三郡大水辛丑六年春三月丙寅勅遣太子賔客聶延祚吏部郎中盧􅁧􅁽授王守尚書令亦作五年􅁽也此誤書之也夏五月畨禺彭城龑遣偽攝太尉工部侍郎盧膺尚儀謝宜清尚衣髙素清來逆我故王弟傅璛之室馬氏以為􅁇室不克遣馬氏即潭帥椘王􅇻之女也先是畨禺亦聘馬氏既卒遂求其弟是行也潭帥希範亦遣中軍使歐陽練與廣使俱至馬氏誓不許故不克遣六月寜􅀦軍莭度使同􅂙相府事仰詮卒秋七月甲戌䴡春院火延于内城王遷居瑶䑓院是月閩王曦稱大閩皇帝八月辛亥王薨于瑶䑓院之綵雲樓年五十五在位十年贈謚曰文穆勅宰相和凝􅁧神道碑七年壬寅二月癸卯􅁙于國城龍山之南原王志量恢廓識度宏逺雖少嬰軍旅尢尚儒學事武肅孝敬小心未嘗有􅈈武肅性既嚴急每一召即時湏至􅂉巾帯于歩驟間乃致闊袴大襪以便之晚年政事一委􅂙决簿書填委皆躬親批署手爲胼胝復致粉盤于卧榻之間夜有所記必書其上詰旦以備頋問時属盗賊及詐偽誹謗之法犯者輒死王皆力救之所獲宥者甚衆嘗北征師次平望蚊蚋尢甚左右請施帷帳王曰三軍皆在此我獨何避竟不許及儧嗣之後示以明恕人情翕然内衙指揮使陸仁章婁仁􅂎等早備武肅王爪牙以性剛愎爲衆所􅁖而亦嘗以事侵王一日同列者皆率諸軍于國門請王戮之王命姪仁俊諭之曰仁章等事先王有年矣今求舊念功方當旌賞汝等遂以私憾使我戮之我安為尓報怨也苟不聼命我當歸臨安以避賢路衆皆退懼遂授仁章福州刺史仁􅂎湖州刺史中外有以封章相構者皆居中不下積而毁之王舅陳氏列職不過一戍遏每加厚賜而未嘗遷授恭穆夫人之弟馬充嘗以使役求免王庭責之遂下獄黜于剡溪其餘遵守治命保慎名器烈祖之風為不泯矣一日武肅王寝疾召􅀅吏曰吾疾必不起諸児皆愚劣誰可為帥者諸􅀅泣曰两鎮令公仁孝有功孰不愛戴武肅乃出印鑰授王曰􅀅吏推爾宜善守之又曰子孫善事中國勿以易姓廢事大之禮王與兄弟同幄行丧内衙指揮使陸仁章曰令公嗣先王覇業􅀅吏旦暮趋謁當与諸公子異處乃命主者更設一幄扶王居之禁諸公子􅀙者無得妄入武肅未薨時仁章嘗以事犯王至是王勞之仁章曰先王在位仁章不知事令公今日盡莭令公猶事先王也王嘉之王以遺命去儀用藩鎮法除民田荒􅅸者租稅王于兄弟甚衆兄元璙自蘇州入見王以家人禮事之奉觴為夀曰此兄之位也而小弟居之是兄賜之也元璙曰先王擇賢而立之君臣位㝎當恭守覇業自為􅈿重王囙相與泣論曰王以英毅之資兼仁厚之徳入田頵豺狼之穴示亾身之慮破知誥蛇豕之羣揚對敵之威奮劍屢成其大勲􅐦紐遂當其慶嗣念功􅁯過崇徳布政然後聿脩先烈光絽丗官天子賴于元勲諸侯奉為盟主以稱克家之令嗣以􅃅列國之賢君則彤弓緇衣不􅁕侔其美也吳越備史卷第二
