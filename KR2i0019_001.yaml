body:
  text: 武勝軍莭度使掌書記范坰武勝軍莭度巡官林禹撰武肅王武肅王姓錢氏諱鏐字具美杭州安國縣人即臨安縣也唐武德中陪葬功臣潭州大都督巢國公九隴八代孫也大中六年壬申二月二十六日生于本縣之衣錦鄉勳貴里曾祖諱沛唐宣州旌德縣令纍贈吏部尚書上僕射追封洪勝王曽祖妣童氏追封齊國太夫人祖諱宙纍贈太尉追封建𥘉王祖妣水丘氏纍封椘國太夫人追封晉國九華太夫人皇考諱寬威勝軍莭度推官職方郎中守太府少卿纍贈禮部尚書開府儀同三司守太師令追封英獻王皇妣水丘氏纍封秦國太夫人追封趙國太玄太夫人王即長子也先是五年邑中大旱邑令道士東方生起龍以祈雨生曰茅山前池中有龍然不可起起必大異邑令乃止明年復旱又召東方生起龍將臨池遽指王所居曰池龍已生此家矣時王已誕數日始誕之夕皇考方他適鄰人急赱告曰適過君家後舍聞甲馬之聲甚衆非有盜乎皇考乃急馳歸王已誕矣復有紅光滿室皇考頗怪之將棄于井祖妣知非常人固不許因小字曰婆留而井亦以名焉王自幼常與羣兒聚戲于樹隂石上或伐薪必使羣兒聚以供已隨多少而賞罰焉王嘗憩後山忽一石屹然自立王因志之及貴建功臣精舍於其地遂以石為佛坐樹號衣錦將軍十三年冬十月皇祖太尉薨將葬之夕大風拔樹于野詰旦術者引靈輀將就葬所謂王考曰此拔樹之穴是天啓也宜以葬遂窆之畢術者撫王曰當貴此孫耳王常逰徑山書院有道人洪湮者每迎于門王頗惡之一日自後山避徑而往湮亦迎焉王問其故湮曰君非常人故預知耳乙未乾符二年夏四月浙西鎮遏使王郢作亂敕本道徴兵討之時董昌戍石鏡鎮亦募鄉里之衆以副召王王遂委質于董氏始為偏將王入軍中驍勇絶倫為董氏所重時王年二十四矣及董為杭州一日因事遣王之臨安途次餘杭有瞽者善摸骨相集于龍光稿在餘杭縣王因請相竟無一言王一日自臨安而還日已暮矣相者復在舊所王遂贄金以為請相相者曰旁無人乎王曰獨在斯相者乃引臂久之嘆曰天下亂矣期時之內再遇貴人言訖而去旬日後王復以束帛至餘杭將酬之訪于鄉閭竟絶蹤迹戊戌五年寇盜蜂起有朱直管曹師雄王知新等各聚黨數千剽掠于宣歙間秋九月王率本鎮兵討平之以功聞授石鏡鎮衙內都知兵馬使遷鎮海軍右職己亥六年秋七月黃巢擁衆二十萬人大掠州縣淮南莭度使髙駢羽檄徴兵討之時巢三百餘衆將及石鏡鎮王謂董氏曰黃巢以數萬之衆踰越山谷旗鼓相逺首尾不應宜以伏兵襲之賊或少却則可逐矣巢前軍二千餘衆果﨑嶇而至王率二十騎伏于草莽巢小將單騎先進王親注弩射之應弦而斃伏兵遂起巢兵大潰王謂衆曰此術止可一舉耳大軍必至則衆寡莫敵矣宜乘勝張虛聲以懾之乃進屯八百里古地名也途次逆旅遇一老嫗而誡之曰後有兵至當言臨安兵屯八百里未幾巢兵果至具如所對賊衆相顧曰向止數騎尚不可當况八百里乎遂不犯境王又伺其後軍殺獲人馬而歸功董氏淮南髙駢聞而偉之庚子廣眀元年冬十二月黃巢犯闕僖宗入興元杭州始建八都臨安縣曰董昌王副之餘杭縣曰陳晟於潛縣曰吳文舉鹽官縣曰徐及新登縣曰杜稜唐山縣曰饒京富春縣曰文禹龍泉縣曰凌文舉各聚千人以衛鄊里既而髙駢吕董氏赴廣陵王亦從焉時駢熟視王顧上右曰此人他日爵祿必逺過于我時駢將大舉討巢命董氏從行王謂董曰竊窺髙公無討賊之志苟從其行功效不立是同坐罪宜以捍衛鄉里為辭董然之告于駢駢因以禮而歸焉是月黃巢自稱大齊皇帝辛丑二年春正月僖宗幸蜀改元中和敕髙駢為東西行營都統起師討巢駢竟不出兵秋八月己丑夜星大如杯碗交流如織至丁酉乃止西晉之末五星互經天縱橫無常未幾五胡之亂驗矣九月詔授董昌杭州刺史授王都知兵馬使太子賔客壬寅中和二年秋七月浙東觀察使彭城漢宏姓犯王諱故號彭城以天子西幸乃遣弟漢宥馬軍都虞候辛約率兵二萬營于西陵將圖浙西既燒魚浦劫富春兵勢甚盛董氏遣王率師禦之是月十二夜將渡江而星月皎然兵不可渡王親掬江沙吞而祝曰吾以義兵討賊天將見助碩隂雲蔽月以濟我師俄而雲霧四起咫尺晦暝王大喜即先渡江竊賊號縱火斫其營精兵繼至破賊殆盡漢宥辛約赱之擁入溝塹士卒大半溺死尸骸相枕冬十月漢宏又率衢婺等四州兵七萬餘人遣登髙鎮將王鎮領之營于江干連營相屬王率儒童鎮將徐靖浙江都逰奕使阮結銜枚宵濟復大破之王鎮奔諸暨王獲漢宏所署主將憲官偽敕二百餘道俘馘萬計兵甲生口稱是歸漢宏所掠民間妻女于鄉里者數百人是月詔王兼侍御史癸卯三年春三月漢宏又分兵于黃嶺岩下貞女等三鎮及山洞凡九十三所皆千餘人以圖大舉王率八都兵自富陽以趨之破黃嶺岩下及山洞三十餘所生擒貞女鎮將陽元宗岩下鎮將史辨等仍焚其兵甲夏四月漢宏自領兵屯諸暨古剝嶺至于亭凶龜山之下王先攻諸暨獲糧二萬餘斛旋破古剝嶺亭山等寨賊皆宵遁五月漢宏又遣將何肅黃圭等率本道排門軍營于蕭山諸暨等處王親禦之破賊一萬餘人生擒都虞候章公直餘黨赱之冬十月漢宏又遣弟漢客與辛約巴立李萬敵等會溫處等州兵洎白丁十餘萬衆從蕭山西陵大出戰船以謀宵濟王自新沙由漁浦而攻之戮何肅等遂趨蕭山是月戊午王親與漢宏遇自午至戌破賊大衆漢宏易服持膾刀而遁時軍中有異其狀者將擒之漢宏誑曰我宰夫耳遂伏于亂尸之內得免次日漢宏復舉餘黨四萬人來抗我師乘勝大敗之斬漢容辛約及招討判官談升都知兵馬巴立先鋒李萬敵仍獲漢宏偽淮海招討使印一紐戰艦五百艘馬四千蹄兵甲萬計俘馘千人漢宏宵遁歸越甲辰四年春二月婺州王鎮執刺史黃碣請降于王漢宏聞之使其下婁賚殺鎮而代之夏四月浦陽鎮將蔣環會我師攻婺州生擒婁賚而還未幾敕命中使焦居燔為杭越通和使俾其改過王遂班師以待之漢宏因殺王人密徴水師于溫州刺史朱褒出戰船習于望海以史惠施堅實韓公汶領之復圗水陸並進秋七月敕授王國子祭酒兼御史大夫右千牛衛將軍冬十二月朔天子南郊改元大赦乙己光啓元年春正月僖宗發蜀三月至京師冬十月授王檢校散騎常侍右武衛將軍十二月監軍使四令孜進逼帝如鳳翔丙午二年春正月田令孜劫駕如寶雞二月復興元冬十月大將朱玫立襄王為帝朱玫僣立煜為帝以正其反逆之罪也是月一日王謂董氏曰除惡務去根本不尓當為後患願以全師討之董曰然王即日進師以諸都兵馬使阮結守梅市監陳使錢爽守雙童遏後使駱團守平水降將使章可周唐晟王公備等守蘭頭江海逰奕使崔則守羊石是月辛亥王親率師自諸暨趨平水導山路至于曹娥埭癸丑破韓公汶因與朱褒遇水師戰䑲皆焚而溺之甲寅進屯豐山梅城鎮將施堅實執漢宏右直將張師及歸于王丙辰進拔越城漢宏赱台州辛酉戮漢宏妻母弟姪及其黨史惠史侃都虞候蔡約于軍門十二月丙午台州刺史杜雄執送漢宏至命斬于會稽市漢宏斥刑者曰吾廉察也非汝輩可殺吾嘗夢手捧金錢殺我者錢公也乃請王親刃焉漢宏兖州使院之小吏也尋為大將尋本州兵以禦黃巢寇遂殺將首劫輜重而叛詔忠武軍討之不利復命前濠州刺史崔鍇招擕之宏遂降授宿州刺史會浙東觀察使栁韜以賄免朝官皆耻代之議者以漢宏降將也以降將代贓吏宜矣乃除之既有七州之地而復萌逆莭常會客酒酣謂衆曰天下喪亂金刃之讖焉知非僕遂撫掌大笑復又會于使院有羣鴉噪庭樹上因使伐木有座者言此樹有年矣鴉噪乃常耳願勿為怪宏曰我將斬白蛇豈止此樹邪遂伐之又嘗構別第窮極雄壯一日有飛帛書署其門曰漢宏是賊豈宜造此大宅宅之中堂懸一錦傘守衛甚謹即夕失之人皆以為任俠所獲及舉兵至西陵將謀渡江乃禱于江干俄有一矢墜其前莫知其所來宏頗惡之既敗棄其母挾妻而奔焉就執之日董庶人讓之宏曰成即是敗即非自古何有不敗之家不亡之國然則僕射亦有名將良䇿宏無之以至于此何必太讓哉既而儒童鎮將徐靖以俘掠居人戮之于市北關鎮將彭城孟安與弟孟宿輒起府庫散其本部仍執廉使牌印王因饗于擊場遂責之孟安即席謀王立斬以徇時孟宿部兵屯于外王親撫之悉有其衆越人及諸將皆推王為主王固讓董氏董遂權蒞于越杭人復請王代董氏時浙西莭度使周寶承制以王權知杭州軍州事兼杭州管內都指揮使是月赴本郡録其事以聞詔授王撿校尚書丁未三年春正月帝在興元敕授王杭越管內都指揮使上武衛大將軍充杭州刺史董昌為越州觀察使凡國王自陪臣已下所授官爵自貞明戊寅已前制用詔敕皆自間道而至戊寅以後南康貢路阻絶則皆航海而至皆出其迎授徐審德本日月而書之他皆倣此三月潤州客司軍將彭城浩逐莭度使周寶出于毗陵推度支催勘使薛朗為主仍火其城是月帝至鳳翔夏四月六合鎮使徐約攻陷蘇州淮南髙駢為其下畢施鐸所幽乃召宣州觀察使秦彥為主五月王命東安都將杜􅏢浙江都將阮結靖江都將成吉率兵討薛朗𥘉杭州山賊朱直為亂遂募八縣鄉兵以討之因為八都臨安董昌首之今東安浙江靖江皆其數也其諸都地名都號首將名姓並見于前六月師次陽羡與賊將李君旺遇大破之獲船八百餘艘秋九月秦彥殺髙駢駢擁兵叛命信用妖人自取亡滅秦彥與畢施鐸出師屢敗疑駢黨內應遂殺之髙駢之事豈非佛氏所謂輪回果報者乎易曰積善之家必有餘慶積不善之家必有餘殃曽子曰出乎爾者反乎爾者也若髙駢所淂猶未足以償數千人之怨才足以見天道好還之不差忒耳是月詔加王檢校户部尚書至日王師次禹城斬賊將丁重德屬將趙君度赱之遂進攻常州丁從實棄城宵遁從實浙西小將也有微功于周寶故用為是郡人以為暴虐號為此丁滅門及是奔于海陵鎮鎮使髙霸及楊行密同入海赴髙駢之難從實竟為行密所􅊣也十月周寶遂歸于王王以屬郡禮具􅐤鞬迎之于郊仍舍于樟亭驛是日廬州刺史楊行密始入淮南十一月十二日文穆王生十二月命杜稜為常州制置使遣阮結等進攻潤州是月乙未周寶卒寶字尚圭曽祖侍選唐滄州魯城令幽薊之亂魯城以一邑拒寇為賊所害祖光濟上贊善大夫依矦希逸于平盧軍為衙門將每行陳獲攻魯城者必殺之以祭父父懷義以武藝為韓臯所重纍官至工部尚書天德軍使寶即第三子也以父蔭為千牛備身尋去求職依天平軍帥武宗三年徴方鎮有才器者入宿衛寶因隸右神䇿軍出為良源鎮將有戎政本軍表聞授右廂都押衙馬步軍知軍事大將軍出涇州聚糧二十餘萬斛黃巢之亂移鎮海軍莭度使僖宗幸蜀加授右㒒射檢校司空中和二年拜同平章事時朝廷以丞相王鐸率諸道兵復長安以寶為天下租庸副使兼管內營田使五年授特進檢校太保兼侍中進封本郡王至是以疾薨年七十四子璵嗣比唐制武選以馬上擊毬較其能否有置鐵鈎于毬杖以相擊寶嘗遇此選為鐵鈎所摘一目睛迭寶即取而吞之復擊毬遂獲頭等授涇源敕賜一木睛以代之木睛不知何木視之亦明置水中無所礙真睛矣一日早起盥漱其睛墜水盆中侍姬竊笑寶怒曰我瞎漢何足笑也遂殺之潤州衙軍以軍額號鎮海軍蓋舊宿也寶復置親信號決勝軍處之後樓使其子璵總之衆號為後樓軍其衣食糧賜數倍于鎮海士卒頗有怨望因恣橫于外一日會客于後樓即席有言其事者則殺之而薛朗與鎮將彭城浩友善遂以寶意示之且誡其職下浩聞之憤曰可以免禍者不過反耳是夕遂率鎮海軍而叛乃推朗為主寶聞亂率家屬跣襪拓芙蓉門召後樓軍曰後樓軍兒即能救我乎後樓聞之亦同叛焉寶遂奔髙駢與寶夾江為鎮頗有嫌隙及奔駢遺書曰竊承赱馬以及奔牛又遣送黃虀一瓶葛粉十斤以表虀粉之意寶在涇源至于金陵多會賔客歡宴終日後庭樂妓百餘人水陸肴膳日極豐美以撫養欠均以致叛亂得罪驕奢蠧其福祿而使其然乎戊申文德元年春正月孫儒殺秦彥畢施鐸彥等因髙駢信妖慘酷遂亂殺駢并殺駢子弟甥姪有一婦人臨刑戟手大罵曰我必訴于上帝使汝等後日舉家殺戮一如我今日至是果如所言也傷哉是月駕在鳳翔丙寅我師克潤州生擒薛朗而還王命剖心以祭周寶彭城浩赱之王命阮結為制置使又命築嘉興縣城二月駕還長安大赦改元文德三月朔日有蝕之僖宗疾革命立夀王為太弟帝崩太弟即位是為昭宗詔加王檢校司空夏四月孫儒入淮南陷揚州楊行密行海陵復歸廬州秋九月王命從弟銶率兵討徐約于蘇州盡驅州人以守城皆文其面曰願戰南都有軍事衙推陳車車本二名上字犯忠獻王諱謂人曰南都者蓋都邑之稱杭州終當建國乎冬十一月楊行密攻殺宣州刺史趙鈴而有其地己酉龍紀元年春正月朔改元三月我師破徐約于蘇州約奔入海中箭而死約曹州人𥘉從黃巢攻天長遂歸髙駢為六合鎮將浙西周寶子壻楊茂實為蘇州刺史約攻破之遂有其地而制度不軌劫王貢賦至是而滅宜哉王命海昌都將沈粲權知蘇州事夏四月丁丑命築安衆營于臨安五月甲辰潤州阮結卒結字韜文錢唐人也杭州建八都結亦副焉中和二年以征漢宏有功授散騎常侍光啓三年征常州又平潤州纍授户部尚書四年充潤州制置使尋遷刑部尚書𥘉徐約之黨三千餘人來降結撫之失所因散香于甘露寺輒為所叛投于江遂成疾而率年四十六王以其弟右驍衛將軍阮綽領其本郡仍命成及代所任及盡誅其叛卒秋七月敕授王金𬗋光祿大夫檢校司空本州防禦使冬十月敕除給事中杜儒林為蘇州刺史以沈粲為制置使十一月帝南郊更名􅎡改元大順是月宣州楊行密遣將李宥陷我毗陵執杜稜而去𥘉李宥攻毗陵鑿穿地道而入兵甲俱以土中夜入于􅏢之寢室因執稜于卧榻而去十二月淮南孫儒遣其下彭城建封帥衆陷我潤州成及奔歸庚戌大順元年春正月戊子朔皇帝受册尊號大赦夏四月敕遣使徴兵討李克用因道逺事遂寢秋七月常州李宥陷我姑蘇制置使沈粲害刺史杜儒林及兄延休而奔于我王以其失備復害刺史將欲誅之粲遂奔孫儒𥘉沈粲之攻杜儒林儒林曰勿殺我與你金粲曰殺爾金將焉往遂殺之儒林延休異母兄弟也同日而生至是同日而死異哉是月楊行密遣將張行周為常州制置使八月制加王吳興郡開國男閏九月孫儒復遣彭城建封攻毗陵殺張行周而復困姑蘇是月王命築新夾城環􅊶氏山洎秦望山而回凡五十餘里皆穿林架險而版築焉王嘗親勞役徒因自運一甓由是驂從者爭運之役徒莫不畢力冬十一月孫儒陷姑蘇李宥奔常熟十二月孫儒歸淮南仍以沈粲為制置使是月敕遣使髙品賜官誥加王檢校司空同平章事辛亥二年春正月孫儒自淮南復入姑蘇將乘勝以圗我王出舟師以禦之儒遂絶南顧夏四月彗星見大赦天下秋七月城東安鎮冬十二月孫儒燒掠蘇常遂逼宣州困圍楊行密行密遣使求救于我王王出糗糧甲兵以助之是月常州甘露鎮使陳可立據本州王遣師平之壬子景福元年春正月丙午朔大赦改元二月命從弟銶為蘇州招緝使夏四月敕升杭州為武勝軍授王本軍防禦六月王出師會宣州兵敗孫儒于宣城行密斬孫儒傳首京師宣州以沈粲歸王戮之于市而行密因有廣陵焉𥘉楊行密軍師張某或曰李某頗善占算前一日謂行密曰明日大水亭午可獲孫儒時畏日曦赫儒兵正勝人皆哂其言及詰旦西北有雲大如箕漸漸瀰漫俄而澍雨大水暴作儒謂衆曰城中大水將及我諸營自顧無相救也俄而水深丈餘城中知其號令乃徑出兵邀擊儒營他皆不救因獲儒軍師之言果驗是月泉州王潮攻陷福州殺范暉而有其地亦作鮑姓乃陳岩之子壻也岩為福州數年而卒以暉繼之至是為王潮所害時福州嘗有僧記之曰潮水來岩頭沒潮水去矢口出矢口蓋言將來繼潮之人也癸丑二年春二月楊行密以其將田頵牧宣州安仁義牧潤州夏閏五月詔授王本軍團練使蘇杭等州觀察處置使進封彭城郡開國侯食邑七百户秋七月丁巳王率十三都兵洎役徒二十餘萬衆新築羅城自秦望山由夾城東亘江干洎錢湖霍山范浦凡七十里咸通中京師有望氣者言錢唐有王者氣乃遣侍御史許渾中使許計齎璧來瘞秦望山之腹以厭之使回望氣者言必不能止又郭璞撰臨安地志云天目山前兩乳長龍飛鳳舞到錢唐海門山起橫為案五百年生異姓王率十三都者八都之外有𬗋溪保城龍通三泉三鎮是為十三都也九月制授王鎮海莭度浙江西道觀察處置等使潤州刺史先是今年三月詔以鳳翔宿衛耀德都頭李鋋授特進同平章事領浙西差朝廷以李茂貞徹海王惡其黨將奪之權故有此授而丹陽已為淮人所有鋋不能至所治至是命王時議當之又周寶蒞丹陽州人凡有期必曰待錢來斯之應也比蜀禪月大師休公嘗上詩曰今日再三難更讓讖辭惟道待錢來明矣甲寅乾寧元年春正月乙丑朔大赦改元二月王命成及權蘇州刺史三月制王自光祿大夫檢校司徒進充本道營田招討鹽鐵制置發運等使夏五月敕遣中使彭城延巨特授王開府儀同三司同中書門下平章事六月敕遣中使賈居憺賜王私門立戟乙卯二年春二月進封王開國公食邑一千户是月威勝軍莭度使董昌僣稱皇帝建元順天國號羅平年號或云天册或云天聖皆非也江東羅諫議隱撰吳越行營露布曰羅平者啓國之明順天者建元之始又曰以將門稱天册之樓以會府為宣室之地明矣昌以書告王其所稱云權即羅平國位印文曰順天治國之印王淂之吕賔吏以議曰董氏昔吾鄉黨也今吾鄰藩也其豐功茂績崇階厚祿又吾所以贊成也今採聽妖妄遂圗潛亂吾以授朝廷將相當徴兵以討之然以惡迹方炳庶或能改吾先馳書以勉之救其覆族之禍衆悉稱善乃遣賔屬沈滂率將吏數百人移書以諫之曰與其閉門作天子與九族百姓俱作塗炭不若開門作莭度使終身富貴無憂也及今悛悔尚可及矣昌竟不聽王乃表聞之仍又率兵至迎恩門望樓再拜且諭曰大王奄有數州位兼將相非不貴也非不富也一旦顛倒兵柄改易臣莭自貽伊戚禍不旋踵今率諸州兵至城下以俟大王改過苟不見聽則天子赫怒羽林黃頭濟江而至襲大王之城非唯大王有纍卵之危實鄉黨生靈皆歸鼎㸑矣禍福之道惟大王擇之昌于是送犒師錢二億萬仍執妖人應智王溫室巫姬阿韓掾吏吳瑶秦昌𥙿至于軍門且言待罪于天子王遂誅應智等而還復表其事時越州都指揮使馬綽指揮使駱團出降俄而詔王討昌又敕遣中使髙品李重密來勞我師仍削奪董昌官爵詔曰夫雷霆霜雪上天降以成物明賞飭法哲王垂以理人是則陽春不可以獨為歲功仁恕不可以専為君德威刑之作其在斯乎朕以眇躬祗膺大寶奉祖宗之丕訓荷天地之洪休八年于兹一日無怠遜于志者既求諸道逆于心者必本于情苟懲戒之不明懼典章之斯廢威勝軍莭度使隴西郡王董昌出于行伍屬遇艱難權握兵戎位崇將相器才盈而自覆鼎必折而遂傾因憑生祠輒有狂計假陳妖異惑亂邪巫鼓噪危樓偽為建國不思理代徒生犬吠之音欲就崇祠妄舉狐鳴之兆賴浙西莭度使錢與諸司等皆忠誠憤激壯莭堅髙始以逆順之理飛章諭之而不悟次以攻伐之謀盟約脅之而不回至于率兵直以靡壘雖復假言幻惑止遏凶邪終為閉壁偷安不便束身歸罪是其陰詐猶欲張皇魚戲鼎而雖亦可哀蜋拒轍而終為不率天討有罪鬼淂而誅其董昌在身官爵並皆削奪仍委爾進兵攻討越州城士庶且多寧無勇敢之徒善以功名自許如有梟戮生擒董昌者授以三品正員賞錢一萬貫如先有官者超三資酬奬如是董昌威制曽助妖謀翻然改圖轉禍為福有所自效者罪並不問賞則與之於戲惡殺好生君人令德仗順伐逆武夫令猷鳴鼓而攻既非獲已奮戈而起亦宜慎諸勿發勿焚無誤無失网俾觀聽謂我黷武而勤兵也夏四月辛卯蘇州雨雪乙巳皇考太師薨六月制授王檢校太傅彭城郡王兼浙江東道招討制置兩浙鹽鐵彂運等使是月王起師討董昌秋七月制授王起復雲麾將軍上金吾衛大將軍員外置同正員是月帝幸莎城旋至石門鎮八月車駕還京于是董昌求援于淮帥楊行密行密遣將臺蒙等困圍姑蘇以應昌冬十月行密又遣安仁義田頵等攻我鎮戍昌遣禆將陳郁鍾福率黨屯于香嚴寺又遣李蕙崔溫屯于石候香嚴石候皆地名王命武勇都知兵馬使顧全武馬步軍都知兵馬使王球率兵往逐之遂戮李蕙崔溫等未幾昌復搆湖州刺史李師恱率兵四千餘人侵我封境又遣徐淑困我嘉禾王命內衙都虞候方密襲之不克更命顧全武率所部而禦之因破烏墩光福二岩而府城東接大江賊不得聚然沙路平漲賊之遊兵得以來往王謂全武等曰賊若有我江壖襟帶甌越則不可當也汝善禦之十一月衢州刺史陳儒卒弟岌嗣時顧全武遣偏將孟寶蔣璠率兵屯于西陵是月敕王依前起復檢校太傅兼侍中加食邑一千户是歲終郊封胥山伍子胥為惠應侯封胥山祠不詳詔命年月羅代集有碑云三年閏正月則知詔下之明年為碑今按長曆乾寧三年今甘崇耳丙辰三年春正月敕授鎮海軍水陸都指揮使費州刺史髙彥諸軍應援指揮使夷州刺史沈夏並檢校司空是月安仁義出戰船從湖州將渡江以應董昌王命武勇都指揮使許再思等禦之仁義竟不敢渡然沙路之患未弭乃祭江海而禱胥山祠一夕驚濤沙路悉毁江壖一隅無所患矣昌又遣徐珣李玄賔等據肅清四朴九鄉之地王命顧全武王球擊之徐珣等來降昌又遣將湯舊領兵守石城袁邠領兵守永寧時昌鎮遏使朱威與賀蘭風招緝使孫仲殷等並投𣢾于王且為越軍所襲朱威等由海道而至二月王命顧全武許再思自西陵趨石城與湯舊遇遂破石城去越城僅三十里生擒其黨六百餘人湯舊等赱還昌不能援三月我師復攻餘姚袁邠因大戰賊黨逃溺者相半而明州刺史黃晟遣指揮使梁從晊率兵來應我師袁邠堅壁自固昌益兵以救之顧全武遣武勇隊主彭城彥章又遣將陳郁自南臻丫口至于富陽漁浦等處屯聚王命王球等擊之又截其衝要生擒賊將徐宣等斬首二百餘級昌遣婺州兵及諸鎮兵以應之時陳郁率其黨千餘人來降夏四月我師執袁邠及遍將潘薦等凡二千餘人王以朱威復為永寧鎮使是月顧全武進圍越城而椘武王馬某始有湖湘之地王馬姓名犯宣祖廟諱故以諡易之也五月辛巳董昌親閲戰于五雲門仍懸玉帛以誘我師顧全武許再思等奮擊之其黨大敗昌愕視而退至是始懼自去其帝號𥘉城中有言王師雄壯強盛者輒怒而斬之有言王師兵疲而糧絶者則喜而賞之于是親閲我師奮擊始大懼而退次日王命分兵進攻以顧全武充諸軍都虞候東面都知兵馬使與指揮使孟寶等攻五雲門王球充右副指揮使與蔣璠等攻亭山及申光門陳章充右副指揮使與錢顔攻關子門許再思充馬軍都虞候北面都知兵馬使攻昌安門駱團充四面都指揮使攻迎恩門是月癸未越城將拔而臺蒙等陷我姑蘇刺史成及𬒳執王乃召全武議將分兵西陵以備北寇全武上言曰賊之根本繫于甌越豈以失一姑蘇而遂逭天討碩先拔越城然後復茂苑未遲王從之乙未董昌猶據牙城拒之王紿昌曰奉詔令大王致仕歸臨安昌乃送牌印而出顧全武遣上武勇都監使吳璋執昌至而斬之越州平王命散府庫金帛以賞將士開倉廩以賑貧乏又斬偽宰相李邈蔣瓌等十餘人以下脅從者悉宥之董昌臨安人也始為土團軍破山賊有功為石鏡鎮將尋遷杭州平彭城漢宏復除越州其始在餘杭洎領越州頗有廉儉之度纍授開府儀同三司檢校太尉同平章事封隴西郡王時屬京師喪亂文籍多亡越州有裴氏書樓昌悉取其書以貢授諸道採訪圗籍使既而恣為淫虐凡按罪人無輕重枉直必命骰子使之對擲勝者宥之否則殺之而案牘不復參決但一概誅戮而越州有白樓門門外即殺戮之所地為之殷守門者嘗夜聞鬼哭凡軍中制度多所改易隸中軍者衣黃布背印威儀二字隸外軍衣白布字號如之凡所器玩無大小皆號以元字軍中文其臂者亦如之識者以為元者錢之文也皆當歸錢氏昌建生祠諸郡置土馬有誑馬嘶彂汗者畢𬒳賞又立將吏木偶悉用長釘以釘其足曰更三二百年免有顛踣末年盈滿遂圗僣亂故妖人應智等竟以幻惑進愚民俗吏致龜魚符印者日以百數又集無賴之徒皆斷腕劈耳號曰感恩都以備腹心及議主國號有客使倪德儒語昌曰中和辰已間越中嘗有聖經云有羅平鳥主越人禍福敬則福慢則禍于是民間悉圗其形以禱之今觀大王署名與當時鳥狀相類乃出圗示昌昌欣然遂以為號僣立之際年月日時皆用卯從妖言也或云古讖書云江東岸上重日生昌以名應之故悉用卯以符日出之義也𥘉昌議立問會稽令吳鐐鐐曰大王不為真諸侯以傳子孫欲為假天子以取滅亡也昌族誅之山陰令張遂曰浙東雖領六州大王稱帝彼不從徒守孤城為天下笑昌又殺之莭度使黃碣惡其惑亂屢諫碣家奴有致印于昌者碣將殺奴奴遂投昌匿之碣乃密致書于管榷官李滔有順天將期一統其如之何以愚計之針豈為矟邪之句有竊其書送昌昌集吕議之碣曰今王室雖衰天人未厭大王興于畎畝受朝廷厚恩位兼將相富貴極矣奈何一旦忽為滅族之計昌詬之曰尓賊負我好聖明時三公不能待先求死也遂斬碣首投之厠中仍族誅之而李滔亦遇害自王師攻討而遷延未克者以其姪真小淂志耳俄而真與小將刺羽不和譛于昌而殺之衆由是解體蓋作亂天實所廢然也是日乃雨自前年仲冬不雨至于今乃雨蓋昌暴虐如是今平之乃雨也秋七月李茂貞犯闕帝幸華州八月刺授王檢校太尉兼中書令加食邑一千户實封一百户賞去偽之功也仍遣供奉官寧全道賜王旌莭又遣中使韓􅉓範來宣諭將授王越州王固讓遂除宰相王搏亦作溥出鎮越州搏以王有大勳宜當所授復固請辭冬十月敕改越州威勝軍為鎮東軍授王領鎮海鎮東等軍莭度使十一月戊子湖州刺史李師恱卒子繼徽嗣師恱要莭制于朝廷制授中國軍莭度使使臣未及境師悅已寢疾使人覘之回報旌莭已至蕪湖師恱聞之喜不及拜命而卒是月安仁義由南蕩復率餘黨攻東陽刺史王壇堅壁自固丁巳四年春正月帝在華州是月王命行軍司馬杜稜都監使吳璋率兵救東陽安仁義復攻睦州一夕大風雨賊衆驚擾而遁夏四月命顧全武與王弟鎮并武勝軍都指揮使沈夏陳章髙遇許再思等率兵自海道以救嘉禾時諸將皆欲緩進惟全武請倍道兼行王從之一日師次嘉禾城中莫知所之遽見我旗號皆大恱賊亦謂之神是日遂內外夾擊擒賊將李宗禮偏將顧金等二十餘人俘馘不可勝計乘勝大破賊寨十有八所又擒賊將魏約張宣楊燔閻建等士卒三千餘人嘉禾平全武等又乘勝逐田頵于驛亭埭頵由吳興而遁於時大水我師逐之斬馘沉溺者僅于十里𥘉安仁義田頵之攻我也乃請淮帥楊行密率兵親至擕一僧袒肩者來視王城僧曰此腰鼓城也擊之終不可淂又聞城中鼓角之聲曰錢氏子孫皆當貴盛未可圗也行密乃先歸而安仁義田頵駐屯于北郊復有電火焚頵營震折威鎗由是俱敗豈非天使然邪六月己酉王如東府受鎮東莭鉞先是敕命到時王謂衆曰淮寇未殄吾不敢奉命至是方行秋七月庚寅王至自東府命顧全武率師復姑蘇八月我師屯崑山既而敕王起復加食邑一千户又遣中使焦椘鍠齎鐵劵至劵文曰維乾寧四年歲次丁巳八月甲辰朔四日丁未皇帝若曰咨爾鎮海鎮東等軍莭度浙江東西等道觀察處置營田招討等使兼兩浙鹽鐵制置發運等使開府儀同三司檢校太尉兼中書令使持莭潤越等州刺史上柱國彭城郡王食邑五千户實封一百户錢朕聞銘鄧隲之勳言垂漢典載孔悝之德事美魯經則知褒德䇿勳古今一致頃者董昌僣偽為昏鏡水狂謀惡迹漸染齊人而爾披攘凶渠蕩定江表忠以衛社稷惠以福生靈其機也氛祲清其化也疲羸泰拯於越于塗炭之上師無私焉保餘杭于金湯之固政有經矣志奬王室績冠侯藩溢于旗常流于丹素雖鍾繇刊五熟之釜竇憲勒燕然之山未足顯功抑有異數是用錫其金板申以誓詞長河有似帶之期泰華有如拳之日惟我念功之旨永將延祚子孫使卿長襲寵榮克保富貴卿恕九死子孫三死或犯常刑有司不得加責承我信誓往惟欽哉宜赴史館頒示天下是月敕封胥山惠應侯為吳安王景福二年始作羅城而江濤勢激版築不能就王因禱之而沙漲一十五里餘㓛乃成就故有惠應之請前年安仁義以遊兵往復禱之一夕驚濤沙路盡毁至是感其靈貺請而封之九月湖州刺史李繼徽以州附淮南牙將沈攸拒之繼徽遂奔是月乙未王親巡吳興收繼徽家屬凡二百餘人而還湖州平王命海昌鎮將髙彥為湖州制置使李繼徽亦作彥徽父師恱乃徐州馬步院之小吏也屬王仙芝作亂遂投行伍後以遣獻黃巢首級以功授是郡師恱能書長于斷讞州有十五都頭其下俱數千人師恱撫之盡得其所時朝廷命將代師恱召諸校議之或曰但慮君侯厭小郡耳不尓則苟有代人斷不奉詔會進士顧雲旅逰于霅乃請雲草奏論之雲表略云觀龍綸而髣佛猶鳯篆而依稀因不復代矣師恱在任置舟楫樹倉廩以圗割據董昌僣偽師恱率兵食以應之至是繼徽復以擕二而敗焉𥘉繼徽將納淮人也沈攸以逆順之理諭之其衆因誓曰附李氏者居西附沈氏者居東而居東者十得其九繼徽于是惶惑而遁也冬十月淮人以臺蒙守姑蘇代朱黨也十一月己卯台州刺史杜雄卒雄台州楊梅鎮人也𥘉與朱黨婁文俱為草寇婁文以雄為副文害刺史羅虬遂侵漢宏不利因降漢宏署婁文知明州事以杜雄知台州後漢宏敗率其下六百餘人奔雄雄使偏將方師立饗漢宏于驛亭其黨皆醉遂執漢宏歸越以功董昌奏授雄為德化軍使至是而疾卒戊午五年春正月帝在華州改元光化是月我師救蘇州生擒淮將李近思斬首一千餘級又斬其將梁琮張顒等而楊行密復遣將李蕳率兵五千餘衆屯于無錫我師復攻之獲其遍將陳益等而還餘皆赱之是月王以越州指揮使駱團為台州制置使二月敕移鎮海軍于杭州為理所從王請也又授都押衙董名犯太祖諱上一字等恩命有差秋七月敕授王檢校太師賜㝎亂安國功臣八月車駕還京九月婺州刺史王壇遣將攻東陽王命使諭之息民故也冬十月王遣顧全師率師克蘇州臺蒙李德誠等皆宵遁其下秦裴因力屈而降蘇州平𥘉遣顧全武等攻蘇州淮將刺史臺蒙等皆棄城宵遁獨秦裴守崑山不下全武攻之裴屢出戰復靳侮全武全武怒益兵引水灌城城壞乃出降王曰尓軍弱如此何敢久為旅拒裴曰裴義不負楊公今力屈而降耳王善其言而全武亦請王宥之王從其請而宥之王以嘉興都將曹圭權蘇州制置使尋命為本州刺史是月敕授王兼兩浙安撫使加食邑一千户實封一百户閏十月婺州王壇抗命王遣師伐之而衢州刺史陳岌二于我王復遣顧全武等討之十一月成及至自淮南王亦以魏約等歸淮以報之己未先化二年春正月我師大敗陳岌黨于龍丘二月敕遣髙品周道安改王本縣石鏡鄉為廣義鄉臨水里為勳貴里所居安衆營為衣錦營仍賜兩浙行軍司馬杜稜以下一百二十人並號贊忠去偽功臣三月婺州王壇求救于淮南夏四月敕升杭州為大都督府是月淮師遣將康儒等來應東陽王命副指揮使方密羅聚等濟師于婺州及蘭溪義烏等縣秋七月淮人有使入衢州者為我師殺之仍獲陳岌所送楊氏地圖州印以歸庚申三年春正月淮將康儒徐從皋等復攻婺州王遣從弟銶率師討之三月我師大敗賊徒于軒渚遂絶其糧康儒等由清溪而遁夏五月敕遣中使王金峯齎詔封王為南康王加食邑一千户實封一百户王表陳讓秋八月敕授王行軍司馬杜稜檢校太子太保是月庚申龍鬥于浙江因過于郛郭壞廬舍或吸居人浮空而去數里方墮亦有死者九月王壇奔宣城壇本孫儒隊將儒敗率其黨三千奔睦州陳晟晟頗疑之處于外城未幾壇將降黨與三河鎮將陳嚴攻婺州婺州刺史將環奔會稽壇遂有其地至是而壇奔宣城矣是月辛卯王親巡婺州命浙西營田副使沈夏權婺州刺史壬辰王至自東陽而東陽鎮將王永伏誅永東陽人也在鎮治城壁置鼓角粧樓舞榭甍棟相接又采妖妄立石瑞亭將規本郡及王壇攻之王以前年婺民為安仁義所撓王故遣使諭之壇罷兵將追永歸于府城而壇不從命故伐之事平今責永以不敬故斬之以謝百姓也是月甲午王復巡衢州陳岌降王以岌為浙東安撫副使命顧全武權知衢州事岌兄儒本黃巢之黨尋降朝廷授以饒州光啓三年率其部伍自饒廳事直指衙門而出入無預知者且誡其下曰我自棄他郡州人無負我有殺掠者斬由是市不易肆既而徑趨衢州知州玄泰迎于郊儒詰之曰玄宗御客安在泰泣曰使君不見容矣時信安有玄宗銅容泰毁之故以是為責遂斬之而自據焉凡在信安十年頗有惠愛每秋主司請納稼儒必至城南緑野亭觀其刈獲始使輸之又嘗見吏于倉所輒振衣以避粳秕儒怒而罰之其所為皆類此南海莭度使彭城宗龜道由信安見其品裁乃撫之曰此賊有士人之風儒亦欣然而謝之及儒病時岌入省之因顧岌曰汝非偵我邪今汝仁弱其如諸校何乃召列校豪強者十餘人入卧內皆斬之遂以郡付岌王壇之叛岌實同其惡至是降而宥之也冬十月敕遣中使取王形圗于凌煙閣王命寫容以進十一月庚寅中尉彭城季述與王仲先樞密王彥範等幽昭宗于問安宫立德王𥙿為帝以昭宗為太上皇敕遣使進王為東安王王不受命是月己酉葬皇考太師于安國縣錦北鄉或云義成鄉清風里𥘉太師薨因有淮師葬是以緩按羅氏後集太師志銘曰昔歲乙卯今辰己酉十一月也今以長曆推之十月二十五日乙酉葬太師未知孰是誤之也辛酉天復元年春正月昭宗反正大赦改元出太子𥙿復為德王而彭城季述等皆伏誅是月敕遣供奉官吐突令鐸來宣諭仍賜國信二月王親巡衣錦營大會故老賔客山林樹木皆覆以錦幄表衣錦之榮也命指揮使陳章為衢州制置使夏四月丁丑王親巡東府五月敕授王守侍中進進封彭城王加食邑一千户實封一百户仍升王所居衣錦營為衣錦城封石鏡山為衣錦山大官山為功臣山秋八月敕授邵州刺史王子文穆王禮部尚書遙領邵州刺史九月王以衢州制置使陳章為本州刺史是月壬子皇妣秦國太夫人水丘氏薨冬十月淮將李神福等寇衣錦城王命顧全武方密率師禦之全武等為賊所執楊行密遣李神福等率兵欲圗杭州全武列八寨以拒之神福詭言還師其所獲杭俘赱還者皆不追至暮遣羸兵先行而伏兵青山全武不知其詭奮勇追之伏兵大彂遂𬒳執王聞之驚曰喪我良將也既而神福欲歸又恐為王所􅌽乃遣人守衛王祖考丘隴又令全武通家信王遣使犒之神福受其犒賂而還十一月駕狩于鳳翔王聞之悲泣乃遣使奔問帝嘉之賜王御服夾襖子一副仍降御札于衣襟焉十二月淮人以師老糧之求成而還是月敕王起復雲麾將軍上金吾衛大將軍員外置同正員時王以衣錦城𬒳寇命玄同先生閭丘方逺建下元金籙醮于東府龍瑞宫其夕大雪惟醮壇之上星斗燦然殿宇無所沾灑又有鑑湖宿釣者聞車馬之聲甚衆復有一黑虎蹲于宫門外醮罷乃去鑑湖昔賀知章所居者一名賀湖因犯僖宗廟諱今以唐祕書此湖故名易之也壬戌二年春正月帝在鳳翔三月朔日有蝕之是月癸丑至乙卯三日浙右大雪盈丈雪氣如煙而味苦夏四月淮人以顧全武方密歸我王亦以秦裴報之裴即光化時蘇州降將也是月制加王食邑一千户實封一百户五月敕封王為越王又加食邑一千户實封一百户是月庚戌溫州刺史朱褒卒兄敖代之褒永嘉人也兄誕始為本州通事官屬寇亂兄弟皆聚兵禦以功遂攝司馬及副使胡燔卒乃自據焉褒處兄弟性頗強悖一日輒收兄誕印綬以州屬彭城漢宏署褒以知州事褒耳下有一赤點每怒彂則點移至口怒解如故誕廳吏嘗忤褒褒將殺之其母力救對曰比求郡蓋欲殺此輩耳卒不聽漢宏之亂褒率黨助之尋以同姓結援于梁太祖奏授本州刺史充靜海軍使褒善屬詩文亦好禮士但動不量力故不及丗家滅亡矣秋七月王親巡衣錦城治溝洫八月丙戌將還府城親饗將校武勇都指揮使徐綰即席將謀不利惶懼辭以疾王惡之即日命綰率所部先歸次日王發自衣錦城徐綰率兵已及府城焚掠郛郭上武勇都指揮使許再思以兵迎綰同叛將及內城王子傅瑛亦作元與三城都指揮使馬綽牙將陳為等彂懸門以禦之王次龍泉有馳來告叛者王遂疾行時北郭城門牙將潘長與徐綰遇斬首二百餘級綰退營于龍興寺王微服至德勝門牙將周肅遣禆將鍾審以舟迎王王遂沿江至內城東北登城而入城中莫有知者北門直更卒憑鼓而寐王親斬之衆皆驚悟隨命都監使吳璋三城指揮使馬綽守北門內城指揮使王榮武安都指揮使枉建徽守南門又命指揮使顧全武率兵衛屯東府全武上言曰東府不足往當詣邗溝何者綰必召田頵頵來淮南即興師矣宜早圖之杜建徽言曰楊氏嘗由王脫孫儒之難彼丈夫者豈不能報王邪請以難告王從之命全武行全武曰獨行事必不濟請擇諸公子王曰我嘗欲以元璙聘于楊氏汝當輔而行焉全武遂與同往矣湖州刺史髙彥遣其子渭來赴難趨靈隱山而至為賊伏兵所害命渭所部營于城南髙彥之聞難也亟遣子渭行渭曰今日不利彥曰赴難之急何以吉辰邪遂促渭行渭不敢抗命遂率所部徑趨靈隱山而來至是果敗也九月徐綰果召田頵于宣城頵先遣客吏何饒來致意曰相公請大王東之越城虛府署以相待所貴者兵不血刃耳王復曰軍中叛亂何方無之爾相公不嘗為人長乎反助其逆須徑來何用肆言也既而頵至泊于北門以旗鼓自蔽王登城將與之語俾開旗頵不之答王注弩中其執旗者頵見王城中大鼓噪懼退還營遷逼于西北隅今清波門是也乃使其黨據營以辱王亦注弩斃之頵伺夜復攻西北隅梯橦畢集城中矢石如雨賊墜溝洫者不可勝計頵遂拔營而退十一月頵復具舟楫將渡江絶西陵王命副指揮使盛造朱郁大破之俄而楊行密遣使召頵曰尓不還師我當以宣城授他人矣時行密使至頵營王城中莫有知其意者王曰頵悖而無機倘淂密意必明言其可否王乃使人往覘之頵迎行密來使于半道紅半道紅在北郊舊植桃花之所凡數里並轡而行果與言及罷兵之事覘者回以其言聞皆如王所料也既而頵率徐綰許再思歸宣城王命致犒師錢一百億以送之頵慮為我師所逐遂委質而去𥘉王行至龍泉聞變召李咸占之曰大王霸業方永但分野小災耳請勿為慮不然大王當有疾王曰寧我有疾豈宜害百姓邪王又召葉簡筮之曰賊無如我何王曰淮人將同惡乎蕳曰淮人不來宣城當濟賊季冬方敗而宣城亦當敗于明年今不足慮如期皆驗也而武勇都指揮使徐綰本孫儒之黨來降乾寧中王以守禦功因憊心膂前年錦城之役不用命王頗惡之及是始治溝洫而遂叛焉是月溫州禆將丁章逐刺史朱敖敖奔無諸丁章遂據是郡癸亥三年春正月己巳帝還京師夏四月溫州丁章為木工李彥斧殺之禆將張惠據溫州是月城婺州秋七月睦州刺史陳珣二于我仍率黨攻婺州蘭溪縣王遣指揮方永珍等率師討平之九月宣城田頵安仁義俱叛于淮而淮帥楊行密請師于我王命方永珍率師至京口又命從弟鎰率兵次宛陵以應行密師又命指揮使楊習代方永珍于睦州冬十月我師與淮人生擒安仁義于潤州歸淮帥而斬之田頵死于陳其母奉文穆王歸焉甲子四年春正月帝彂長安三月敕遣衛尉卿許渾來宣諭仍賜國信是月王子元璙與所娉楊氏至自淮南夏四月帝至洛陽大赦改元天祐敕遣給事中鄭祈刑部員外郎楊永休亦作永承進封王為吳王加食邑二千尸實封二百户秋八月昭宗崩太子即位敕遣使來宣告王素服舉哀于軍門是月淮人轞送徐綰歸我王命剖心以祭髙渭冬十月朔日有蝕之是月癸酉大雪平地丈餘乙丑天祐二年春正月制授文穆王等官爵是月淮將閻晊等來據新安王命從弟鎰與指揮使顧全武等禦之我師不利鎰等𬒳執于賊三月廣帥彭城隱始有南海而衢州制置使陳章亦二于我夏四月陳章會睦州兵及淮將陶雅等同攻東陽王命弟鏢率師討之秋八月處州刺史盧約弟佶寇永嘉張惠奔無諸王命方永珍濟師于東陽會師討賊九月陳章陷東陽執刺史沈夏送于淮南夏海鹽人也徐及為監鎮與髙彥隸其中及亦八都之一號海昌者也王副董庶人討彭城漢宏于越州徐及遣夏與髙彥率本部會我師王見之甚恱延入卧內謂曰吾東討之師已衆渡江之役無勞尓輩但徐及平素強梁終非我所蓄以我東討或為後患汝還本營為我殺之皆當以列郡牧汝然吾非誨人為逆者但境土苦于干戈不仁者當盡除之用息生聚耳汝等當識吾意夏等再拜聽命王厚遣之既回告及曰董公與錢公以兵討賊聞將軍以所部見助喜動于色然以東北為慮設有狗鼠偷竊復勞後顧夏等實託將軍以為後據及有軍師竊視夏等謂及曰二校至自錢唐皆有色文在其面將軍宜備之及不聽夏遂與其下謀之一夕竊發及死其下遂分而夏性凶暴不即我歸乃以所淂衆七千餘人聚于臨平山下擇幼弱者盡殺之惟留三千餘人徑往嘉興劫吳公約同入海為剽公約不從將殺之乃扣頭曰惟吾兄之命遂與俱往未幾夏以公約庸懦因放其歸夏所圗無成始復歸王王亦優客之纍從征伐厯奏職官領遙郡至任果以殺戮為事上右指令小不稱意即加屠害王頗惡之夏一日復構私第于北郭制度雄壯侔于公府今北市酒家樓俱夏之第也其長子有過輒手創之王以其噬子兹不恱出為東陽淮將陶雅以兵攻其郡王不急救遂為淮人所執尋遇害陳章自稱衢婺二州刺史復分兵與淮將許野鶴等犯我暨陽野寉之名或云許再思軍中以其多語故號之而與徐綰同惡者乃諸萬成慕野鶴故號其名焉淮南嘗致書于王曰頵事書中俱萬成之名又非許再思也是其驗矣王命楊習逐之一作廬章兵大敗習遂攻東陽冬十月有獸入吳興一角麟趾十一月王命建功臣堂于府門之西樹碑紀㓛仍列賔寮將校賜功臣名氏于碑陰凡五百人是月楊行密殂子渥嗣十二月睦州刺史陳詢奔淮南詢即晟之弟餘杭人也八都建稱清平鎮將因侵睦州而刺吏章緒稱疾以州付之晟在郡十八載而卒子紹權嗣詢黜紹權而自立懼非王命頗不自安屬徐許之亂乃通田頵頵敗詢益懼及王命桐廬縣隸使府復徴軍職遂不聽命而叛至是而奔丙寅三年春正月淮將陶雅率其黨自睦州歸歙是月王親巡睦州時宣州觀察使王茂章為淮人所圗因奔于王王以為鎮東軍莭度副使二月辛卯王至睦州陳章退保衢州婺州平是月丁酉玄同先生閭丘方逺卒方逺其先齊人嬰之後也父閏不仕以文學莭行稱方逺幼辨慧學于廬州道士陳玄悟尋傳法籙于天台玉霄宫葉藏質方逺雅好儒學每披卷得之趨必曰葛稚川陶隱居俱吾之師友也銓太平經為十三萹景福庚戌歲始居餘杭大滌洞𥘉入謁王談莊老之義逡巡而罷退而歎曰彼英雄也是不宜與談玄虛之道者翌日入謁遂陳春秋因延之盡日由是王厚加禮遇重建天柱宫俾以居之王奏請賜𬗋又敕賜號玄同先生一日王于城南樓命方逺圖形前一夕王夢方逺駕鶴至由是王益竒之江東羅隱每就方逺授子書方逺必瞑目而授餘無他論門人夏隱言謂方逺曰羅記室令公上客先生何不與之語方逺曰隱才髙性下吾非授書不欲及他事而隱亦盡師事之禮是日乃降聖莭前一日王使人以香花至方逺受訖乃入齋中作控鶴坐怡然而逝復有異香滿室王以夏隱言繼其住持也一日王命方永珍楊習等進攻衢州三月命浙西營田副使馬綽權睦州刺史夏四月朔日有蝕之洪帥南平王鍾傅殂子匡時嗣六月淮人陷洪州虜鍾氏而歸秋八月衢州陳章導淮將周本吕師造等入其境為我師所逐遂奔淮南章本孫儒之黨尋降于王以從征董庶人功遂𬒳任用天福𥘉始赴本郡王親餞于江干徐綰作亂越州客軍張洪等疑懼乃與其黨三百餘人奔章章納之又屬丁章叛于永嘉而宣州田頵使其下戚滔將招之章因假道而遣王聞之乃密使衢州羅城指揮使葉讓殺之事泄章遂殺讓而叛𥘉王命章城衢州工畢以圗獻王王視西門樟樹謂左右曰此樹不入城陳章當非我所蓄也至是果驗九月周本等率其黨歸信州王命方永珍為衢州制置使是月敕遣右散騎常侍王矩司勳郎中裴均授王吳王册禮冬十一月乙丑湖州刺史髙彥卒子澧嗣彥海鹽人也𥘉與沈夏同受王密旨殺徐及及死以首歸于王彥等前後從征悉有功效及湖州李彥徽棄郡奔淮南王親巡吳興其將沈攸等皆以已功有牧守之望王遂題詩一章于嬰蘭堂在湖州東南溪次末云須將一片地付與有心人衆亦不測王將登舟始言曰我以此郡付汝宜善撫之彥性淳厚居十一載政頗簡便纍奏授職官遙領費州刺史尋至今任將終有道場山僧如訥口能客拳手垂過膝是乃異僧及入州城彥以師事之一日彥與之語決別未幾而卒是月敕命王本道建三代師廟閏十二月王命弟鏢為婺州制置使丁卯四年春三月敕升衣錦城為安國衣錦軍王命文穆王伐溫州夏四月戊午克溫州斬盧佶而還王命都監使吳璋為溫州制置使文穆王復討處州是月梁太祖受唐禪大赦改元開平奉唐帝為濟陰王敕遣上金吾衛將軍石彥辭刑部郎中薛昭序來宣諭𥘉梁室受禪有勸王拒之王笑曰古人有言屈身于陛下是其略也吾失為孫仲謀邪遂受之五月處州盧約納𣢾于我王以為浙江安撫副使命指揮使俞浩為處州制置使是月敕遣金吾衛大將軍安崇隱進封王為吳越王增食邑二千户實封三百户仍賜號啓聖匡運同德功臣𥘉莭度判官羅隱勸王舉兵討梁曰縱無成功猶可退保杭越自為東帝奈何交臂事賊王以隱不遇于唐有怨心其言雖不能用心甚義之王不行六月敕遣中使來宣諭秋七月敕賜王管內刺史並授官爵仍賜母妻封邑八月敕授王兼淮南莭度楊州大都督淮南四面招討制置使九月詔封衣錦軍神祠號崇福侯又賜道士鄭章號名玄章又賜號貞一大師夏隱言賜𬗋並從王請也是月蜀帥王建稱帝國號武成冬十月敕授文穆王金𬗋光祿大夫十二月淮人攻信州刺史危仔昌來求救于我王遣師援之戊辰開平二年春正月敕改臨安縣為安國縣廣義鄉為衣錦鄉夏五月淮南都將張皓殺其帥楊渥將自立為留後逾旬大將徐溫復殺皓立楊渥弟隆演為帥六月制授王檢校太師守中書令增食邑一千户實封一百户秋八月敕改杭州唐山縣為吳昌縣台州唐興縣為天台縣是月又敕升杭越等州為大都督府王送宣州王茂章入京師茂章更名景仁避廟諱也九月制授鎮東軍蓈度副使成及為保大軍莭度使同平章事副使餘如故未幾淮人困圍我姑蘇王命從弟鋸率兵討之己巳三年春正月梁帝遷都洛陽祀南郊大赦二月朔日有蝕之敕選王子兩浙副使傅瑛為駙馬都尉夏四月制授王守太保增食邑二千户實封二百户是月王命弟鏢為海逰奕都虞候何逄司馬福等率師救姑蘇內外夾攻生擒淮將何朗閭丘直等凡三十餘人獲兵甲生口三十萬戰船二百餘艘陳章周本吕師造等夜遁五月甲寅王親巡姑蘇是月丁巳明州刺史黃晟卒晟明州鄞縣人也𥘉應募于望海鎮鎮中立表以選其魁梧者晟以矮陋不中選乃隸鎮都虞候林膺而晟性強幹膺甚德之後潛還本鄊募衆據平嘉埭時權知州事楊僎署晟為平嘉浦將有衆千餘人𥘉彭城漢宏以台州賊婁文知明州事文為楊僎所敗其黨杜宗自寧海鎮鄉民據奉化晟自平嘉埭以所部擊之執杜宗等不殺盡驅之使還台州獲其粟帛悉屬于本道遂為奉化鎮將佽飛都知兵馬使及餘姚鎮將相嘉侵越州董庶人禦之不利而刺史鍾季文乃遣晟領兵攻相嘉擒殺之董庶人奏授晟左散騎常侍充浙東道東西副指揮使鍾季文卒遂有本郡晟頗尚禮士辟前進士陳鼎羊紹素以為門賔江東儒學多依之悉加優待仍築其居號曰措大營及董庶人僣偽晟亦移書諭之及王師舉晟亦率衆應之在任十有八年遺疏不請其子為嗣凡府庫所蓄必題曰送使其忠順如此辛酉王自姑蘇復如東府辛已復巡明州因城㝎海鎮命子元為明州制置使信州危仔昌為其下應淮人而叛遂奔于我王以為淮南莭度副使六月壬寅王彂明州敕遣刑部郎中姚洎禮部員外郎羅衮授王吳越王册禮戊申至自東府王之巡句章也行次餘姚丈亭鎮舟湊巨石不能進既而大雨震電有二龍負王舷之下鎮遏使翁元軻拽舟而進二龍自舷而升焉此其異常也邪秋閏八月制授王守太尉加實封二百户制曰集非常之事必有挺非常之才建苐一之功必有居第一之位朕膺圗受命負扆開階未嘗以真太尉之官輕于擬議大司之職易于蕳求蓋由其品爵尊其任重不有英佐孰當異恩啓聖匡運同德功臣淮南鎮海鎮東等軍莭度使淮南浙江東西等道管內觀察處置充淮南四面都統營田安撫兼兩浙鹽鐡制置彂運等使開府儀同三司檢校太師兼中書令杭越等州大都督府長史上柱國吳越王食邑一萬五千户實封一千户錢海嶽騰英星雲誕秀契君臣咸一之德有文武兼備之才宣慈惠和忠正廉毅敦詩説禮樹百行于藩籬去暴除姧敵萬人于幃幄弼豫興運明乃嘉謨頃屬淮夷不賓王化自尓益封吳會兼鎮廣陵追擒每盡于隻輪覆溺速收其巨艦復聞姦宄屢優巡封謂天蓋髙若水可恃尓又橫戈憤悱獨力支梧妙算神機大殱戎醜玄雲陳起雄風驅下瀨之師白露圍開沴氣散常州之化再安生聚重復土疆薛公之三刺咸明漢主之一竒斯在况早攀鱗翼備見肺腸同德同心二紀密參于締構惟忠惟孝四方咸則其儀型苟非劇恩何以加賞是用鏤于彜鼎册以輅車擬吕望之尊崇正列矦之貴重仍加真食復寵兼官式是奬酬且旌忠烈於戲進以正大易所以經邦慎厥終格言用之居位勉思遵守克荷寵靈服豫訓辭錫尓繁祉可守太尉加實封二百户餘並如故是月敕置蘇州吳江縣明州靖安縣今㝎海縣是也從王請也冬十月湖州刺史髙澧二于我遣其黨焚燒義和臨平等鎮王命弟鏢帥師討之十一月乙酉彂運使羅隱卒隱字昭諫新登縣人也祖知微福唐縣令父修古應開元禮隱本名橫凡十上不中第遂更名𥘉從事湖南厯淮潤皆不得意乃歸新登及來謁王不見納遂以所為夏口詩標于卷末云一個禰衡客不得思量黃祖謾英雄之句王覽之大笑因加殊遇復命蕳書辟之曰仲宣遠託婁􅍮州都緣亂丗夫子辟為魯司寇只為故鄉隱曰是不可去矣簡辭孔目官章魯風之詞也王𥘉授鎮海莭度時命沈嵩草謝表盛言浙西繁富成以示隱隱曰今浙西兵火之餘日不暇給今朝廷執政方切于賄賂以表執政豈無意于要求邪乃請更之其略曰天寒而麋鹿常逰日暮而牛羊不下朝廷見之曰此羅隱詞也及為賀昭宗更名表曰上則虞舜之全文右則姬昌之半字當時京師稱為苐一隱性不喜軍旅唯與丞相杜建徽善王𥘉城西府命賔僚巡覽顧謂上右曰百步一敵樓足以言金湯之固隱徐曰敵樓不若內向及徐許之亂人皆以為先見一日隱寢疾王親臨撫問因題其壁云黃河信有澄清日後代應難繼此才隱起而續末句云門外旌旗屯虎豹壁間章句動風雷隱由是以紅紗罩覆其上其後果無文嗣隱纍官錢唐縣令尋授鎮海軍掌書記莭度判官鹽鐵彂運使副授著作上郎司勳郎中厯遷諫議大夫給事中賜金𬗋卒年七十七歲所著江南甲乙集淮海寓言及讒書後集並行于世𥘉新登鼉江常有二氣亘于江上晝夜不滅及隱洎丞相杜建徽生而二氣不復見識者以為文武秀氣焉庚午四年春二月湖州髙澧導淮將李簡陳章等入其境都將盛師友沈行瑜閉城不納王遣子元璙濟師禦之淮人挾澧而遁澧髙彥苐三子也𥘉彥夢一羽人持劍入卧內彥驚問其故羽人曰我來為君之子報數千人冤耳其母自是而孕不足月而生澧年十三四性即暴虐及嗣父位恣行殺戮將吏侵晨入衙必與妻子訣別而入每登清暑樓眺望則州城東西水陸行人亦皆絶迹澧夜義精也嘗請太常博士丘光庭校書于樓中澧亦嘗往觀之一日澧履襪而登光庭不知因回顧見一青面鬼遂大呼俄而見澧密言曰博士慎勿言是驗之也又召鄉丁為衙軍號儕要都皆文其面衣青衫白袴緋抹額凡所指令必躬身仰首如夜義之狀刀鎗弓矢常居上右又令州人皆黥面約三日當畢過限則誅澧則以畫面而傅以乾粉州人既黥澧乃洗去晚年將敗召郡吏議曰我欲盡殺百姓可乎吏對曰百姓租賦所出殺之無可取供給願求他可殺者時親紀二丁軍三千餘人會有言其怨嗟者集于開元寺紿曰將饗汝因閉三門之半而納之入者旋殺逮半在外者方覺因奔逸縱火為亂澧聞盛怒閉城大索戮之無遺王以其凶虐滋甚將伐之由是而叛先是道場山僧如訥以髙彥將死與其訣別退而謂其衆曰髙公將殂我亦當逝何者蓋有白面夜義治此政矣尓輩亦宜避之俄而澧代其父白面者蓋澧未黥面耳澧至淮南屢取娼姬入其私室殺而食之時王將戮之至是叛遂為淮人所害三月癸巳王巡吳興命弟鏢為刺史癸卯至自吳興夏五月奏改西府富陽縣為富春縣東府暨陽縣處州松陽縣為長松縣秋七月詔原前監軍周廷詰已下二十五人時有詔誅之王以其自前朝將亂求出避禍非彭城季述之黨請以原之遂有是命也八月始築捍海塘王因江濤衝激命強弩以射濤頭遂㝎其基復建候潮通江等城門𥘉㝎其基而江濤晝夜衝激沙岸板築不能就王命強弩五百以射濤頭又親築胥山祠仍為題詩一章亟鑰置于海門其略曰為報龍神并水府錢唐借取築錢城既而潮頭遂趨西陵王乃命運巨石盛以竹籠植巨材捍之城基始㝎其重濠纍塹通衢廣陌亦由是而成焉冬十月戊寅王親巡衣錦軍製還鄉歌歌曰三莭還鄉衣挂錦衣碧天朗朗兮愛日暉功臣道上兮列旌旗父老逺來兮相追隨家山鄉眷兮會時稀今朝設宴兮觥散飛斗牛無孛兮民無欺吳越一王兮駟馬歸其雄辭壯氣實大風之儔也丙戌至自衣錦軍命湖州都將盛師友權婺州刺史命斬湖州巡校將沈行思𥘉髙澧將奔而師友行思同有閉城之功王巡吳興乃命師友從行而行思頗有牧守之望乃謂其同職陳環曰盛君來豈不佩印綬而歸邪不然我後安處子為我裁之時環已淂密旨俾遣行思歸國乃紿之曰二人之功本無優劣然王情尚未可測宜亟詣府城面較功績以決其可否行思遂來覲王亦優待之環以送行思家纍至行思始悟其事深銜環遂懷怨望王將及國城行思與陳環俱候于北郊行思自取巨槌擊殺環環奔王舟以陳其前功復言師友與環毁間之狀時師友方從亟引之以相證行思輒奪威鎗將刺師友上右遂擒之王曰吾早以汝強梁故不欲任始念汝閉城之效將牧之他郡而今所為若此疇能容之乃命斬于龍丘山許其家屬收葬而師友遂有是命辛未五年春正月丙戌日有蝕之夏四月制命王守尚書令兼淮南宣歙等道四面行營都統增食邑二千户實封一百户敕遣刑部侍郎李光嗣建王生祠于衣錦軍敕翰林學士李琪為碑文時從寮吏將校衆所請也五月朔梁改元乾化是月築松江南北二城鎖柵畢備設險故也秋七月敕命淮南兩浙幕府將吏五百人並賜贊正安國功臣九月梁主如相州冬十月湖州刺史王弟鏢殺防戍指揮使潘良懼譴遂奔淮南十一月梁主還京是冬廣帥彭城隱殂弟巗嗣壬申乾化二年夏閏五月朔日有蝕之梁主入洛六月梁主遇弒郢王友圭僣位秋七月遣刑部尚書李皎尊王為尚父八月己丑城西陵癸酉三年春正月友圭改元鳳曆肆赦二月均王友貞舉兵誅友圭遂即位于汴京更名瑱復稱乾化敕遣供奉官楊彥賔來宣諭三月敕授王尚父册禮夏四月制增王食邑三千户實封二百户淮將李濤率兵二萬自千秋嶺寇我衣錦王命文穆王討之生擒李濤等八千餘人王又命子元璙帥水師攻東州又獲賊將李師愈姚延環等三千餘人而還五月淮將花虔渦信等率兵五千餘人會屯于宣州廣德縣將復寇衣錦軍復命文穆王討之六月師克廣德縣獲花虔渦信及吏卒七千餘人而還是月辛卯彰義軍莭度使檢校太尉兼侍中成及卒及字弘濟錢唐縣人也祖克評嘉王府長史父貞國子博士及性淳厚為鄉里所重咸通中戊戌間捍山賊逐齊寇聱名遂振及八都浸盛復分十三都以富春鎮為靜江都將屬彭城漢宏作亂與王同事攻討漢宏平北關鎮將彭城孟安謀亂即席奮劍將犯王及舉胡床制之偏將盛造因執孟安􅈬戮以功奏遷散騎常侍復為靜江鎮光啓中潤州薛朗叛王命及討之時常州刺史丁從實具牛酒以犒我師仍遣美女于諸將及取而斬之餘悉不納因克之尋平潤州王奏及授兵部尚書充常州防禦使潤州阮結卒命及代之纍遷檢校司空尋為蘇州刺史乾寧時淮人圍姑蘇常熟鎮將陸郢巡檢郭用與其黨趙邯以其城應寇邯手刃其母妻子以盟城陷及以禮見楊行密行密閲及府庫私室皆藥物圗書而已由是重之至淮南辟為行軍司馬及拒之曰及以百口託于錢唐不幸城陷于叛以至于此豈宜復以本道符竹援富貴于鄰境不惟丞相不可百口其謂我何乃引佩刀自刎行密遽止之因厚禮而歸焉纍署鎮海軍莭度副使奏授司徒至太傅天復中王巡衣錦軍命武勇都將士以治溝洫軍中多怨言及慮有變亟請罷役王不聽俄而作亂及護王駕回至北郭王微服將入城及乃代乘王車行與賊鬥王遂得入王性嚴急每有所檢彂必亟加斬決或及至王雖盛怒必為之解其寵遇皆此類也纍奏授贊正安國功臣保大彰義等軍莭度使開府儀同三司檢校太尉贈太師兼侍中卒年六十七冬十月敕加文穆王開國爵邑是月乙酉大同軍莭度使駙馬都尉王子元瑛卒瑛王長子也母吳越國莊穆夫人吳氏原名傳鍇後更名焉性英敏頗尚儒學聚書千卷善草隸好施時徐綰之叛城中有錦工二百餘人皆潤人也瑛慮其為變乃命曰王令百工悉免今日工作遂放出城而發懸門王入城聞其事頗嘉之尋為兩浙副大使梁太祖拜為駙馬都尉纍授大同軍莭度使同平章事公主未及降而薨年三十六敕贈太師十二月王命子傳璙權蘇州刺史甲戌四年夏六月制授文穆王開國侯食邑秋七月廣帥彭城巖遣供軍巡官陳用拙奉禮幣請兄事王王納之九月命文穆王率兵攻常州無錫縣獲將卒五百餘人而還乙亥貞明元年春正月朔改元大赦是月敕授文穆王以下官爵有差甲午王親巡衣錦軍二月敕遣給事中韋彖金部郎中李發選王子傳珍為駙馬都尉閏二月己亥王至自衣錦軍丙子二年春正月敕授浙東營田副使常州刺史杜建徽為涇源莭度使王命建徽護送傳珍進京師尚夀春公主遂授此任秋七月敕授王為諸道兵馬元帥冬十二月王命恩州防禦使弟鏵率官吏僧衆詣明州鄮縣阿育山寺迎釋迦舍利塔歸于府城仍建浮圖于城南以致之浮圖凡九層八面髙三百七十尺中外皆通旋繞其制度形勢皆出王之心匠焉丁丑三年春三月敕授王子贊正安國功臣鎮海軍北面水陸都指揮使金𬗋光祿大夫檢校太保守湖州刺史大彭縣開國子食邑五百户傳璟贊正安國功臣鎮東軍莭度副使土客諸軍都指揮使兼北面行軍招討光祿大夫檢校太保守蘇州刺史大彭郡侯食邑一千户傳璙贊正安國功臣鎮海軍莭度副使土客諸軍都指揮使金𬗋光祿大夫檢校太保大彭縣開國侯食邑一千户傳球贊正安國功臣鎮東軍東面水陸安撫都指揮使光祿大夫檢校太保守溫州刺史大彭縣男食邑三百户傳璲贊正安國功臣鎮東軍西面安撫都指揮使光祿大夫檢校太保守睦州刺史大彭縣男食邑三百户傳璲贊正安國功臣鎮東軍親從都指揮使兼土客諸軍安撫副指揮使銀青光祿大夫檢校司徒守竇州刺史傳贊正安國功臣鎮海軍上右廳都指揮使兼土客諸軍安撫副指揮使金𬗋光祿大夫檢校司徒前明州刺史元球贊正安國功臣衣錦軍防遏都指揮使金𬗋光祿大夫檢校司空守義州刺史傳㻑贊正安國功臣鎮海軍衙內先鋒指揮使金𬗋光祿大夫檢校司空守峯州刺史傳珦贊正安國功臣鎮海軍節度上押衙充安國衣錦軍親從副指揮使兼兩直都虞候金𬗋光祿大夫檢校尚書右僕射守巒州刺史傳琰贊正安國功臣鎮海軍莭度右押衙充上直都知兵馬使銀青光祿大夫檢校尚書上僕射傳璛等十一人各授官秩階爵及遙郡有差夏四月詔諸道兵馬元帥府開幕除吏一同天䇿上將軍府故事是月復以峯州刺史傳珦守檢校太尉餘如故冬十月敕遣吏部尚書李燕中書舍人韋説授王天下兵馬都元帥是月黃龍見于卞山之金井洞命立瑞應宫一作祥應宫戊寅四年春三月朔四星聚斗置元帥府僚等官敕授兩浙行軍司馬秦州莭度使平章事馬綽守檢校太尉同平章事行軍餘如故夏四月廣帥彭城巖僣稱大漢皇帝年號大有進士王詡之在南海著昭陽賦一萹序曰皇帝基構乾坤十有八歲矣甲子春始作兹殿計其甲子則巖本年僣號今據皮氏舊録而書之云前年丁丑僣號其誤明矣六月西川王建殂子衍嗣改元乾德是月王命子元球守衢州刺史命鮑君福等率兵攻信州斬淮將李師造生擒偏將馮一一作敏等一千餘人刺史周本僅以身免秋八月制授涇源莭度使杜建徽守檢校太傅同平章事冬十二月淮人圍虔州將絶我貢路刺史盧光儔來告王命徴兵援之未及境而虔州拔矣航海入貢自此始也己卯五年春三月敕文穆王伐淮南夏四月淮帥楊渭又名隆演僣稱大吳皇帝年號武義文穆王率師與淮人戰于狼山之江大敗淮人斬賊將百勝軍使彭彥章生獲士卒七千餘人制以湖州刺史大彭縣開國子王子傳璟為宣州寧國軍莭度使同平章事秋七月我師復攻毗陵因戰于無錫指揮使何逄吳建死之遂班師八月淮人以狼山之敗遣偽客省使歐陽汀來請通好王納之息民故也自是休兵民樂業二十餘年九月朝廷以南海僣號詔我師伐之制曰朕聞綱紀亂常前王無赦懲惡勸善有國不私苟罪惡以顯彰在刑名而何逭其有身當間關寄受國恩敢行不軌之心具驗速辜之迹頒行典憲仍命誥清海海建武等軍莭度使嶺南東西道觀察處置供軍糧料市舟等使開府儀同三司檢校太保兼中書令持莭都督廣州刺史上柱國南平王食邑五千户彭城巖頃因乃父發迹本藩尋賴其兄致身賔席受先朝之拔擢極上將之寵權念其尊奬之誠許繼藩宣之任巖乃自行軍之職繼膺推轂之恩秩進三師位同四輔自朕獲承大寶纍進崇資一門無比其超榮百丗豈疇其寵耀而敢飛章不紀希寵無厭始求抑絶四鄰後請封王南越貪叨斯甚踰僣莫偕朕每含容再申優渥授之秉鎮加以南平比罔思知足益恣凶狂妄稱漢室遺宗欲繼尉他醜迹結連淮海阻塞梯航徒惑逺方僣稱大號在人情而共棄豈天道以能容宜命討除用清逆亂爾天下兵馬都元帥錢志扶廟社任總兵師每興激憤之辭碩舉誅夷之令是用俾豫元老平彼叛臣先行奪爵之文爰舉摧凶之典其彭城巖在身官爵並宜削奪仍委指揮征討於戲將相重任子孫殊榮不能常守于藩修而乃自干于國典指凶殘而必取念染汚以將新非我無始終之恩蓋尓有滿盈之罪凡百珍重悉體朕懷王雖受命而山川隔越地方擾攘請以事寢冬十一月丁亥吳越國正德夫人吳氏薨夫人臨安縣人也父仲欣浙西觀察判官纍贈吏部尚書𥘉王議婚吳氏以王豁達大度不事産業將不許而吳氏父有知人之鑒因促成之及歸室閨門整肅孝敬如禮王性嚴急嘗怡顔以諫之撫愛諸子無分彼此之親纍封燕晉二國至吳越國正德夫人王女捨出家因建奉國寺成夫人將逰之王乃命帛百匹以備散施夫人曰妾備嘗機杼之勞遽以逰賞費之非念人之道遂不受而罷其行其仁慈莭儉如此薨年六十二歲夫人諡曰莊穆有子十三人庚辰六年春二月敕授宣州莭度使同平章事王子傳璟以以下並起復雲麾將軍上右金吾衛大將軍員外置同正員餘並如故三月王命元帥府判官皮光業使于邗溝夏五月淮南楊渭殂弟溥嗣偽諡渭為宣皇帝秋七月王以子睦州刺史傳懿為婺州刺史辛巳七年春三月王從弟鎰至自淮南王亦歸李濤以報之鎰以天祐二年睦州之役為賊所執李濤以乾化三年來寇我衣錦軍擒之至是各歸焉夏五月朔梁帝祀郊改元龍德六月朔日有蝕之秋七月潭州椘王馬殷遣掌書記李峴馬匡送女歸于都知兵馬使檢校尚書上㒒射王子傳璛冬十月制授文穆王檢校太傅同中書門下平章事充清海軍莭度使自是賜王書詔不名壬午龍德二年春正月敕授文穆王以下並起復官爵邑有差秋七月王建天下元帥府于吳國門之右八月兩浙行軍司馬秦州雄武軍莭度使同平章事馬綽卒綽餘杭縣人也性氣淳直與王同事董昌昌嘗使王閲部伍亡其名籍王因厯唱之存亡健悴者無所遺失綽密謂王曰老氏忌前駭此強記必相惡乃以白籍紙數幅授王若代軍籍者由是頗德之王因以從妹歸綽綽尋隨董氏于越及董僣號綽棄家先奔于王乃舉奏授諸城都指揮使徐綰之亂綽有發懸門之功王尋命文穆王納綽女是為恭穆夫人綽纍職鎮東軍莭度副使兩浙行軍司馬睦州刺史王奏授秦州雄武軍莭度使同平章事卒年七十一是冬一日王晝寢夢青衣人捧簿書于前告曰大王明年錢塘官滿及寤頗惡之明年天子乃命王封册中外皆如列國之儀其兆明矣癸未三年春二月敕遣兵部侍郎崔􅎡一作協刑部員外郎夏侯昭册封王為吳越國王受封册建國之儀一如典禮先一日雨雪王命李咸將卜他日咸曰大王雙受封册惟天所相雨雪必霽則可以卜社稷之延永王從之即夕果星斗明麗翌日遂成其禮王建國儀衛名稱多如天子之制惟不改元置百官丞相客省等使四月唐莊宗即位于魏州大赦改元同光是月梁亡駕入洛陽因都焉邗溝入賀京師上書稱大吳國主乾寧中有耕者得傳國璽以獻于王王謂非人臣家所宜蓄至是獻焉五月敕遣宣諭使通事舍人吳韜赱馬自淮甸玉賜王名馬玉帶香藥等先是梁室詔敕不名至是依前不名亦曰吳越國王焉冬十月朔日有蝕之十二月唐帝遷都洛陽甲申同光二年春二月唐帝南郊大赦三月癸卯金吾衛大將軍員外置同正員檢校司空明州刺史王子傳卒王苐八子也母濟南郡夫人童氏性仁厚明敏好學治郡自得政體纍授鎮東軍親巡都指揮王客諸軍安撫使光祿大夫竇州刺史奏授金吾大將軍員外置同正員檢校司空改明州刺史餘姚侯終年三十惜哉秋七月西川王衍稱大蜀皇帝致書于京師八月王遣使入貢冬十月制授王依前天下兵馬都元帥尚父尚書令吳越國王授文穆王檢校太師兼中書令充兩浙莭度使觀察留後十一月升蘇州為中吳軍制授鎮東軍莭度檢校太保兼中書令大彭郡侯王子傳璙一作元璙充中吳軍莭度使乙酉三年春二月南海入賀京師上書自稱大漢國王夏四月朔日有蝕之秋八月敕遣正議大夫守尚書上柱國贊皇縣開國男賜𬗋金魚袋李德休等持莭備禮賜王金印玉册及沿身禮物衣冠劍履等册曰惟同光三年歲次乙酉八月辛酉朔二十七日丁亥皇帝若曰王者惠濟黎元輯寧方夏重名器任股肱忠而能力則禮崇賞不失勞則人勸所以啓周公之土宇列漢祖之膏腴者録彼茂勳置諸異數登進賢哲輝耀事功者也天下兵馬都元帥尚父尚書令吳越國王錢朝海靈源承天峻嶽以英風彰德望以勇氣贊忠貞往因義舉之徒盛推韜略遂著襲封之績髙步籓維挺魚鯤鳥鳳之姿擁岸虎水龍之衆居方面任將五十年宣導休聲攘除凶醜摧堅奮鋭鄙許東固圉之謀阜俗頒條廣冀北安居之頌環塹浙江之要雲滋星紀之墟閲禮敦詩位崇元帥前茅後徑名重中權守畫一之規奉在三之莭信立靡移于風雨義行曷倦于津塗效珍則那顧險艱薦幣則常歸宰府振英濆而端右弼鍾懿號而異列藩可謂職貢不之梯航時至翼戴天子加之以恭也載念尊奬爰示徽章今遣正議大夫守尚書吏部侍郎上柱國贊皇縣開國男食邑三百户賜𬗋金魚袋李德休使副朝議大夫守起居郎充史館修撰賜緋魚袋聶與持莭備禮胙土苴茅册尓為吳越國王於戲地奄數圻賦過千乘墨守􅛶閭之境範圍句踐之封子弟量才序進多分于􅙺戟土疆漸海方輸豈限于魚鹽貴盛富強雖古之封建諸侯禮優夾輔不加于此慎厥始終無以位期驕無以欲敗度欽承賜履協豫一人汝嘉時唐帝將議恩命于王顧群臣曰朕從黌堂即聞尚父之名宜以優禮尊之命備册禮有司仍備竹册銅印唐帝曰尚父元老不當待以人臣况己封建乎乃賜玉册金印仍以紅𫀆御服一副賜焉九月王大舉兵師伐蜀冬十一月蜀偽主王衍降是月制授王客諸軍都指揮檢校太保兼鎮海軍莭度副使王子元球守檢校太尉兼侍中充靜海軍莭度使是月閩王王審知殂子延翰嗣自稱閩國主丙戌四年夏四月戊寅王不康如衣錦軍命文穆王監國是月莊宗崩明宗即位大赦改元天成秋七月庚寅王至自衣錦軍八月朔日有蝕之九月制加文穆王食邑一千户實封一百户又授中吳軍莭度使王子元璙開府儀同三司加食邑五百户冬十二月制授靜海軍莭度使王子元球開府儀同三司食邑五百户是月建州刺史王延稟殺其弟延翰而立泉州刺史延均于福州延稟乃延均之庶兄也同起兵攻殺延翰延稟乃立延均于福州而延稟歸建州矣是歲大水蘇州尤甚水中生米大如豆民取食之丁亥天成二年春正月唐帝更名亶六月椘武穆王馬殷建國秋八月朔日有蝕之冬十月車駕如汴是月淮南偽丞相東海徐溫卒子知誥嗣十一月吳王楊溥稱帝戊子三年春二月朔日有蝕之敕遣監門衛上將軍烏昭遇賜王湯藥國信等閣門通事李韞授文穆王鎮東軍莭度使夏六月己來大旱有蝗蔽日而飛晝為之黑庭户衣帳悉充塞之王親祀于都會堂是夕大風蝗墮浙江而死都會堂即白太傅居易之虛白堂基也王重建之號八會亭江東羅隱為之記以王平吳定越講武計議凡八會于此故名之後更名都會堂也秋七月己巳忠獻王生己丑四年春二月制授文穆王杭越等州大都督府長史增食邑實封中吳軍莭度使王子元璙增食邑五百户實封一百户靜海軍莭度使王子元球兼中書令餘並如故椘州升為順化軍以明州刺史王子元珦為順化軍莭度使秋七月台州大水請軍儲三十萬斛八月己酉今大元帥吳越國王王孫弘俶生是月明州餘姚縣修舜井獲古佛舍利數十粒兼有珠玉竒玩王命內衙指揮使徐仁綬近侍閭丘稔往迎之因建浮圗于城北一如城南之制九月因樞密使安重誨兄弟用事于朝嘗要求不克乃矯制以王為太師致仕仍賜烏昭遇自盡先是烏昭遇之來使也有供奉官韓玫承王子元球恩命至玫性凶愎因恃酒凌昭遇由是有隙王以其辱君命止以常禮遣之玫還京師遂搆昭遇于樞密安重誨重誨以昭遇失使臣之禮而亦慊王以要求不克誣王不禮君命遂同讒搆命王致仕賜昭遇自盡王命文穆王奏雪其事奏不淂通乃以絹書上之天子始得聞焉出安重誨為河中莭度使是歲所在地震居人有壞廬舍者庚寅五年春二月唐帝南郊天赦改元長興元年夏五月制授文穆王已下食邑實封郊禋普恩也六月朔日有蝕之冬十一月椘王馬殷殂子希聲嗣辛卯長興二年春二月敕遣監門衛上將軍張籛兵部郎中盧重賜王國信湯藥起王致仕復元帥尚書令吳越國王如故依前不名仍示安重誨矯誣之罪其敕略曰天下兵馬都元帥尚父尚書令吳越國王錢久列王公恆輸愛戴朕方禮加元老恩遇逺方安重誨掇彼瑕疵遽行阻絶退其權勢彼使錢元􅗕拜闕上章傾懷請罪言皆激切事且憑虛盡由尓介蠆之心有誤我含客之德情不可恕罪不可逭宜出為河東莭度今已誅之以雪其冤故告秋七月有象入信安境王命兵士取之圈而育焉八月建州王延稟子繼升繼倫奔于我蓋其父為延均所害也𥘉審知薨延翰嗣位以延稟為建州延均為泉州延均不恱而延稟亦憾于延翰于是泉建同起兵攻福州殺延翰遂立延均于福州延稟歸建州將行謂延均曰善紹先人基業勿煩我老兄再至延均聞之􅍭憾至是將圗延稟乃詐言已死使軍吏迎取延稟乃于其子繼雄仍執延稟入城延均曰果煩老兄再至矣延稟瞪之而就戮繼升繼倫自建聞難而奔于王焉冬十一月朔日有蝕之壬辰三年春二月遣吏部侍郎盧詹刑部郎中楊薰賜王國信湯藥等三月己酉夜大雪王薨于正寢年八十一在位四十一年朝廷聞訃廢朝七日哀悼不已詔曰天下兵馬大元帥尚父尚書令吳越國王錢本朝元老當代勛賢位已極于人臣名素髙于簡册贈典既無其官爵易名宜示其優崇冝令所司㝎諡曰武肅詔工部尚書楊凝式為碑文夏四月庚午奉靈輴殯于衣錦軍應順元年甲午春正月壬午敕葬王于安國縣衣錦鄉即錦北鄉茅山之原即今臨安縣也王始在軍中未嘗自安每欲暫憩必先整衣甲盥漱而後寢焉又以圎木小枕綴鈴睡熟則欹由是而寤名曰警枕又置粉盤于卧內有所記則書之及撫鎮二國殆及四紀勤勞恭儉始終如一致每夕必列侍女各主一更戒之曰外有報事當振鈴聲以為警省凡有聞報即時而遣又嘗以彈丸墻樓之外以警宿直者使其不寐以應其事又嘗微行夜扣北城門吏不肯啓關曰大王來我亦不啓王乃自便門而入明日召吏厚賜之稍暇則命諸子孫諷誦詩賦或以所製詩什賜于丞相將吏以下由是往往達旦天福中近侍李詠因監契丹驛中有判官謂李詠曰武肅王嘗夜不睡詠詰其所知答曰嘗聞五臺王子太師言浙中不睡龍今已歸矣訪其所聞乃壬辰之後也王少時倜儻有大度志氣雄傑機謀沉逺善用長矟大弩又能書寫甚淂體要有知人之鑒及通圖緯之學每處衆中而神形有餘純孝之道稟于天性每春秋薦享必嗚咽流涕嘗曰今日貴盛皆由積善所致但恨祖母不能見耳嘗于後建層樓皇妣春秋髙不能上王親負而登焉天祐已後中原多事西川王氏稱蜀卭溝楊氏稱吳南海彭城氏稱漢長溪王氏稱閩皆竊大號或通􅊚戚或達娉好皆以龍衣玉册洎書疏等勸王自大王嘗笑曰此兒輩自坐爐炭之上而又踞于上邪吾以去偽平賊承天子疇庸之命至于封建車服之制悉有所由豈圗一時之事乃隨波于尓輩也皆却之而不納而諸國之主無不咸以父兄事之王加以自奉莭儉衣服衾𬒳皆用紬布非公宴唯瓷尊􅃮器而己恭穆夫人嘗以王寢帳墮裂乃上青絹帳請易之王曰作法于儉猶恐其奢但慮後代皆施錦繡耳此帳雖故猶可蔽風竟不易後庭有鄭氏其父嘗以罪當死上右冀其或宥且言斯人有息女與侍王命出其女而後斬之顧上右刑者曰公柄豈可以一婦人而亂我法邪又嘗夕宴諸王子及諸孫命鼓胡琴未數曲遽止之曰外聞當謂我不恤政事為長夜之飲宴遂罷王自開創以來至于底定而撫字將帥洎行伍莫不盡淂其歡心有勳將何逢殁于賊中一日王見其所乘馬悲泣不能止上右莫不感激論曰王挺命丗之才屬艱難之運奮臂起義所向披靡以寡敵衆黃巢不犯其封仗順伐逆漢宏至于授首誅逐帥之薛朗遂申屬郡之禮平作偽之董昌不違本朝之命加以禦淮戎以耀威奉梁室而示略回江山之深險致都邑之宏麗七者克備五福是臻故八輔地圗三授天册揔四海之戎柄為一人之父師威名赫然霸業隆矣然後內敦恭儉外正刑賞安民和衆保㝎功勳文臺掘起于江東玄德雄據于巴右比之金德固不足同年而語哉吳越備史卷第一
