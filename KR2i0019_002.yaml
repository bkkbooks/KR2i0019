  text: 吳越備史卷第二
  hash: sha256:85bb5b9555b9b2a715bf179c17067e3d9d74eabcaf0c5bd94a4bc426bb38f0a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0019_SBCK_002-1a}
body:
  text: 武勝軍莭度使掌書記范坰武勝軍莭度巡官林禹撰文穆王文穆王諱元􅗕字明寶武肅王第七子也母晉國昭懿太夫人陳氏唐光啓三年丁未冬十一月十有二日生于杭州之東院先是有胡僧持一玉羊大可數寸光彩異常以獻武肅且曰得此當生貴子王果以丁未生焉乾寧元年二月授鹽鐵發運巡官奏授金部郎中賜金𬗋天復元年八月改授禮部尚書遙領邵州刺史九月壬子王祖妣秦國太夫人水丘氏薨二年徐綰許再思搆宣城觀察使田頵同劘我壘頵敗率徐綰再思回宣州慮我師逐之乃懇質武肅王王厯選諸子不應命時王尚幼請行莊穆夫人聞之泣曰置我兒于虎口也玉曰亡身以紓國家之難亦足以報劬勞耳雖死無恨乃再拜而出武肅王竒而送之王自北門躡繩梯而下以赴頵營𥘉頵附于淮人及還宣城而頵叛淮帥會我師以攻之頵每戰不勝歸必求王將肆其毒頵母老且賢常加保護天祐元年十月我師與淮人攻之甚急頵將出戰乃曰今日不勝必殺錢郎其母目而送之且曰鼠輩死不旋踵矣是日果陷于宛水橋為亂兵所殺賊衆尚優我師提頵首以示之賊衆遁散頵母遂奉王歸我師衛而歸焉二年春正月制授王檢校右僕射八月處州刺史盧約弟佶寇永嘉開平元年正月武肅王命王伐永嘉四月斬盧佶而還時盧佶列巨舟四十艘于清澳海門以􅌽我師王謂諸將曰賊之鋭卒盡在此矣宜勿與戰當有他道徑襲賊壘出其不意必成􅨛也于是由安固江登陸而襲之佶由是就執師還承制改王衙內都指揮使檢校尚書右僕射冬十月授王金𬗋光祿大夫檢校司空五年秋七月賜號王贊正安國功臣進授司徒守湖州刺史乾化三年夏四月淮將前吉州刺史李濤率兵二萬自千秋嶺寇我衣錦軍武肅命王率師討之王以山谷迂僻乃盡伐樹木絶其歸路為三覆以待之時江南國主徐知誥在賊中與王騎相逼僅獲之俄而知誥易服乘白騾而竄壬辰獲李濤及偏將咸知進等八千餘人兵甲生口稱是是行也王營中有氣如龍虎之狀賊中望之有曰此霸者之氣也五月王復率騎兵攻宣州廣德縣城未拔有登城詬辱我師王怒奮擊之六月已卯城陷王手刃二百餘人藉藁而行獲將花虔渦信及吏卒七十餘人殺戮凡二萬四千而還先是有日者視王曰公手刃百人當大貴時又有僧名自新常衣紙住廣德山院王至衆皆遁而自新巍然晏坐軍中有詰其不去者自新曰前後上右皆兵耳去將安適時王自衆中自新忽見之乃斂衣奉迎與語久之及王還遂載而歸後王問自新當時何以見識自新曰微僧無他術但觀王在萬衆中骨法獨異與咸通皇帝御容頗相類故尓幸淂一識也冬十月敕授王檢校太保依前湖州刺史大彭縣開國男食邑三百戶四年夏六月制授王特進光祿大夫開國侯食邑一千户秋九月王率師攻常州無錫縣丁未克之獲其將朱超等五百餘人而還真明元年春正月敕授王鎮海軍莭度使土客諸軍都指揮使湖州刺史如故三年夏六月制加王檢校太傅增食邑五百户五年夏四月王率水師大小戰艦五百餘艘皆刻龍形自東州發艦徑伐淮甸時淮南遣將彭彥章陳汾等大戰于狼山江將戰之夕王召指揮使張從寶計之曰彼若徑下當避其𥘉以誘之制勝之道也乃命軍中宿理帆檣每舟必載石灰黑豆江砂以隨焉翌日昧爽淮人果乘風自西北而下危檣巨艦勢若雲合我師皆避之賊舟既髙且巨不能復上我師反乘風以逐之復用小舟圍其上右賊回舟而鬪因揚石灰賊不能視及轆轤相接乃撒豆于賊舟我舟則砂焉戰血既漬踐豆者靡不顛踣命進火油焚之火油得之海南大食國以鐡筒發之水沃其熖彌盛武肅王以銀飾其筒口脫為賊中所得必剝銀而棄其筒則火油不為賊所有也斬其將百勝軍使彭彥章一作臯獲士卒七千餘人賊船四百餘艘餘皆焚之其斬馘之甚自江及岸數十里皆殷焉淮師自是遂求通娉王之是行也舟次狼山江之石牌灣有石幢大署其文曰向後有木龍五百來至此真聖其勝也秋七月王復戰于毗陵之無錫縣偏將曽雲奔于賊我師不利王騎逼髙岸賊將追及乃舉䇿私誓曰天必助我馬當躍上不然則墜我于此馬果一躍而登岸既而復整行伍破賊而還冬十一月丁亥王妣吳越國莊穆夫人薨六年冬十月敕遣衛尉卿兼通事舍人陳琮授王檢校太傅同中書門下平章事充清海軍莭度使餘如故龍德二年春正月敕王特進檢校太尉兼侍中加食邑三百户仍賜匡扶定亂立正至道功臣同光二年冬十月制授王開府儀同三司檢校太師兼中書令依前清海軍莭度使兼充兩浙莭度使觀察留後遣進奉使婁輯將命焉天成元年四月武肅王不康因如衣錦軍命王監國仍俾便宜從事武肅王至自衣錦軍而中外無所専命武肅王嘉歎久之九月制加王食邑一千户實封一百户一夕王夢神人賫骨一副易王頂及醒尚痛焉三年春二月遣閣門通事舍人李韞授王鎮海鎮東等軍莭度使杭州越州大都督長史加食邑一千户實封二百户秋七月己已忠獻王生𥘉武肅王將屬王以冡嗣乃命諸子有功者數人謂曰爾無隱情各言爾功以定厥後王兄中吳軍莭度使元璙王弟清海軍莭度使元璹寧國軍莭度使傳璟洎諸公子等皆上言王功德髙茂是宜委副故以兩鎮屬焉及武肅寢疾一日命出玉帶五賜王兄弟命王先擇之王乃取其狹小者武肅王大恱謂王曰吾有汝瞑目無恨矣四年秋八月己酉今大元帥吳越國王弘俶生五年夏五月制加王食邑一千戶實封一百户郊恩也長興三年春三月己酉大雪二十八日庚戌武肅王薨王哀痛終日四日不食上右勸以粥夏四月己未王即位悉用藩服之儀從治命也赦境內凡一應荒絶田産尚隸租籍者悉免之中外頒賚有差自今年孟春洎是月陰晦彌日及王親事之日至是澄霽中外咸恱是月庚午奉武肅王靈輴殯于衣錦軍之正寢秋八月椘帥馬希聱殂弟希範嗣癸已四年春正月福州王延鈞僣稱帝更名璘三月敕遣將作監李鍇光祿少卿張裒來歸我先王之賵又遣引進使楊彥珣授王起復雲麾將軍上金吾衛大將軍員外置同正員王兄中吳軍莭度使元璙檢校太師兼中書令王弟清海軍莭度使元璹檢校太傅同中書門下平章事餘如故夏四月淮南偽客省使許確百濟國太僕卿李仁旭各來祭我先王秋七月敕遣郎中張絢授王中書令進封為吳王是月畨禺偽上僕射何瑱亦來祭我先王九月敕遣侍郎張文寶來宣諭文寶泛海而來𬒳風壞船飄至天長吳主厚禮之及賞從者錢帛等數萬文寶獨受飲食餘皆辭之吳主嘉之竟抵抗冬十一月明宗崩宋王從厚即位是為閔帝十二月庚戌寧國軍莭度使同平章事檢校太傅王兄元璣卒璣王之庶兄也母慶安夫人胡氏公性氣寬厚沉靜寡言多尚儒釋不喜奢侈厯官數年黎庶安樂早失夫人終不棄娶之嗣是歲順化軍莭度使判明州王弟元珦召歸錢塘懲虐政也甲午應順元年春正月閔帝改元大赦敕遣鞍轡庫使王延縞來宣告仍賜國信尋又遣散騎常侍孔昭序駕部貟外郎張紬册王為吳越王是月大雪平地五尺壬午奉葬先王于茅山閏月蜀帥孟知祥僣稱大蜀皇帝年號明德夏四月潞王從珂率兵入洛逐閔帝而自立改元清泰六月敕遣給事中張延雍兵部員外郎馬義册王為吳越王秋七月偽蜀孟知祥殂子昶嗣乙未清泰二年春三月制授靜海軍莭度使檢校太保中書令王弟元球守太師秋七月甲辰西方慶雲見重建開元宫追福于先王也丙申三年春正月敕遣禮部尚書李懌户部郎中姚遐齎奉吳越王金印至歸舊物也秋七月敕建先王廟于東府是月制授王部將保順軍莭度使鮑君福檢校太尉同平章事冬十月偽閩王昶弒其父延鈞而自立年號通文十一月契丹立石敬瑭為晉皇帝于洛大赦改元天福潞王自殺十二月敕授王天下兵馬副元帥丁酉天福二年春正月朔日有蝕之敕遣供奉官周彥環賜國信二月淮南以徐知誥為齊王建國于金陵是月己酉夜暴雨自西北起連日至壬子有海魚二尾各長五十餘尺一死于桐廬一死于餘姚江三月靜海軍莭度使王弟元球順化軍莭度使王弟元珦並有罪命死王許以公禮葬其麾下卒伍悉宥之元球元珦數有軍功先王賜有兵仗及王立元球等恃恩驕橫增置兵仗諸將吏告元球遣親信禱神求主吳越又為蠟丸與元珦議謀王不信諸將復告王乃召元球元珦宴後宫既至上右告元球等有刃于懷袖即皆格殺之王欲按諸將有交通者姪仁俊諫曰昔光武破王郎曹公破袁絽皆焚其書疏以安反側宜放之王乃止夏四月敕遣禮部尚書程遜兵部貟外郎韋稅封王為吳越國王仍賜天下副元帥金印一面甲午王即位建國之儀一如同光故事仍赦境內今年租稅之半是月晉主遷都于汴秋七月制削元球元珦在身官爵任便處置八月辛已王大閲于北郊是月偽吳楊氏遜位于徐知誥戊申王新建五廟于城南九月乙卯王親祀五廟冬十一月乙丑金陵徐知誥僣稱大齊皇帝年號升元戊戌三年春正月朔日有蝕之二月乙亥吳越國丞相沈嵩卒贈諡文獻嵩名吉甫閩人也祖輅大理評事賜緋父超福州長溪縣令嵩𥘉生時有大蛇墜牀前引首視之久而方去既七日將浴忽風雨震壞浴盆乾寧二年刑部尚書崔凝主禮闈凡二十五人登進士弟渝濫尢衆昭宗御武德殿命翰林學士陸扆祕書監馮渥親覆試凡落十人是日嵩再以章奏捷尋歸寧途由淮甸淮帥辟之不就遂歸武肅厯鎮海軍掌書記授浙西營田副使奏授祕書監檢校兵部尚書右僕射凡書檄表奏多嵩所出莊宗即位改元同光武肅王問其祚修短嵩曰觀此號為國不成止一口耳文穆王襲位置擇能院以選士俾嵩主之國建拜嵩丞相終年七十六歲冬十一月敕建尚書王丞王延司門郎中張守素齎捧吳越國王玉册及沿身法物等至册曰惟天福三年歲次戊戌十一月甲辰朔五日戊申皇帝若曰王者握圖立極崇德報功或開國以建邦或苴茅而襲爵乃樹藩屏式奬忠勳古先哲王率由斯道唯朕薄德敢忽彛章况夫奠南服之奧區鎮東甌之重地懋績雖髙于列土殊榮未繼于肯堂得不申加等之恩降非常之命用紀代天之業特頒鏤玉之文乃擇吉辰爰敷盛典咨爾興邦保運崇德志道功臣天下兵馬副元帥鎮海鎮軍等軍莭度浙江東西等道管內觀察處置兼兩浙鹽鐵制置發運營田等使開府儀同三司檢校太師守中書令杭州越州大都督府長史上柱國吳越國王食邑一萬五千户實封一千五百户錢嶽靈稟粹天象儲精藴文武之兼才受乾坤之間氣既寵承吳越功邁桓文運妙略以平凶用竒兵而制變祇嗣基搆表率英雄淮夷之屏氣銷聲海嶠之波澄浪息而况興我昌運竭乃忠規懋勳庸而首列韓壇奉玉帛而誠先禹貢語尊奬則獨標大莭顧封崇則未稱鴻名宜舉徽章俾奉先正矧其天文當南斗之分地志控句踐之都眷兹舊封允屬全德是用異車服于羣后盛蕳册于列藩正二國之土疆錫九天之寶瑞表豫嘉命纘乃舊邦大振家聲夾輔王室今遣使太中大夫尚書右丞上柱國賜𬗋金魚袋王延使副中散大夫尚書司門郎中柱國賜𬗋金魚袋張守素持莭備禮册爾為吳越國王於戲服衮衣而佩玄玉位􅐦于諸矦駕戎輅而握兵符名尊于九代馭貴之重象賢之榮爾其祗荷天光勉清國步往綏厥位永孚于休戒之慎之勿忝前烈十二月王大閲兵馬步軍泊艛櫓于碧波亭已亥四年春二月敕授丗子弘僔為果州團練使是月偽齊徐知誥改姓李更名忭僭稱大唐升本潘氏湖州安吉縣人父為安吉寨將嘗因淮將李神福侵我吳興虜潘氏而去升遂為神福家奴徐溫嘗造神福家見而異之求為飬子至是乃隱本族而冒徐姓焉後嘗致書于我以毗陵求易吳興仍引祊田為説則本潘氏明矣秋七月朔日有蝕之閩王延義更名曦殺其主昶而自立年號永隆八月戊申王建丗子府于城北是日白龍見處州長松縣遂更為龍泉縣是月刺遣刑部尚書季懌禮部郎中崔鈞授王天下兵馬元帥增食邑五千户實封五百户仍賜御服紅羅真珠戰袍金鎖甲各一副九月詔升婺州為武勝軍授王兄元懿為莭度使是月保大軍莭度使同參相府事隆仁章卒冬十月壬子吳越國莊穆夫人馬氏薨夫人臨安人也父淮浙行軍司馬雄武軍莭度使同平章事馬綽之女夫人性聰慧勤于職𥘉武肅王禁中外毋淂蓄聲伎夫人以王後嗣未立乃請于武肅王王嘉之曰我家宗祀幸汝得主之矣因而許王納妾遂生忠獻王諸子既長夫人皆均養之常置銀鹿于帳前坐諸公子于上夫人閲其聚戲喜動顔色𥘉封越國至吳越國夫人薨年五十歲敕諡曰恭穆十二月辛酉葬恭穆夫人於衣錦軍慶仙鄉庚子五年春二月甲辰溫州刺史王子弘僎卒是月閩王曦遣兵擊其弟王延政于建州遂僣稱大殷皇帝王命內衙統軍使仰詮都監使薛萬鍾帥師伐建州三月敕升婺州為武勝軍又升嘉興縣為秀州以嘉興崇德華亭三縣隸焉是月敕遣右諫議大夫髙延賞兵部郎中李元龜授王天下兵馬都元帥夏四月癸卯鎮海軍行軍司馬兼侍中同平章事太尉鮑君福卒君福字慶成餘姚人也祖興父璨俱不仕少羇貧性淳厚有膽氣餘姚有井面廣丈餘君福每恣卧其上而無畏色又能為馬上舞雙劍鄉黨異之及從軍以驍果稱𥘉事彭城漢宏及武肅王東討乃與其黨歸降號曰向盟都纍從征伐有㓛能馬上輪雙劍入陳望之若飛電沉默少語軍中謂之鮑閙尋為衢州應援指揮使屬刺史陳章叛淮人入其境乃以淮帥命辟為郡職君福不納武肅聞之患其𬒳􅊣乃密賜絹書使苟從之因與賊徒季元嗣飲嗣其醉乃奔歸尋授衢州刺史淮將信州刺史周本屢侵其境君福每率數騎往逐之本遁去及將罷郡武肅王勞曰比在任戰敵而已未足為副使優賀之道因復任之凡三考文穆王領清海軍莭制辟為副使後遷湖州復二考纍職鎮海軍莭度副使浙西行營司馬奏授登州刺史保大保順等軍莭度使檢校太尉同平章事兼侍中卒年七十七歲敕諡曰忠壯是月甲子丗子弘僔薨弘僔王苐五子也母魯國夫人鄜氏時王年將四十冡嗣未建及生特所鍾愛纍奏授兩浙副大使果州團練使國建立為丗子𥘉王治丗子府謡言曰何處有鹿脯將薨乃題所居屏障曰四月二十九日大會羣仙凡題數處及期果薨年方十六歲追諡曰孝獻五月四星聚斗秋七月我師敗于建陽積雨乏糧故也八月王以丗子府為瑶臺院冬十二月以忠獻王為內衙諸軍都指揮使是歲姑蘇吳興嘉禾三郡大水辛丑六年春三月丙寅敕遣太子賔客聶延祚吏部郎中盧撰册授王守尚書令亦作五年册也此誤書之也夏五月畨禺彭城龑遣偽攝太尉工部侍郎盧膺尚儀謝宜清尚衣髙素清來逆我故王弟傅璛之室馬氏以為繼室不克遣馬氏即潭帥椘王殷之女也先是畨禺亦聘馬氏既卒遂求其弟是行也潭帥希範亦遣中軍使歐陽練與廣使俱至馬氏誓不許故不克遣六月寧國軍莭度使同參相府事仰詮卒秋七月甲戌麗春院火延于內城王遷居瑶臺院是月閩王曦稱大閩皇帝八月辛亥王薨于瑶臺院之綵雲樓年五十五在位十年贈諡曰文穆敕宰相和凝撰神道碑七年壬寅二月癸卯葬于國城龍山之南原王志量恢廓識度宏逺雖少嬰軍旅尢尚儒學事武肅孝敬小心未嘗有懈武肅性既嚴急每一召即時須至或巾帶于步驟間乃致闊袴大襪以便之晚年政事一委參決簿書填委皆躬親批署手為胼胝復致粉盤于卧榻之間夜有所記必書其上詰旦以備顧問時屬盜賊及詐偽誹謗之法犯者輒死王皆力救之所獲宥者甚衆嘗北征師次平望蚊蚋尢甚左右請施帷帳王曰三軍皆在此我獨何避竟不許及儧嗣之後示以明恕人情翕然內衙指揮使陸仁章婁仁𣏌等早備武肅王爪牙以性剛愎為衆所惡而亦嘗以事侵王一日同列者皆率諸軍于國門請王戮之王命姪仁俊諭之曰仁章等事先王有年矣今求舊念功方當旌賞汝等遂以私憾使我戮之我安為尓報怨也苟不聼命我當歸臨安以避賢路衆皆退懼遂授仁章福州刺史仁𣏌湖州刺史中外有以封章相構者皆居中不下積而毁之王舅陳氏列職不過一戍遏每加厚賜而未嘗遷授恭穆夫人之弟馬充嘗以使役求免王庭責之遂下獄黜于剡溪其餘遵守治命保慎名器烈祖之風為不泯矣一日武肅王寢疾召將吏曰吾疾必不起諸兒皆愚劣誰可為帥者諸將泣曰兩鎮令公仁孝有功孰不愛戴武肅乃出印鑰授王曰將吏推爾宜善守之又曰子孫善事中國勿以易姓廢事大之禮王與兄弟同幄行喪內衙指揮使陸仁章曰令公嗣先王霸業將吏旦暮趨謁當與諸公子異處乃命主者更設一幄扶王居之禁諸公子從者無得妄入武肅未薨時仁章嘗以事犯王至是王勞之仁章曰先王在位仁章不知事令公今日盡莭令公猶事先王也王嘉之王以遺命去儀用藩鎮法除民田荒絶者租稅王于兄弟甚衆兄元璙自蘇州入見王以家人禮事之奉觴為夀曰此兄之位也而小弟居之是兄賜之也元璙曰先王擇賢而立之君臣位㝎當恭守霸業自為珍重王因相與泣論曰王以英毅之資兼仁厚之德入田頵豺狼之穴示亡身之慮破知誥蛇豕之羣揚對敵之威奮劍屢成其大勳􅐦紐遂當其慶嗣念功忘過崇德布政然後聿修先烈光絽丗官天子賴于元勳諸侯奉為盟主以稱克家之令嗣以號列國之賢君則彤弓緇衣不足侔其美也吳越備史卷第二
