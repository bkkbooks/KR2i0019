  - {type: variant, offset: 7539, length: 0, content: '', WYG: 冬十月辛酉命世子建武軍節度兩軍副大使惟濬兩浙行軍司馬孫承祐入貢助郊祭也十一月癸卯皇帝南郊大赦改元開寳十二月}
