  - {type: variant, offset: 7392, length: 0, content: '', WYG: 夏五月丙戌王從兄婺州刺史仁倣卒六月𠡠授王子内衙都指揮使惟治為容州寧逺軍節度使金紫光禄大夫檢校太保九月壬寅王避正寢於功臣堂計都入須女也癸卯王兄知福州彰武軍事𢎞儇卒儇字智仁文穆王第二子也本名𢎞偁起家上直副兵馬使檢校尚書右僕射二十餘年為東府安撫使洞曉政術吏不敢欺文穆王嘉之賜金酒器一副因命兼領新定性簡儉善騎射􅀎書有文而自晦福州初歸我將校有仇憾者率多相誣謂左右曰人各有憾一啟之誣搆交生人相疑懼豈國家推心懐逺之道也因悉不問閩人莫不感悦尋鎮永嘉愈事清率所蓄聲伎悉放之每食不過鮑魚菘菜而已顯徳中甞因入覲温人謂其將代乃卧轍阻之儇乃復伺夜出人皆宿於城門詰旦侍妾以籃轝先出衆疑儇在其中遽擁而廻官吏具聞王命示歸期人始從焉温人舊苦徭役儇乃置簿書以均之民感其恵多為儇醮本命又俗尚淫祀儇皆鎻其祠宇器玩以充公用及移鎮無諸温人有擕家以從者謂之随使百姓儇出城日皆行啼巷哭曰願公早囬至是以神柩由温江歸㑹稽三郡之民為之號踊凡兩鎮無諸㑹稽一鎮永嘉通任二十餘年承制累授檢校太尉拜丞相終年五十有四諡節恵冬十一月甲寅命王弟信知婺州武勝軍事}
  - {type: page-break, offset: 7392, content: '', id: KR2i0019_WYG_004-25b, image: WYG0464/WYG0464-0573d.png}
