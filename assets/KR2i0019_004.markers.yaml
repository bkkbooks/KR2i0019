  - {type: variant, offset: 16528, length: 365, content: 今本吳越備史武肅十九丗孫徳洪所刊序称忠懿事止于戊辰囙命門人馬藎臣續苐六卷爲𥙷遺予暇日以家蔵舊本閱之知其刻之非也是書爲范坰林禹所撰稱忠懿爲今元帥吳越國王自乹祐戊申至端拱戊子紀王事終始厯然新刻則于乹徳四年後序次紊亂脫誤宏多翻以開寶二年後事爲𥙷遺他如王囙衣錦城𬒳㓂命同玄先生閭丘方遠建下元金籙醮于東府龍瑞宫其夕大雪惟醮壇上星斗燦然一黒乕蹲宫門外罷醮而去羅隐師事方逺執弟子禮甚恭及迎釋迦建浮圗以供之其制度皆出王之心匠諸事皆失載其字句紕繆䖏又不知㡬何也盖徳洪當日所見乃零㫁殘本實非完書以家王故事急付剞劂未遑細心参考耳也是翁錢曽遵王右書凡四卷係𫐠古堂錢氏抄本最為精善今蔵維揚江氏予備得録之原本無上䟦從讀書敏求記中錄附卷尾以資考核書中劉姓悉易為彭城避武肅嫌諱也又諱佐凡官名左者悉改為上書中所云上右乃左右也丙申嘉平五日雪窓呵凍書按此書載通考者有二, WYG: ''}
