  - {type: punctuation, offset: 7483, content: ), id: KR2i0019_krp_004-bkkpn84}
  - {type: variant, offset: 7486, length: 0, content: '', WYG: 三月乙酉丞相元徳昭卒徳昭字明逺撫州南城縣人父仔倡任新撫饒信四州刺史淮南節度使檢校太傅仔倡之在信州也頗傾心於我屬衢睦作叛亦有犄角之力及為淮人所攻其下内叛遂奔於我武肅王禮以賔席惡其本姓危氏乃更曰元因為錢塘郡徳昭起家鎮東軍節度廵官錢塘縣令累授睦州軍事判官知台州新亭監始在信州仔倡使日者視諸子日者指徳昭曰獨此子非武官及學文其師授以文體文穆襲國命林鼎為丞相曰元徳昭有輔翌之才吾子孫無所憂矣連掌文翰忠獻王時南閩用師凢兵機細務悉以委之尋拜丞相王即位禮遇彌至徳昭厚重多謀臨事而不撓每屬嚴警議者盈庭徳昭至則他論皆息軍中有不議理者徳昭以事諭之無不聼服性嗜酒雖沈醉無所怠事晚年衰耗王見之謂左右曰吾向見徳昭容色衰倦必一旦不諱人誰輔我因泣下徳昭理家以孝友聞每時序置酒環列几席者凡四代甞為詩云滿堂羅綺兼朱紫四代兒孫奉老翁及寢疾自為埋文治後事終年七十有八中外無不歎息諡曰貞}
