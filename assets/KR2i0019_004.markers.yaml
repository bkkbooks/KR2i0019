  - {type: variant, offset: 7397, length: 0, content: '', WYG: 二月丁卯除睦州刺史元璝知福州彰武軍事戊辰王弟奉國軍節度使億卒億字延世文穆第十子母沈氏初孕文穆王夢僧入寢帳及生故字曰和尚起家内衙諸軍左右都虞侯檢校左僕射性俊㧞善屬文年二十一出為明州刺史頗著善政凡科率舊制除出之顯徳中王命括民丁將益軍旅州縣長吏因之多所殘弊億乃手䟽之辭理切直王感悟遂寢其事王甞與丞相以下論及時務且言民之勞逸率由時君奢儉因為詩二章以言節儉之志命億應和億以北方侯伯多獻淫巧乃因詩以風刺王嘉歎乆之仍賜詩以美其意億甞以息女許王舅吴氏子而諸吴驕恣日益遂怒之自是不通時人稱其强正建隆初奏授明州奉國軍節度使檢校太保末年夢金甲神告其終期因㑹賓客飲酒與之訣寢疾三日而終年三十九諡曰康憲壬申𠡠祀禹祠於東府己卯王從兄温州刺史仁俊卒}
