  - {type: variant, offset: 7540, length: 1, content: 己, WYG: 酉朔日有蝕之大宋嘉祐元年丙申嵗正月七日四代孫朝奉郎守尚書刑部郎中集賢殿修撰知梓州軍州事兼管内橋道使提舉戎瀘等七州賊盜甲兵専勾當納溪夷人公事上䕶軍賜紫金魚袋錢中孚寫大宋紹興二年壬子嵗六月二十七日七代孫廸功郎前河南府儀曹椽錢渙伏覩曽祖修撰所傳吴越備史於蔡子發家遂取而歸復藏吾家焉在臨安府寳蓮山寺題吴越備史卷四欽定四庫全書吴越備史補遺舊本備史皆止於戊辰年而忠懿之事未終此卷不知作自何人盖恭本傳及秦王貢奉録家王故事為之或以合於備史今釐正之}
