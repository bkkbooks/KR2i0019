  - {type: variant, offset: 4098, length: 1, content: 刺, WYG: 保大軍節度使同恭相府事陸仁章卒冬十月壬子吴越國莊睦夫人馬氏薨夫人臨安人父綽淮浙行軍司馬雄武軍節度使同平章事夫人性聰慧勤於職初武肅王禁中外毋得蓄聲妓夫人以王𦙍嗣未立乃請於武肅王王嘉之曰我家宗祀幸汝得主之矣因許王納妾遂生忠獻王諸子既長夫人皆均養之常置銀鹿於帳前坐諸公子於上夫人閲其聚戯喜動顔色初封越國至吴越國夫人薨年五十𠡠諡曰恭穆是月𠡠}
